                if (opts.length === 0) {
                    storyText += `
            <span class="divider">· · ·</span>
            <span style="color:#d45a5a;">⚠️ 你完全支撑不住了，眼前一黑，倒在了地上。</span>
        `;
                    opts.push({
                        label: '💀 你倒下了',
                        tag: '→ 结束',
                        action: function () {
                            if (state.gameOver) return;
                            triggerEnding('BE3_惊扰');
                        }
                    });
                }

                setStory(storyText);
                renderOptions(opts);
                updateUI();
            }
            // ---------- 体力调整（重写，增加危机状态检测） ----------
            // 注意：这个函数会覆盖原有的体力修改逻辑，但保留对 stamina 的操作
            // 原有 changeStamina 函数不存在，我们直接扩展 deductStamina 的逻辑
            // 但为了方便，我们新增一个专用函数
            function changeStamina(delta) {
                if (state.gameOver) return;
                // 第二章使用 changeEnergy，此函数仅供第一章使用
                if (state.flags.chapter2) return;
                var oldValue = state.stamina;
                state.stamina = clamp(state.stamina + delta, 0, state.maxStamina);

                // 体力=0时触发检测
                if (state.stamina === 0 && oldValue > 0 && !state.gameOver) {
                    if (state.flags.chapter2) {
                        // 第二章：不显示具体恢复建议，由 handleExhaustionCh2 接管
                        // 只显示一句简短描述，避免重复
                        showStory('你感到体力不支，必须想办法恢复。');
                    }
                }
                updateUI();
                saveGame();
            }

            // 消耗精力并检查是否足够
            function spendEnergy(amount) {
                if (state.flags.chapter2) {
                    if (state.ch2.energy < amount) {
                        showStory(`<span style="color:#d45a5a;">⚠️ 精力不足！需要 ${amount} 点精力，当前只有 ${state.ch2.energy} 点。</span>`);
                        return false;
                    }
                    changeEnergy(-amount);
                    return true;
                } else {
                    // 第一章使用 stamina
                    return spendStamina(amount);
                }
            }

            // 保持原有 spendStamina 不变，但第二章中应直接使用 spendEnergy
            function spendStamina(amount) {
                if (state.flags.chapter2) {
                    // 第二章直接调用 spendEnergy
                    return spendEnergy(amount);
                }
                // 第一章使用 stamina
                if (state.stamina < amount) {
                    showStory(`<span style="color:#d45a5a;">⚠️ 体力不足！需要 ${amount} 点体力，当前只有 ${state.stamina} 点。</span>`);
                    return false;
                }
                state.stamina -= amount;
                state.actionsToday++;
                updateUI();
                saveGame();
                return true;
            }

            // ---------- 体力与场景管理 ----------
            function deductStamina() {
                if (state.stamina <= 0) return false;
                state.stamina--;
                state.actionsToday++;
                updateUI();
                return true;
            }

            // ================================================================
            //  场景结束返回（兼容第一章和第二章）
            // ================================================================

            function finishSceneAndReturn() {
                if (state.gameOver) return;

                if (state.flags.chapter2) {
                    // ---- 第二章：消耗精力 ----
                    if (!spendEnergy(1)) {
                        // 精力不足，触发失能事件
                        if (!state.ch2.energyExhausted) {
                            state.ch2.energyExhausted = true;
                            setTimeout(function () {
                                if (!state.gameOver && state.flags.chapter2) {
                                    handleEnergyExhaustion();
                                }
                            }, 100);
                        }
                        return;
                    }
                    // 继续第二章流程
                    renderChapter2();
                } else {
                    // ---- 第一章：消耗体力 ----
                    if (state.stamina <= 0) {
                        enterNight();
                        return;
                    }
                    state.stamina--;
                    state.actionsToday++;
                    updateUI();
                    if (state.stamina === 0) {
                        enterNight();
                    } else {
                        renderMainOptions();
                    }
                }
                saveGame();
            }

            // ---------- 显示与选项 ----------
            let currentScene = 'intro';

            function showStory(text) {
                const el = document.getElementById('storyText');
                if (text) {
                    el.innerHTML += text.replace(/\n/g, '<br>') + '<br>';
                }
                const area = document.getElementById('story-area');
                setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
            }

            function clearStory() {
                document.getElementById('storyText').innerHTML = '';
            }

            function setStory(text, endingClass) {
                clearStory();
                const el = document.getElementById('storyText');
                el.className = 'story-text';
                if (endingClass) {
                    el.classList.add(endingClass);
                }
                showStory(text);
            }
            // ================================================================
            //  🎵 Web Audio 音效引擎（BGM + 铃铛音效）
            // ================================================================

            let audioCtx = null;
            let bgmNodes = {};
            let bgmPlaying = false;
            let sfxPlaying = false;
            let bgmWasPlaying = false;
            let bgmInterval = null;

            // ---- 初始化音频上下文（需用户手势触发） ----
            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('Web Audio API 不支持');
                        return false;
                    }
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return true;
            }

            // ---- 生成阴森中式 BGM（五声音阶 + 低频嗡鸣 + 随机敲击） ----
            // ---- 生成古琴旋律 BGM（完整旋律循环 + 钟铃） ----
            // ---- 生成笛子旋律 BGM（完整旋律循环 + 钟铃） ----
            function startBGM() {
                if (!initAudio()) return;
                if (bgmPlaying) return;

                // ---- 主音量（调大） ----
                const masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.45;   // 调大，清晰可闻
                masterGain.connect(audioCtx.destination);

                // ---- 带通滤波器（突出笛子的中高频） ----
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1200;
                filter.Q.value = 1.2;
                filter.connect(masterGain);

                // ---- 笛子主音（正弦波 + 轻微锯齿，增加明亮感） ----
                const fluteOsc = audioCtx.createOscillator();
                const fluteGain = audioCtx.createGain();
                fluteOsc.type = 'sine';          // 正弦波为主
                fluteOsc.frequency.value = 440;
                fluteGain.gain.value = 0;
                fluteOsc.connect(fluteGain);
                fluteGain.connect(filter);
                fluteOsc.start();

                // ---- 泛音振荡器（增加高频色彩） ----
                const harmonicOsc = audioCtx.createOscillator();
                const harmonicGain = audioCtx.createGain();
                harmonicOsc.type = 'sine';
                harmonicOsc.frequency.value = 880;
                harmonicGain.gain.value = 0;
                harmonicOsc.connect(harmonicGain);
                harmonicGain.connect(filter);
                harmonicOsc.start();

                // ---- 颤音 LFO（模拟笛子的气息波动） ----
                const vibratoLFO = audioCtx.createOscillator();
                const vibratoGain = audioCtx.createGain();
                vibratoLFO.type = 'sine';
                vibratoLFO.frequency.value = 5.5; // 颤音频率 5.5Hz
                vibratoGain.gain.value = 6;       // 颤音幅度（音分偏移）
                vibratoLFO.connect(vibratoGain);
                vibratoGain.connect(fluteOsc.frequency);
                vibratoLFO.start();

                // ---- 钟铃 ----
                const bellGain = audioCtx.createGain();
                bellGain.gain.value = 0.025;
                bellGain.connect(masterGain);

                function playRandomBell() {
                    if (!bgmPlaying) return;
                    try {
                        const now = audioCtx.currentTime;
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        const freq = 200 + Math.random() * 400;
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.05, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                        osc.connect(gain);
                        gain.connect(bellGain);
                        osc.start(now);
                        osc.stop(now + 0.8);
                    } catch (e) { }
                    const delay = 8000 + Math.random() * 12000;
                    bgmInterval = setTimeout(playRandomBell, delay);
                }

                const firstBellDelay = 4000 + Math.random() * 6000;
                bgmInterval = setTimeout(playRandomBell, firstBellDelay);

                bgmNodes = { masterGain, fluteOsc, fluteGain, harmonicOsc, harmonicGain, vibratoLFO, vibratoGain, filter, bellGain };
                bgmPlaying = true;

                // ---- 五声音阶 ----
                const scale = [
                    196, 220, 247, 294, 330, 392, 440, 494, 587, 659, 784, 880
                ];

                // ---- 旋律数据库 ----
                const melodies = [
                    [0, 2, 4, 5, 4, 2, 1, 0],
                    [4, 5, 7, 8, 7, 5, 4, 2],
                    [5, 4, 2, 1, 2, 4, 5, 4],
                    [2, 4, 5, 7, 5, 4, 2, 4],
                    [0, 1, 2, 4, 5, 4, 2, 1],
                    [4, 2, 1, 0, 1, 2, 4, 5],
                ];

                let currentMelodyIdx = 0;
                let noteIdx = 0;
                let isPlaying = false;
                let currentNoteDuration = 0;
                let nextNoteTimer = null;

                // ---- 播放旋律中的下一个音符 ----
                function playNextMelodyNote() {
                    if (!bgmPlaying) { isPlaying = false; return; }
                    if (isPlaying) return;
                    isPlaying = true;

                    const melody = melodies[currentMelodyIdx % melodies.length];
                    const idx = melody[noteIdx % melody.length];
                    const now = audioCtx.currentTime;

                    if (idx === -1) {
                        // 休止
                        fluteGain.gain.setTargetAtTime(0, now, 0.02);
                        harmonicGain.gain.setTargetAtTime(0, now, 0.02);
                        currentNoteDuration = 120 + Math.random() * 150;
                    } else {
                        const freq = scale[idx % scale.length];
                        const currentFreq = fluteOsc.frequency.value;

                        // 滑音（笛子可以快速滑音）
                        if (Math.abs(currentFreq - freq) > 3) {
                            fluteOsc.frequency.setTargetAtTime(freq, now, 0.06);
                        } else {
                            fluteOsc.frequency.setValueAtTime(freq, now);
                        }
                        // 泛音跟随主音
                        harmonicOsc.frequency.setValueAtTime(freq * 2, now);

                        // ---- 笛子包络（起吹、稳定、收尾） ----
                        const peak = 0.8;          // 笛子音量调大
                        const harmonicPeak = 0.035;
                        // 主音
                        fluteGain.gain.setValueAtTime(0, now);
                        fluteGain.gain.linearRampToValueAtTime(peak * 0.9, now + 0.02);
                        fluteGain.gain.linearRampToValueAtTime(peak, now + 0.06);
                        fluteGain.gain.exponentialRampToValueAtTime(peak * 0.6, now + 0.3);
                        fluteGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                        // 泛音
                        harmonicGain.gain.setValueAtTime(0, now);
                        harmonicGain.gain.linearRampToValueAtTime(harmonicPeak * 0.8, now + 0.04);
                        harmonicGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

                        currentNoteDuration = 500 + Math.random() * 300;
                    }

                    noteIdx++;

                    if (noteIdx >= melody.length) {
                        noteIdx = 0;
                        currentMelodyIdx = (currentMelodyIdx + 1) % melodies.length;
                    }

                    nextNoteTimer = setTimeout(() => {
                        isPlaying = false;
                        if (bgmPlaying) {
                            const gap = 150 + Math.random() * 350;
                            setTimeout(playNextMelodyNote, gap);
                        }
                    }, currentNoteDuration + 50);
                }

                // 启动旋律
                setTimeout(playNextMelodyNote, 500);

                // ---- 定期微调滤波器，模拟笛子音色变化 ----
                setInterval(() => {
                    if (!bgmPlaying) return;
                    const newFreq = 1000 + Math.random() * 600;
                    filter.frequency.setTargetAtTime(newFreq, audioCtx.currentTime, 0.5);
                }, 4000);
            }

            // ---- 停止 BGM（清空所有节点） ----
            function stopBGM() {
                bgmPlaying = false;
                if (bgmInterval) {
                    clearTimeout(bgmInterval);
                    bgmInterval = null;
                }
                if (bgmNodes._melodyInterval) {
                    clearInterval(bgmNodes._melodyInterval);
                    bgmNodes._melodyInterval = null;
                }
                try {
                    if (bgmNodes.masterGain) bgmNodes.masterGain.disconnect();
                    if (bgmNodes.lowOsc) bgmNodes.lowOsc.stop();
                    if (bgmNodes.melodyOsc) bgmNodes.melodyOsc.stop();
                    if (bgmNodes.highOsc) bgmNodes.highOsc.stop();
                    if (bgmNodes.lfo) bgmNodes.lfo.stop();
                } catch (e) { }
                bgmNodes = {};
            }

            // ---- 播放铃铛音效（按键音） ----
            function playSFX(callback) {
                // 如果音效正在播放，先终止
                if (sfxPlaying) {
                    try { /* 没有持续节点，只标记 */ } catch (e) { }
                    sfxPlaying = false;
                }

                // 暂停 BGM（如果正在播放）
                if (bgmPlaying) {
                    // 暂停随机敲击定时器（防止音效期间敲击干扰）
                    if (bgmInterval) {
                        clearTimeout(bgmInterval);
                        bgmInterval = null;
                    }
                    // 降低 BGM 音量而不是完全暂停（更平滑）
                    if (bgmNodes.masterGain) {
                        bgmNodes.masterGain.gain.setTargetAtTime(0.01, audioCtx.currentTime, 0.05);
                    }
                    bgmWasPlaying = true;
                } else {
                    bgmWasPlaying = false;
                }

                // 生成铃铛音效
                try {
                    if (!initAudio()) {
                        if (callback) callback();
                        return;
                    }
                    const now = audioCtx.currentTime;
                    // 主铃铛音：高频 + 快速衰减
                    const osc1 = audioCtx.createOscillator();
                    const gain1 = audioCtx.createGain();
                    osc1.type = 'sine';
                    osc1.frequency.value = 1200 + Math.random() * 300;
                    gain1.gain.setValueAtTime(1, now);
                    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc1.connect(gain1);
                    gain1.connect(audioCtx.destination);
                    osc1.start(now);
                    osc1.stop(now + 0.25);

                    // 泛音：略高，增加铃铛感
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.value = 1800 + Math.random() * 400;
                    gain2.gain.setValueAtTime(0.06, now);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start(now);
                    osc2.stop(now + 0.18);

                    // 低频泛音（更厚重）
                    const osc3 = audioCtx.createOscillator();
                    const gain3 = audioCtx.createGain();
                    osc3.type = 'sine';
                    osc3.frequency.value = 600 + Math.random() * 200;
                    gain3.gain.setValueAtTime(0.04, now);
                    gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc3.connect(gain3);
                    gain3.connect(audioCtx.destination);
                    osc3.start(now);
                    osc3.stop(now + 0.3);

                    sfxPlaying = true;

                    // 音效结束后恢复 BGM
                    const duration = 320;
                    setTimeout(() => {
                        sfxPlaying = false;
                        if (bgmWasPlaying && bgmPlaying) {
                            // 恢复 BGM 音量
                            if (bgmNodes.masterGain) {
                                bgmNodes.masterGain.gain.setTargetAtTime(0.10, audioCtx.currentTime, 0.1);
                            }
                            // 重新启动随机敲击
                            if (bgmPlaying) {
                                const delay = 3000 + Math.random() * 5000;
                                bgmInterval = setTimeout(() => {
                                    if (bgmPlaying) {
                                        // 使用已保存的 bellGain
                                        if (bgmNodes.bellGain) {
                                            try {
                                                const osc = audioCtx.createOscillator();
                                                const gain = audioCtx.createGain();
                                                const freq = 200 + Math.random() * 400;
                                                osc.type = 'sine';
                                                osc.frequency.value = freq;
                                                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                                                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                                                osc.connect(gain);
                                                gain.connect(bgmNodes.bellGain);
                                                osc.start();
                                                osc.stop(audioCtx.currentTime + 0.6);
                                            } catch (e) { }
                                        }
                                        // 重新调度
                                        const nextDelay = 6000 + Math.random() * 8000;
                                        bgmInterval = setTimeout(() => {
                                            if (bgmPlaying && bgmNodes.bellGain) {
                                                try {
                                                    const osc = audioCtx.createOscillator();
                                                    const gain = audioCtx.createGain();
                                                    const freq = 200 + Math.random() * 400;
                                                    osc.type = 'sine';
                                                    osc.frequency.value = freq;
                                                    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                                                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                                                    osc.connect(gain);
                                                    gain.connect(bgmNodes.bellGain);
                                                    osc.start();
                                                    osc.stop(audioCtx.currentTime + 0.6);
                                                } catch (e) { }
                                                // 再次调度自己
                                                const next2 = 6000 + Math.random() * 8000;
                                                bgmInterval = setTimeout(arguments.callee, next2);
                                            }
                                        }, nextDelay);
                                    }
                                }, delay);
                            }
                        }
                        if (callback) callback();
                    }, duration);
                } catch (e) {
                    console.warn('音效生成失败', e);
                    // 恢复 BGM
                    if (bgmWasPlaying && bgmPlaying && bgmNodes.masterGain) {
                        bgmNodes.masterGain.gain.setTargetAtTime(0.10, audioCtx.currentTime, 0.1);
                    }
                    if (callback) callback();
                }
            }

            // ---- 启动 BGM 的辅助函数（在开始游戏时调用） ----
            function ensureBGM() {
                if (!bgmPlaying) {
                    startBGM();
                }
            }

            // ---- 修改 startNewGame 和 continueGame 以触发 BGM ----
            // 保存原始函数
            const _origStartNewGame = startNewGame;
            const _origContinueGame = continueGame;

            // 重写 startNewGame
            startNewGame = function () {
                if (_origStartNewGame) _origStartNewGame();
                setTimeout(ensureBGM, 500);
            };

            // 重写 continueGame
            continueGame = function () {
                if (_origContinueGame) _origContinueGame();
                setTimeout(ensureBGM, 500);
            };

            // 绑定到主菜单按钮（确保用户手势触发）
            document.getElementById('btn-new-game').addEventListener('click', function () {
                setTimeout(ensureBGM, 600);
            });
            document.getElementById('btn-continue').addEventListener('click', function () {
                setTimeout(ensureBGM, 600);
            });

            // ---- 页面可见性变化时保持 BGM 运行 ----
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden && bgmPlaying) {
                    // 如果页面重新可见，检查 BGM 是否还在
                    if (bgmPlaying && bgmNodes.masterGain) {
                        // BGM 可能因页面休眠而中断，重新启动
                        // 简单处理：如果 bgmPlaying 为 true 但没有声音，可以重启
                        // 但这里不强制重启，以免打断
                    }
                }
            });

            console.log('🎵 Web Audio 音效引擎已加载！');
            function renderOptions(options) {
                const container = document.getElementById('options-area');
                if (state._waitingConfirm) return;
                container.innerHTML = '';
                if (!options || options.length === 0) {
                    container.innerHTML =
                        '<div style="color:var(--text-muted);text-align:center;font-size:0.8rem;padding:8px;">—— 没有更多行动 ——</div>';
                    return;
                }
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn' + (opt.disabled ? ' disabled' : '') + (opt.ending ? ' ending-btn' : '');
                    btn.innerHTML =
                        `${opt.label}${opt.hint ? `<span class="hint">${opt.hint}</span>` : ''}${opt.cost ? `<span class="cost">${opt.cost}</span>` : ''}${opt.tag ? `<span class="tag">${opt.tag}</span>` : ''}`;
                    if (!opt.disabled) {
                        btn.addEventListener('click', () => {
                            // ⭐ 播放铃铛音效，音效结束后执行原动作
                            playSFX(() => {
                                if (opt.action) opt.action();
                            });
                        });
                    }
                    container.appendChild(btn);
                });
            }

            // ---------- 主菜单 ----------
            function renderMainOptions() {
                // 第二章精力归零检测
                if (state.flags.chapter2 && state.ch2.energy <= 0 && !state.gameOver && !state._waitingConfirm) {
                    if (!state.ch2.energyExhausted) {
                        state.ch2.energyExhausted = true;
                        setTimeout(function () {
                            if (!state.gameOver && state.flags.chapter2) {
                                handleEnergyExhaustion();
                            }
                        }, 100);
                        return;
                    }
                }
                // ---- 新增：早晨事件完成后的压力事件兜底检测 ----
                if (state._morningEventProcessed && !state.flags.chapter2 && !state.gameOver && !state._waitingConfirm) {
                    state._morningEventProcessed = false; // 防止重复检测
                    var hasPressure = checkAndTriggerPressureEvent();
                    if (hasPressure) {
                        return;
                    }
                }
                // 兜底：检查隐藏规则是否可解锁
                if (!state.flags.hidden_unlocked && !state._waitingConfirm && !state.gameOver && !state.flags.chapter2) {
                    const allMet = state.flags.hidden_hasBookmark &&
                        state.flags.hidden_hasBrand &&
                        state.flags.hidden_sleepCount >= 3 &&
                        state.flags.hidden_teaCount >= 2 &&
                        state.flags.hidden_answeredCode;
                    if (allMet) {
                        setTimeout(() => {
                            if (!state.flags.hidden_unlocked && !state.gameOver) {
                                unlockHiddenRulesAsync();
                            }
                        }, 200);
                        return; // 等待解锁，暂时不渲染主菜单
                    }
                }
                // ---- 新增：检查村西觉醒者支线是否解锁 ----
                if (!state.flags.awakening.unlocked && !state.flags.awakening.visited && !state.flags.chapter2 && !state.gameOver) {
                    const unlocked = checkAwakeningUnlock();
                    if (unlocked) {
                        // 显示解锁提示，但不打断当前流程
                        setStory(`
                <span class="title-line">🌾 新的探索地点已解锁</span>
                <span class="divider">· · ·</span>
                <span style="color:#d4b87a;">💡 你隐约感到，村西那个被村民禁止靠近的地方，似乎藏着不可靠近的东西……</span>

                    // 计算总概率（已触发的事件不再参与）
                    const available = events.filter(e => !state.flags.nightEvents[e.flag]);
                    if (available.length === 0) {
                        resolve(null);
                        return;

                    // 按权重随机选择一个事件
                    let randVal = rand(0, 100);

                    let chosen = null;
                    for (const e of available) {

            function checkAndTriggerPressureEvent() {
                if (state.gameOver || state._waitingConfirm) return false;
                if (state.flags.chapter2) return false;
                if (state.flags.pressure.forcedAction) return false;

                var day = state.day;
                var pressure = state.flags.pressure;

                // 更新压力等级
                if (day >= 6) {
                    pressure.level = 4;
                } else if (day >= 5) {
                    pressure.level = 3;
                } else if (day >= 4) {
                    pressure.level = 2;
                } else if (day >= 3) {
                    pressure.level = 1;
                } else {
                    pressure.level = 0;
                }

                // ---- 第3天：嫂嫂询问 ----
                if (day === 3 && !pressure.dayEvents.day3_triggered) {
                    pressure.dayEvents.day3_triggered = true;
                    renderPressureEvent_day3();
                    return true;
                }

                // ---- 第4天：异样眼光 + 民俗部警告 ----
                if (day === 4 && !pressure.dayEvents.day4_triggered) {
                    pressure.dayEvents.day4_triggered = true;
                    renderPressureEvent_day4();
                    return true;
                }

                // ---- 第5天：嫂嫂最后通牒 ----
                if (day === 5 && !pressure.dayEvents.day5_triggered) {
                    pressure.dayEvents.day5_triggered = true;
                    renderPressureEvent_day5();
                    return true;
                }

                // ---- 第6天：白天结束时强制事件 ----
                if (day === 6 && !pressure.dayEvents.day6_triggered) {
                    pressure.dayEvents.day6_triggered = true;
                    // 在白天结束时触发，而不是早晨
                    // 在 renderMainOptions 的 stamina === 0 时检测
                    return false;
                }

                return false;
            }

            function checkAndTriggerMorningEvent() {
                if (state.gameOver || state._waitingConfirm) return false;
                if (state.flags.chapter2) return false;

                // 第2天：灰线烙印事件（只有一次）
                if (state.day === 2 && !state.flags.morningEvents.day2_grayLine_triggered) {
                    state.flags.morningEvents.day2_grayLine_triggered = true;
                    renderGrayLineEvent();
                    return true;
                }

                // 第3~5天：暗语问答事件（每天一次）
                if (state.day >= 3 && state.day <= 5) {
                    const key = `day${state.day}_code_triggered`;
                    if (!state.flags.morningEvents[key]) {
                        state.flags.morningEvents[key] = true;
                        renderDarkCodeEvent();
                        return true;
                    }
                }

                // 兜底：检查隐藏规则是否可解锁（可能在事件之后满足条件）
                if (!state.flags.hidden_unlocked) {
                    const allMet = state.flags.hidden_hasBookmark &&
                        state.flags.hidden_hasBrand &&
                        state.flags.hidden_sleepCount >= 3 &&
                        state.flags.hidden_teaCount >= 2 &&
                        state.flags.hidden_answeredCode;
                    if (allMet) {
                        // 延迟执行，避免干扰当前渲染
                        setTimeout(() => {
                            if (!state.flags.hidden_unlocked && !state.gameOver) {
                                unlockHiddenRulesAsync();
                            }
                        }, 300);
                    }
                }

                return false;
            }

                        const hasBookmark = state.flags.hidden_hasBookmark;

                        const hasSleptEnough = state.flags.hidden_sleepCount >= 3;
                        const hasTeaEnough = state.flags.hidden_teaCount >= 2;

                        // ============================================================
                        let maxAllowed = 0;
                        if (conditionsMet === 5) {

                    'tail_to_head': 5,      // 跨越移动，消耗更多
                    'head_to_tail': 1,

                var key = currentPos + '_to_' + targetPos;
                energyCost = moveMap[key] !== undefined ? moveMap[key] : 3;

                // ---- 检查精力是否足够 ----
                if (energyCost > 0 && state.ch2.energy < energyCost) {
                    showStory(`<span style="color:#d45a5a;">⚠️ 精力不足！移动到${targetPos}需要 ${energyCost} 点精力。</span>`);
                    return false;

                if (energyCost > 0) {

                state.ch2.position = targetPos;

                var posLevel = { 'tail': 0, 'middle': 1, 'head': 2 };
                var currentLevel = posLevel[state.ch2.visitedHighestPosition] || 0;

                if (newLevel > currentLevel) {

                var progressGain = (targetPos === 'head') ? 3 : (targetPos === 'middle' ? 2 : 1);

                return true;

                var allExplored = state.ch3.exploredAreas.frontYard &&

                    state.ch3.exploredAreas.library &&
                    state.ch3.exploredAreas.alchemyRoom &&

                if (allExplored && state.ch3.phase === 'exploration') {
                    renderCh3AllExplored();

                }

                // ---- 钟声状态 ----
                var bellTolls = state.ch3.bellTolls || 0;

                var pressureText = ['😌 平静', '😰 不安', '😨 紧张', '😤 决心'][pressure] || '😌 平静';
                var pressureColor = ['var(--text-muted)', '#d4b87a', '#d45a5a', '#d4b87a'][pressure] || 'var(--text-muted)';
                var incense = state.ch2.incenseRemaining || 0;

                // ---- 场景文本 ----
                var atmosphereText = getCh3Atmosphere(bellTolls);

                setStory(`
        <span class="title-line">🏯 锁龙观 · 探索</span>
        <span class="divider">—— —— ——</span>
        ${atmosphereText}

        <span style="color:var(--text-muted);font-size:0.85rem;">🎭 心理压力：<span style="color:${pressureColor};">${pressureText}</span></span>
        <span style="color:var(--text-muted);font-size:0.85rem;">🕯️ 香火：${incense}/3根</span>
        <span class="divider">· · ·</span>
        <span style="color:#d4b87a;">你站在庭院中，四周的门都通向不同的地方。</span>
        <span style="color:var(--text-muted);font-size:0.85rem;">💡 选择一个区域前往探索。</span>
    `);

                // ---- ⭐ 新增：获取区域碎片进度 ----
                function getAreaProgress(areaId) {
                    var fragments = state.ch3.fragments || {};
                    var map = {
                        frontYard: { ids: ['piece1'], label: '前院' },
                        mainHall: { ids: ['piece2'], label: '大殿' },
                        library: { ids: ['piece3'], label: '藏经阁' },
                        alchemyRoom: { ids: ['piece4'], label: '丹房' },
                        backYard: { ids: ['piece5', 'piece6'], label: '后院' },
                    };
                    var data = map[areaId];
                    if (!data) return { collected: 0, total: 0, text: '❓' };
                    var collected = 0;
                    for (var i = 0; i < data.ids.length; i++) {
                        if (fragments[data.ids[i]]) collected++;
                    }
                    var total = data.ids.length;
                    var text = '';
                    if (collected === total && total > 0) {
                        text = '✅ 已集齐';
                    } else if (collected > 0) {
                        text = '🧩 ' + collected + '/' + total;
                    } else {
                        text = '⬜ 未发现';

                    return { collected: collected, total: total, text: text };
                }

                // ---- 构建选项 ----

                var areas = [
                    { id: 'frontYard', label: '🚪 前院', hint: '大门、廊下', status: state.ch3.exploredAreas.frontYard },
                    { id: 'mainHall', label: '🏛️ 大殿', hint: '玄清所在', status: state.ch3.exploredAreas.mainHall },
                    { id: 'library', label: '📚 藏经阁', hint: '书籍、清远', status: state.ch3.exploredAreas.library },
                    { id: 'alchemyRoom', label: '🔥 丹房', hint: '丹炉、药材', status: state.ch3.exploredAreas.alchemyRoom },
                    { id: 'backYard', label: '🌳 后院', hint: '枯井、小屋', status: state.ch3.exploredAreas.backYard },
                ];

                areas.forEach(function (area) {
                    var isExplored = area.status || false;
                    var progress = getAreaProgress(area.id);

                    // 构建 hint：显示碎片进度
                    var hintText = isExplored ? progress.text : area.hint;

                    // 构建 tag：显示探索状态 + 碎片状态
                    var tagText = '';
                    if (!isExplored) {
                        tagText = '🔒 未探索';

                        tagText = '✅ 已完成';
                    } else if (progress.collected > 0) {
                        tagText = '🔍 ' + progress.collected + '/' + progress.total;
                    } else {
                        tagText = '📭 已探索';
                    }

                    opts.push({
                        label: area.label + (isExplored ? ' ✅' : ''),
                        hint: hintText,
                        tag: tagText,
                        action: function () {
                            if (state.gameOver || state._waitingConfirm) return;
                            renderCh3Area(area.id);
                        }
                    });
                });

                // ---- 查看直觉 ----
                opts.push({
                    label: '💭 感受直觉',
                    hint: '你似乎捕捉到了一些线索……',
                    tag: '📌 模糊',

                    action: function () {
                        if (state.gameOver || state._waitingConfirm) return;
                        state.ch2.phase = 'temple_gate';
                        state.flags.chapter2 = true;
                        renderTempleGate();

                renderOptions(opts);
                updateUI();

            // ================================================================
            //  获取道观氛围描述（基于钟声）
            // ================================================================

            function getCh3Atmosphere(bellTolls) {
                var descriptions = [
                    '青瓦白墙，铜铃轻响，诵经声平和如常。',
                    '诵经声加快了节奏，像是有人在催。',
                    '空气中有了一丝焦糊味，像是烧纸的气味。',
                    '铜铃不再响了。四周安静得可怕。',
                    '你能感觉到地面在微微震动。',
                    '钟声停了。有什么东西正在苏醒。'
                ];
                var idx = Math.min(bellTolls, 5);
                return '<span style="color:var(--text-muted);font-size:0.85rem;">🌫️ ' + descriptions[idx] + '</span>';
            }
            // ================================================================
            //  第三章 · 区域探索分发
            // ================================================================

            function renderCh3Area(areaId) {
                if (state.gameOver || state._waitingConfirm) return;

                // ---- 检查是否所有区域都已探索 ----
                var allExplored = state.ch3.exploredAreas.frontYard &&
                    state.ch3.exploredAreas.mainHall &&
                    state.ch3.exploredAreas.library &&
                    state.ch3.exploredAreas.alchemyRoom &&
                    state.ch3.exploredAreas.backYard;

                if (allExplored && state.ch3.phase === 'exploration') {
                    renderCh3AllExplored();
                    return;
                }

                // ---- 区域访问计数 ----
                if (!state.ch3.areaVisitCount) {
                    state.ch3.areaVisitCount = { frontYard: 0, mainHall: 0, library: 0, alchemyRoom: 0, backYard: 0 };
                }
                state.ch3.areaVisitCount[areaId] = (state.ch3.areaVisitCount[areaId] || 0) + 1;

                // ---- 如果是首次探索该区域，标记为已探索并触发钟声 ----
                var isFirstVisit = !state.ch3.exploredAreas[areaId];
                if (isFirstVisit) {
                    state.ch3.exploredAreas[areaId] = true;
                    // 钟声+1
                    state.ch3.bellTolls = Math.min((state.ch3.bellTolls || 0) + 1, 5);
                    showStory(`<span style="color:var(--text-muted);font-size:0.85rem;">🔔 铜钟敲响了一次（${state.ch3.bellTolls}/5）</span>`);
                    // 检查钟声是否触发特殊事件
                    checkBellEvents();
                    saveGame();  // ⬅️ 新增：立即保存探索进度
                }

                // ---- 分发到具体区域 ----
                switch (areaId) {
                    case 'frontYard':
                        renderCh3FrontYard(isFirstVisit);
                        break;
                    case 'mainHall':
                        renderCh3MainHall(isFirstVisit);
                        break;
                    case 'library':
                        renderCh3Library(isFirstVisit);
                        break;
                    case 'alchemyRoom':
                        renderCh3AlchemyRoom(isFirstVisit);
                        break;
                    case 'backYard':
                        renderCh3BackYard(isFirstVisit);
                        break;
                    default:
                        renderCh3Exploration();
                }
                saveGame();
            }

            // ================================================================
            //  钟声事件检查
            // ================================================================

            function checkBellEvents() {
                var tolls = state.ch3.bellTolls || 0;

                // 第2响：后院出现孩子的声音
                if (tolls === 2 && !state.ch3._childSoundTriggered) {
                    state.ch3._childSoundTriggered = true;
                    showStory(`
            <span class="divider">· · ·</span>
            <span style="color:#6a8aaa;">你听到后院传来一声很轻的响动——像是有什么东西被碰倒了。</span>
            <span style="color:var(--text-muted);font-size:0.85rem;">你侧耳倾听，但那声音没有再出现。</span>
        `); saveGame();
                }

                // 第3响：老道士催促
                if (tolls === 3 && !state.ch3._oldTaoistUrgeTriggered) {
                    state.ch3._oldTaoistUrgeTriggered = true;
                    showStory(`
            <span class="divider">· · ·</span>
            <span style="color:#d4b87a;">一个苍老的声音从廊下传来：</span>
            <span class="rule-text" style="color:#d4b87a;">「你该做决定了。钟声不会一直等着你。」</span>
        `); saveGame();
                }

                // 第4响：玄清起身
                if (tolls === 4 && !state.ch3._xuanqingStandTriggered) {
                    state.ch3._xuanqingStandTriggered = true;
                    showStory(`
            <span class="divider">· · ·</span>
            <span style="color:#d45a5a;">大殿里传来了脚步声——有人站了起来。</span>
            <span style="color:var(--text-muted);font-size:0.85rem;">玄清的声音从大殿深处传来：「你还在犹豫什么？」</span>
        `); saveGame();
                    // 压力+1
                    state.ch3.pressure = Math.min((state.ch3.pressure || 0) + 1, 3);

                // 第5响：强制推进
                // 在 checkBellEvents 中，找到第5响的处理

                if (tolls === 5 && !state.ch3._bell5Triggered) {

        <span style="color:var(--text-muted);font-size:0.85rem;">💡 你可以再仔细搜查一个区域（消耗1精力）。</span>
    `);
                    renderOptions([
                        {

                            action: function () {

                                renderCh3Exploration();

            // ================================================================

            function renderCh3MainHall(isFirstVisit) {

            function clearAllCache() {
                // 如果游戏正在运行且有未保存的进度，先保存
                if (document.getElementById('game-content').style.display !== 'none') {
                    saveGame();
                }

                // 确认对话框
                const confirmed = confirm(
                    '⚠️ 确定要清除所有缓存吗？\n\n' +
                    '这将永久删除：\n' +
                    '• 游戏存档（当前进度）\n' +
                    '• 已解锁的结局记录\n' +
                    '• 所有规则和状态\n\n' +
                    '此操作不可撤销！'
                );

                if (!confirmed) return;

                // 第二次确认（更安全）
                const doubleConfirm = confirm(
                    '🔄 再次确认：你真的要清除所有数据吗？\n' +
                    '所有进度将永久丢失。'
                );

                if (!doubleConfirm) return;

                try {
                    // 清除所有 localStorage 数据
                    localStorage.clear();

                    // 重置游戏状态（防止残留数据导致显示异常）
                    if (typeof resetGame === 'function') {
                        resetGame();
                    }

                    // 显示成功提示
                    alert('✅ 所有缓存已清除！页面即将刷新。');

                    // 刷新页面，让一切回到初始状态
                    window.location.reload();
                } catch (e) {
                    console.error('清除缓存失败:', e);
                    alert('❌ 清除缓存失败，请手动清除浏览器数据。');
                }
            }


            // ---------- 规则面板切换 ----------
            let rulesPanelOpen = false;
            document.getElementById('rulesToggle').addEventListener('click', () => { toggleRulesPanel(); });
            document.getElementById('rulesToggleBtn').addEventListener('click', () => { toggleRulesPanel(); });

            // ---- 打开守卷人模态框 ----
            function openKeeperModal() {
                const cross = getCrossSave();
                // 如果守卷人已离去（gone），特殊处理
                if (cross.keeperPhase === 'gone') {
                    setKeeperModalContent('🍵 守卷人已去', '他走了。座位上只剩一杯温茶，茶还是热的。你端起茶杯，茶汤映出你自己的脸——你已经不是来时的那个你了。');
                    renderKeeperModalOptions([{
                        label: '🌙 退出',
                        action: closeKeeperModal
                    }]);
                    document.getElementById('keeper-modal').classList.add('active');
                    return;
                }

                // 生成对话内容
                const dialogue = generateKeeperDialogue(cross);
                setKeeperModalContent(dialogue.title || '🧘 陈守一', dialogue.body);

                // 生成选项
                const options = [];
                // 选项1: 看看走过的路（始终显示）
                options.push({
                    label: '📜 看看我走过的路',
                    hint: '回顾已解锁的结局',
                    action: function () {
                        toggleKeeperGallery();
                    }
                });
                // 选项2: 指引（第四章解锁时）
                if (cross.chapter4Unlocked && !cross.chapter4Completed) {
                    options.push({
                        label: '🗺️ 我该往哪走？',
                        hint: '进入第四章',
                        tag: '🔥 薪火之门',
                        action: function () {
                            closeKeeperModal();
                            // 触发第四章入口（后续实现）
                            if (typeof enterChapter4 === 'function') {
                                enterChapter4();
                            } else {
                                alert('第四章尚未开放。');
                            }
                        }
                    });
                }
                // 选项3: 你记得我吗？（访问次数>1时）
                if (cross.keeperMemory.totalVisits > 1) {
                    options.push({
                        label: '💭 你记得我吗？',
                        hint: '个性化对话',
                        action: function () {
                            showPersonalizedMemory(cross);
                        }
                    });
                }
                // 选项4: 退出
                options.push({
                    label: '🌙 没什么……',
                    hint: '关闭',
                    action: closeKeeperModal
                });

                renderKeeperModalOptions(options);

                // 显示模态框
                document.getElementById('keeper-modal').classList.add('active');

                // 更新守卷人访问次数
                cross.keeperMemory.totalVisits = (cross.keeperMemory.totalVisits || 0) + 1;
                saveCrossSave(cross);
                updateKeeperUI(); // 更新主菜单状态
            }

            function closeKeeperModal() {
                document.getElementById('keeper-modal').classList.remove('active');

                document.getElementById('keeperModalGallery').style.display = 'none';
                // 恢复主菜单守卷人UI
                updateKeeperUI();

            // ---- 设置模态框内容 ----
            function setKeeperModalContent(title, body) {
                const titleEl = document.querySelector('.keeper-modal-title');
                const bodyEl = document.getElementById('keeperModalBody');
                if (titleEl) titleEl.textContent = title;
                if (bodyEl) bodyEl.innerHTML = body.replace(/\n/g, '<br>');
            }

            // ---- 渲染模态框选项 ----
            function renderKeeperModalOptions(options) {
                const container = document.getElementById('keeperModalOptions');
                container.innerHTML = '';
                if (!options || options.length === 0) {
                    container.innerHTML = '<div style="color:var(--text-muted);text-align:center;font-size:0.8rem;padding:8px;">—— 没有更多选项 ——</div>';
                    return;
                }
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn' + (opt.disabled ? ' disabled' : '');
                    btn.innerHTML = `${opt.label}${opt.hint ? `<span class="hint">${opt.hint}</span>` : ''}${opt.tag ? `<span class="tag">${opt.tag}</span>` : ''}`;
                    if (!opt.disabled) {
                        btn.addEventListener('click', function () {
                            if (opt.action) opt.action();
                        });
                    }
                    container.appendChild(btn);
                });
            }

                };

            // ---- 开始新游戏 ----
            function startNewGame() {
                localStorage.removeItem(SAVE_KEY);
                resetGame();
                // 增加周目计数
                const cross = getCrossSave();
                cross.playthroughCount = (cross.playthroughCount || 0) + 1;
                // 记录首次周目的开始时间
                if (!cross.keeperMemory.firstVisit) {
                    cross.keeperMemory.firstVisit = new Date().toISOString();
                }
                saveCrossSave(cross);
                showGameContent();
                goToScene('intro');
                saveGame();
            }

            // ---- 继续游戏 ----
            function continueGame() {
                if (!hasSave()) {
                    alert('没有找到存档，请开始新游戏。');
                    return;
                }
                const loaded = loadGame();
                if (!loaded) {
                    alert('存档损坏，请开始新游戏。');
                    return;
                }

                // 强制清除规则确认锁定
                state._waitingConfirm = false;
                state._confirmResolve = null;
                document.getElementById('rule-notification').classList.remove('show');
                const container = document.getElementById('options-area');
                const confirmBtn = container.querySelector('.confirm-btn');
                if (confirmBtn) confirmBtn.remove();
                document.querySelectorAll('.option-btn:not(.confirm-btn)').forEach(btn => {
                    btn.style.pointerEvents = '';
                    btn.style.opacity = '';
                });

                showGameContent();
                // 增加守卷人访问次数
                const cross = getCrossSave();
                cross.keeperMemory.totalVisits = (cross.keeperMemory.totalVisits || 0) + 1;
                saveCrossSave(cross);
                // 同步跨周目存档
                syncCrossSave();
                // 如果游戏已结束，显示结局
                if (state.gameOver) {
                    if (state._endingType) {
                        renderEndingContent(state._endingType);
                    } else {
                        setStory('你上次的游戏已经结束。点击下方按钮重新开始。');
                        renderOptions([{
                            label: '🔄 重新开始',
                            action: function () {
                                if (state._waitingConfirm) return;
                                startNewGame();
                            }
                        }]);
                    }
                    return;
                }

                // 刷新当前场景
                if (currentScene && SCENES[currentScene] && SCENES[currentScene].render) {
                    SCENES[currentScene].render();
                } else {
                    renderMainOptions();
                }
            }

                    document.getElementById('rule-notification').classList.remove('show');

                    document.querySelectorAll('.option-btn:not(.confirm-btn)').forEach(btn => {
                        btn.style.pointerEvents = '';
                        btn.style.opacity = '';
                    });
                }

                document.getElementById('options-area').innerHTML = '';

            // ----- 结局联动评论（已解锁结局时插入） -----
            const KEEPER_ENDING_COMMENTS = {
                'TE1_薪火相传': '你记得那场火。你说你不后悔。',
                'HE1_幸存者': '你活着。你说这就够了。',
                'HE2_被救助': '你被带走了。你说那是对的。',
                'NE1_老实人_新': '你住下了。你说这样也行。',
                'NE2_被标记的归来': '你离开了。但你一直知道门没关。',
                'BE1_龙化值过高': '你变了。你说那不是你的错。',
                'BE2_大不敬': '你没有香。你说你不信。',
                'BE3_惊扰': '你跑了。你说你害怕。',
                'BE4_半途而废': '你停了。你说你累了。',
                'BE5_祭品_被迫献祭': '你被献了。你说你没得选。',
                'BE6_自投罗网': '你走对了路。但你走错了人。',
                'BE7_同化': '你跪下了。你说你不想再走了。',
                'BE8_被吞没': '你站住了。你说你不确定。',
                'BE_BloodSacrifice': '你动手了。你说那是唯一的路。',
                'BE_Accomplice': '你站在门口。你说你没做。',
                'NE_SpareLife': '你停手了。你说你不知道。',
                'BE_DragonSealer': '你坐下了。你说那是你的位置。',
                'HE_Farewell': '你送别了。你说你没有回头。',
                'BE_Price': '你交换了。你说那是代价。',
                'NE_Ajar': '你没关紧。你说你不想关上。',
                'BE_Forgotten': '你忘了。你说那不重要。',
                'BE_BrokenPen': '他不能写了。你说你会替他记。',
                'BE_LifeSwap': '你拿走了。你说那是他给的。',
                'NE_EmptyFurnace': '你熄了。你说你没有失去。'
            };

            // ----- 行为模式修饰语 -----
            function getBehavioralComment(behavioralTraits) {
                if (!behavioralTraits) return '';
                const traits = behavioralTraits;
                let parts = [];
                if (traits.prefersWest >= 5) parts.push('你总是先往西走。那里有什么在等你吗？');
                if (traits.stopsAtStone >= 5) parts.push('你会在不该停的地方停下来。你在找什么？');
                if (traits.talksToEveryone >= 5) parts.push('你跟所有人都说过话。你记住了多少？');
                if (traits.rushesThrough >= 5) parts.push('你走得太快了。有些地方你还没看清。');
                if (traits.readsEverything >= 5) parts.push('你读了所有的字。你相信文字。');
                if (parts.length === 0) return '';
                return ' ' + parts.join(' ');
            }

            // ----- 生成守卷人对话 -----
            function generateKeeperDialogue(crossSave) {
                if (!crossSave) return { title: '陌生人', dialogue: '你还没有开始你的旅程。', options: [] };

                const phase = crossSave.keeperPhase || 'stranger';
                const phaseData = KEEPER_PHRASES[phase] || KEEPER_PHRASES.stranger;
                const unlockedEndings = crossSave.endingsUnlocked || [];
                const memory = crossSave.keeperMemory || {};
                const behavioralComment = getBehavioralComment(memory.behavioralTraits || {});

                // 基础对话
                let dialogue = phaseData.greeting + '\n\n' + phaseData.dialogue;

                // 插入行为修饰
                if (behavioralComment) {
                    dialogue += '\n\n' + behavioralComment;
                }

                // 插入一个随机已解锁结局的评论（如果有）
                if (unlockedEndings.length > 0) {
                    const randomEnding = unlockedEndings[Math.floor(Math.random() * unlockedEndings.length)];
                    const comment = KEEPER_ENDING_COMMENTS[randomEnding];
                    if (comment) {
                        dialogue += '\n\n' + comment;
                    }
                }

                // 如果已解锁所有结局，添加特殊评论
                if (unlockedEndings.length >= Object.keys(ENDING_META).length) {
                    dialogue += '\n\n你已经走完了所有的路。我不需要再记了。你已经替我记得够多了。';
                }

                // 如果删档过，添加特殊回应
                if (memory.deleteCount > 0) {
                    dialogue += '\n\n你把那些字都擦掉了。你知道它们还会回来的。';
                }

                // 构建选项
                let options = [
                    {
                        label: '📜 看看我走过的路',
                        hint: '你走过的路，我都记得',
                        action: 'showGallery'
                    }
                ];

                // 如果第四章已解锁，添加入口选项
                if (crossSave.chapter4Unlocked) {
                    options.push({
                        label: '🗺️ 我该往哪走？',
                        hint: '门已经开了',
                        tag: '⭐ 薪火之门',
                        action: 'enterChapter4'
                    });
                }

                // 如果访问次数 > 1，添加个性化选项
                if (memory.totalVisits > 1) {
                    options.push({
                        label: '💭 你记得我吗？',
                        hint: '他看了你一眼',
                        action: 'rememberMe'
                    });
                }

                // 关闭选项
                options.push({
                    label: '🌙 没什么……',
                    hint: '你转身离开',
                    action: 'closeModal'
                });

                return {
                    title: phaseData.title,
                    dialogue: dialogue,
                    options: options,
                    phase: phase
                };
            }

            // ----- 守卷人模态框控制 -----
            let keeperModalOpen = false;

            function openKeeperModal() {
                if (keeperModalOpen) return;
                keeperModalOpen = true;

                const modal = document.getElementById('keeper-modal');
                modal.classList.add('active');

                // 更新守卷人阶段（先同步）
                const cross = getCrossSave();
                cross.keeperPhase = getKeeperPhase(cross);
                saveCrossSave(cross);

                // 生成对话
                const data = generateKeeperDialogue(cross);

                // 更新标题
                document.getElementById('keeperModalPhase').textContent = data.title;

                // 更新对话内容
                const body = document.getElementById('keeperModalBody');
                body.innerHTML = data.dialogue.replace(/\n/g, '<br>');

                // 更新选项按钮
                renderKeeperOptions(data.options);
            }

            function closeKeeperModal() {
                keeperModalOpen = false;
                document.getElementById('keeper-modal').classList.remove('active');
            }

            // ----- 渲染守卷人选项 -----
            function renderKeeperOptions(options) {
                const footer = document.getElementById('keeperModalOptions');
                footer.innerHTML = '';
                if (!options || options.length === 0) {
                    const closeBtn = document.createElement('button');
                    closeBtn.className = 'keeper-option';
                    closeBtn.textContent = '🌙 关闭';
                    closeBtn.addEventListener('click', closeKeeperModal);
                    footer.appendChild(closeBtn);
                    return;
                }
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'keeper-option';
                    btn.innerHTML = `${opt.label}${opt.hint ? `<span class="hint">${opt.hint}</span>` : ''}${opt.tag ? `<span class="tag">${opt.tag}</span>` : ''}`;
                    btn.addEventListener('click', function () {
                        handleKeeperAction(opt.action);
                    });
                    footer.appendChild(btn);
                });
            }

            // ----- 处理守卷人选项动作 -----
            function handleKeeperAction(action) {
                switch (action) {
                    case 'showGallery':
                        renderKeeperGallery();
                        break;
                    case 'enterChapter4':
                        // 关闭模态框，触发第四章入口（后续实现）
                        closeKeeperModal();
                        // 显示提示，或者直接进入第四章
                        alert('第四章入口（待实现）');
                        break;
                    case 'rememberMe':
                        // 显示个性化回忆
                        const cross = getCrossSave();
                        const memory = cross.keeperMemory;
                        let text = '他看了看你，像是在翻一本旧书。\n\n';
                        if (memory.firstVisit) {
                            text += `你第一次来的时候，是 ${new Date(memory.firstVisit).toLocaleDateString()}。那时候你还不认识路。\n`;
                        }
                        if (memory.totalVisits > 1) {
                            text += `你来了 ${memory.totalVisits} 次。每次来，你都会多知道一点。\n`;
                        }
                        if (cross.playthroughCount > 1) {
                            text += `你走过 ${cross.playthroughCount} 轮。每一次你都会选不一样的路。\n`;
                        }
                        text += '\n他安静地看着你，像是在说：你记得的，我都记得。';
                        document.getElementById('keeperModalBody').innerHTML = text.replace(/\n/g, '<br>');
                        // 更新选项：返回
                        renderKeeperOptions([
                            { label: '🔙 返回', hint: '回到对话', action: 'backToDialogue' }
                        ]);
                        break;
                    case 'backToDialogue':
                        // 重新生成对话
                        const crossData = getCrossSave();
                        const newData = generateKeeperDialogue(crossData);
                        document.getElementById('keeperModalBody').innerHTML = newData.dialogue.replace(/\n/g, '<br>');
                        renderKeeperOptions(newData.options);
                        break;
                    case 'closeModal':
                        closeKeeperModal();
                        break;
                    default:
                        closeKeeperModal();
                }
            }

            // ----- 内嵌结局画廊 -----
            function renderKeeperGallery() {
                const body = document.getElementById('keeperModalBody');
                const cross = getCrossSave();
                const unlocked = cross.endingsUnlocked || [];
                const allTypes = Object.keys(ENDING_META);

                let html = '<div style="margin-bottom:12px;color:var(--text-gold);font-size:0.9rem;">📜 你走过的路，我都记得。</div>';
                html += '<div id="keeper-gallery">';

                // 先将完美结局置顶
                const perfectType = 'TE1_薪火相传';
                const perfectMeta = ENDING_META[perfectType];
                if (perfectMeta) {
                    const isUnlocked = unlocked.includes(perfectType);
                    html += `<div class="keeper-gallery-card perfect ${isUnlocked ? '' : 'locked'}" data-type="${perfectType}">`;
                    if (isUnlocked) {
                        html += `<div class="card-icon">${perfectMeta.icon}</div>`;
                        html += `<div class="card-title">${perfectMeta.title}</div>`;
                        html += `<div class="card-subtitle">${perfectMeta.subtitle}</div>`;
                        html += `<div class="card-badge">⭐ 完美</div>`;
                    } else {
                        html += `<div class="card-lock">🔒</div>`;
                        html += `<div class="card-lock-label">未解锁</div>`;
                    }
                    html += '</div>';
                }

                // 其他结局
                allTypes.forEach(type => {
                    if (type === perfectType) return;
                    const meta = ENDING_META[type];
                    if (!meta) return;
                    const isUnlocked = unlocked.includes(type);
                    html += `<div class="keeper-gallery-card ${isUnlocked ? '' : 'locked'}" data-type="${type}">`;
                    if (isUnlocked) {
                        html += `<div class="card-icon">${meta.icon}</div>`;
                        html += `<div class="card-title">${meta.title}</div>`;
                        html += `<div class="card-subtitle">${meta.subtitle}</div>`;
                        html += `<div class="card-badge">已解锁</div>`;
                    } else {
                        html += `<div class="card-lock">🔒</div>`;
                        html += `<div class="card-lock-label">未解锁</div>`;
                    }
                    html += '</div>';
                });

                html += '</div>';
                html += `<div style="margin-top:8px;font-size:0.7rem;color:var(--text-muted);text-align:center;">已解锁 ${unlocked.length} / ${allTypes.length} 个结局</div>`;

                body.innerHTML = html;

                // 绑定点击事件（查看结局详情）
                document.querySelectorAll('#keeper-gallery .keeper-gallery-card:not(.locked)').forEach(card => {
                    card.addEventListener('click', function () {
                        const type = this.dataset.type;
                        if (!type) return;
                        // 以只读模式显示结局内容（复用 renderEndingContent）
                        // 但我们需要在模态框内显示，所以将结局文本插入 body
                        // 临时保存当前内容，以便返回
                        const currentHTML = body.innerHTML;
                        // 使用 renderEndingContent 但我们需要捕获生成的文本
                        // 由于 renderEndingContent 会调用 setStory 和 renderOptions，不适合直接使用
                        // 我们改为直接显示结局的短描述，并提供返回按钮
                        const meta = ENDING_META[type];
                        if (meta) {
                            body.innerHTML = `
                    <div style="text-align:center;padding:8px 0;">
                        <div style="font-size:2rem;">${meta.icon}</div>
                        <div style="font-size:1.2rem;color:var(--text-gold);">${meta.title}</div>
                        <div style="font-size:0.9rem;color:var(--text-muted);">${meta.subtitle}</div>
                        <div style="margin:12px 0;line-height:1.8;font-size:0.9rem;">${meta.shortDesc}</div>
                        <button class="keeper-option" style="margin:0 auto;display:block;text-align:center;padding:6px 20px;" onclick="renderKeeperGallery()">🔙 返回画廊</button>
                    </div>
                `;
                            // 更新选项：去掉原来的选项，只保留返回（由上面的按钮处理）
                            renderKeeperOptions([]);
                        }
                    });
                });

                // 更新选项：返回对话
                renderKeeperOptions([
                    { label: '🔙 返回对话', hint: '回到树下', action: 'backToDialogue' }
                ]);
            }

            // ----- 绑定主菜单守卷人按钮和剪影 -----
            document.addEventListener('DOMContentLoaded', function () {
                // 守卷人按钮
                const keeperBtn = document.getElementById('btn-keeper');
                if (keeperBtn) {
                    keeperBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        openKeeperModal();
                    });
                }

                // 守卷人剪影
                const silhouette = document.getElementById('keeper-silhouette');
                if (silhouette) {
                    silhouette.addEventListener('click', function (e) {
                        e.stopPropagation();
                        openKeeperModal();
                    });
                }

                // 模态框关闭按钮
                const closeBtn = document.getElementById('keeperModalClose');
                if (closeBtn) {
                    closeBtn.addEventListener('click', closeKeeperModal);
                }

                // 点击遮罩关闭
                const overlay = document.querySelector('.keeper-modal-overlay');
                if (overlay) {
                    overlay.addEventListener('click', closeKeeperModal);
                }
            });

            // ----- 更新主菜单守卷人状态和光晕 -----
            function updateKeeperUI() {
                const cross = getCrossSave();
                const phase = cross.keeperPhase || 'stranger';
                const phaseData = KEEPER_PHRASES[phase] || KEEPER_PHRASES.stranger;
                const statusText = document.getElementById('keeperStatusText');
                if (statusText) {
                    statusText.textContent = '—— ' + phaseData.title + ' ——';
                }
                // 更新按钮提示
                const hint = document.getElementById('keeperHint');
                if (hint) {
                    hint.textContent = '—— ' + phaseData.title + ' ——';
                }
                // 第四章解锁光晕
                const silhouette = document.getElementById('keeper-silhouette');
                if (silhouette) {
                    if (cross.chapter4Unlocked && !cross.trueEndingUnlocked) {
                        silhouette.classList.add('glow');
                    } else {
                        silhouette.classList.remove('glow');
                    }
                }
            }

            // 在初始化时调用 updateKeeperUI
            // 在 syncCrossSave 后也应调用
            // 为了保持简单，我们在主菜单显示时调用
            // 修改 showMainMenu 函数
            const originalShowMainMenu = showMainMenu;
            showMainMenu = function () {
                originalShowMainMenu();
                updateKeeperUI();
            };

            // ---------- 初始化 ----------
            // ---- 预加载主菜单背景图 + 进度显示 ----
            // ---- 预加载主菜单背景图（模拟平滑进度） ----
            function loadBackgroundWithProgress() {
                var statusEl = document.getElementById('loading-status');
                if (!statusEl) return;

                var img = new Image();
                var progress = 0;
                var timer = null;
                var isCompleted = false;

                // 更新进度显示
                function updateProgress(value) {
                    if (isCompleted) return;
                    progress = Math.min(value, 95);
                    statusEl.textContent = '—— 请等待龙神虚影加载 ' + progress + '% ——';
                }

                // 开始模拟进度（从 1% 平滑到 90%）
                var currentStep = 0;
                timer = setInterval(function () {
                    if (isCompleted) return;
                    // 每次增加 1~4%，速度逐渐放缓
                    var step = 1 + Math.floor(Math.random() * 3);
                    var newProgress = Math.min(progress + step, 90);
                    updateProgress(newProgress);
                    // 如果到了 90%，减慢速度等待真实加载
                    if (progress >= 90) {
                        clearInterval(timer);
                        timer = setInterval(function () {
                            if (isCompleted) return;
                            // 在 90~95 之间缓慢波动
                            var random = 90 + Math.floor(Math.random() * 5);
                            updateProgress(random);
                        }, 300);
                    }
                }, 80);

                // ---- 真实图片加载完成 ----
                img.onload = function () {
                    isCompleted = true;
                    clearInterval(timer);
                    statusEl.textContent = '—— 龙神虚影已显 ——';
                    // 0.6 秒后切换为正式副标题
                    setTimeout(function () {
                        statusEl.textContent = '—— 第一章 · 邱龙村 ——';
                        statusEl.style.color = 'var(--text-gold)';
                        statusEl.style.fontStyle = 'normal';
                        statusEl.style.opacity = '0.8';
                    }, 600);
                };

                img.onerror = function () {
                    clearInterval(timer);
                    isCompleted = true;
                    statusEl.textContent = '—— 龙神虚影加载失败，请刷新 ——';
                    statusEl.style.color = '#d45a5a';
                };

                // 超时保护（8 秒后强制显示完成）
                var timeoutId = setTimeout(function () {
                    if (!isCompleted) {
                        clearInterval(timer);
                        isCompleted = true;
                        statusEl.textContent = '—— 龙神虚影已显 ——';
                        setTimeout(function () {
                            statusEl.textContent = '—— 第一章 · 邱龙村 ——';
                            statusEl.style.color = 'var(--text-gold)';
                            statusEl.style.fontStyle = 'normal';
                        }, 400);
                    }
                }, 8000);

                // 开始加载图片
                img.src = 'image/main1.jpg';
            }
            function init() {
                // ---- 获取所有需要用到的 DOM 元素 ----
                const btnNewGame = document.getElementById('btn-new-game');
                const btnContinue = document.getElementById('btn-continue');
                const btnKeeper = document.getElementById('btn-keeper');
                const btnClearCache = document.getElementById('btn-clear-cache');
                const btnReturnMenu = document.getElementById('btn-return-menu');
                const keeperModalClose = document.getElementById('keeperModalClose');
                const keeperModalOverlay = document.querySelector('.keeper-modal-overlay');
                const chapterSelectClose = document.getElementById('chapter-select-close');
                const chapterSelectModal = document.getElementById('chapter-select-modal');

                // ---- 1. 开始游戏按钮（支持章节选择） ----
                if (btnNewGame) {
                    btnNewGame.addEventListener('click', function (e) {
                        e.stopPropagation();

                        // 获取跨周目存档，检查已解锁的章节
                        const cross = getCrossSave();
                        const unlocked = cross.unlockedChapters || {
                            chapter1: true,
                            chapter2: false,
                            chapter3: false,
                            chapter4: false,
                        };

                        // 如果只有第一章解锁，直接开始，不弹窗
                        if (!unlocked.chapter2 && !unlocked.chapter3) {
                            startFromChapter('chapter1');
                            return;
                        }

                        // 否则弹出章节选择
                        openChapterSelect();
                    });
                }

                // ---- 2. 继续游戏按钮 ----
                if (btnContinue) {
                    btnContinue.addEventListener('click', function (e) {
                        e.stopPropagation();
                        continueGame();
                    });
                }

                // ---- 3. 守卷人按钮 ----
                if (btnKeeper) {
                    btnKeeper.addEventListener('click', function (e) {
                        e.stopPropagation();
                        openKeeperModal();
                    });
                }

                // ---- 4. 清除缓存按钮 ----
                if (btnClearCache) {
                    btnClearCache.addEventListener('click', function (e) {
                        e.stopPropagation();
                        clearAllCache();
                    });
                }

                // ---- 5. 返回主菜单按钮 ----
                if (btnReturnMenu) {
                    btnReturnMenu.addEventListener('click', function (e) {
                        e.stopPropagation();
                        returnToMenu();
                    });
                }

                // ---- 6. 守卷人模态框关闭 ----
                if (keeperModalClose) {
                    keeperModalClose.addEventListener('click', closeKeeperModal);
                }
                if (keeperModalOverlay) {
                    keeperModalOverlay.addEventListener('click', closeKeeperModal);
                }

                // ---- 7. 章节选择模态框关闭 ----
                if (chapterSelectClose) {
                    chapterSelectClose.addEventListener('click', closeChapterSelect);
                }
                if (chapterSelectModal) {
                    chapterSelectModal.addEventListener('click', function (e) {
                        if (e.target === this) {
                            closeChapterSelect();
                        }
                    });
                }

                // ---- 8. 页面关闭时自动保存 ----
                window.addEventListener('beforeunload', function () {
                    if (document.getElementById('game-content').style.display !== 'none') {
                        saveGame();
                    }
                });

                // ---- 9. 初始化跨周目存档 ----
                const cross = getCrossSave();
                // 确保 unlockedChapters 字段存在
                if (!cross.unlockedChapters) {
                    cross.unlockedChapters = {
                        chapter1: true,
                        chapter2: false,
                        chapter3: false,
                        chapter4: false,
                    };
                    saveCrossSave(cross);
                }

                // ---- 10. 预加载主菜单背景图 ----
                loadBackgroundWithProgress();

                // ---- 11. 粒子跟随鼠标（氛围效果） ----
                let mouseX = 0, mouseY = 0;
                document.addEventListener('mousemove', function (e) {
                    const rect = document.getElementById('main-menu').getBoundingClientRect();
                    mouseX = (e.clientX - rect.left) / rect.width - 0.5;
                    mouseY = (e.clientY - rect.top) / rect.height - 0.5;
                    document.querySelectorAll('.menu-particle').forEach(function (p, i) {
                        var speed = 10 + i * 2;
                        p.style.transform = 'translate(' + (mouseX * speed) + 'px, ' + (mouseY * speed) + 'px)';
                    });
                });

                // ---- 12. 移除旧画廊按钮（如果存在） ----
                var oldGalleryBtn = document.getElementById('btn-gallery');
                if (oldGalleryBtn) {
                    oldGalleryBtn.removeEventListener('click', renderEndingGallery);
                }

                // ---- 13. 显示主菜单（同时更新守卷人UI） ----
                showMainMenu();
            }
            window.onload = init;
        </script>
