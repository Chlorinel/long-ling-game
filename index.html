<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙岭观前坑 · 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --bg-primary: #0d0a08;
            --bg-card: #1a1410;
            --bg-panel: #241e18;
            --border-gold: #8b7a4a;
            --text-primary: #e8ddd0;
            --text-muted: #a8957a;
            --text-gold: #d4b87a;
            --red-bright: #8a2a2a;
            --font-serif: 'Noto Serif SC', '华文楷体', 'KaiTi', serif;
            --font-title: 'Ma Shan Zheng', '华文楷体', cursive;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(60, 30, 20, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 20, 50, 0.3) 0%, transparent 70%);
        }

        #game-container {
            width: 100%;
            max-width: 860px;
            height: 96vh;
            max-height: 820px;
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        #status-bar {
            background: linear-gradient(180deg, #1f1812 0%, #16100c 100%);
            border-bottom: 1px solid var(--border-gold);
            padding: 8px 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4px 12px;
            flex-shrink: 0;
            z-index: 1;
            position: relative;
        }

        #status-bar .title {
            font-family: var(--font-title);
            font-size: 1.2rem;
            color: var(--text-gold);
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(180, 140, 80, 0.2);
            white-space: nowrap;
        }

        .status-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 12px;
            font-size: 0.75rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
        }

        .status-item .label {
            opacity: 0.7;
        }

        .status-item .value {
            color: var(--text-primary);
            font-weight: 700;
            min-width: 18px;
        }

        .stamina-dots {
            display: flex;
            gap: 3px;
        }

        .stamina-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            background: #2a221a;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .stamina-dot.filled {
            background: #4a7a4a;
            border-color: #6aaa6a;
            box-shadow: 0 0 10px rgba(74, 122, 74, 0.3);
            color: #b0e0b0;
        }

        .stamina-dot.spent {
            opacity: 0.2;
            background: #1a1410;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bar-track {
            width: 60px;
            height: 5px;
            background: #2a221a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #3a322a;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .bar-fill.dragon {
            background: linear-gradient(90deg, #4a7a4a, #8a5a3a, #aa4a2a);
        }

        .bar-fill.sanity {
            background: linear-gradient(90deg, #4a5a8a, #7a8aaa, #aac0e0);
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
            padding: 0 18px 0 18px;
        }

        #story-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 10px 10px 10px;
            scroll-behavior: smooth;
        }

        #story-area::-webkit-scrollbar {
            width: 4px;
        }

        #story-area::-webkit-scrollbar-track {
            background: #1a1410;
        }

        #story-area::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
            transition: background 0.5s, color 0.5s;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 0 -6px;
        }

        .story-text .highlight {
            color: var(--text-gold);
        }

        .story-text .danger {
            color: #d45a5a;
        }

        .story-text .rule-text {
            display: block;
            padding: 6px 14px;
            margin: 5px 0;
            border-left: 3px solid var(--text-gold);
            background: rgba(180, 140, 80, 0.06);
            font-size: 0.9rem;
            color: #d4c8b0;
        }

        .story-text .divider {
            display: block;
            text-align: center;
            color: var(--text-muted);
            margin: 10px 0;
            letter-spacing: 6px;
            opacity: 0.4;
        }

        .story-text .title-line {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--text-gold);
            text-align: center;
            margin: 8px 0 12px 0;
            letter-spacing: 2px;
        }

        .story-text .nursery-rhyme {
            display: block;
            padding: 10px 14px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-radius: 6px;
            font-style: italic;
            color: #d4c8b0;
            line-height: 2;
            white-space: pre-line;
        }

        .story-text .ending-title {
            font-size: 1.8rem;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
        }

        .story-text .info-box {
            display: block;
            padding: 8px 14px;
            margin: 6px 0;
            border-left: 3px solid #6a8aaa;
            background: rgba(100, 130, 170, 0.06);
            font-size: 0.9rem;
            color: #b0c8d8;
        }

        .story-text .km-progress {
            display: block;
            text-align: center;
            color: var(--text-gold);
            font-size: 0.85rem;
            margin: 4px 0;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .story-text .comedy-box {
            display: block;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(180, 140, 80, 0.12);
            border-radius: 8px;
            border: 1px solid var(--border-gold);
            color: #d4c8b0;
            line-height: 2;
        }

        .story-text .feedback {
            display: block;
            padding: 8px 12px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-left: 3px solid var(--text-gold);
            color: var(--text-gold);
            font-weight: 500;
        }

        /* ===== 结局配色 ===== */
        /* HE - 暖金色 */
        .story-text.ending-he {
            background: #d4c8a0;
            color: #3a2a1a;
        }

        .story-text.ending-he .ending-title {
            color: #5a3a1a;
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-he .divider {
            color: #8a7a5a;
        }

        .story-text.ending-he .rule-text {
            background: rgba(200, 180, 150, 0.2);
            border-left-color: #8a7a5a;
            color: #3a2a1a;
        }

        .story-text.ending-he .highlight {
            color: #5a3a1a;
        }

        /* BE2 大不敬 - 暗红底深红字 */
        .story-text.ending-be2 {
            background: #2a0a0a;
            color: #8a2a2a;
        }

        .story-text.ending-be2 .ending-title {
            color: #aa2a2a;
            text-shadow: 0 0 40px rgba(200, 30, 30, 0.5);
        }

        .story-text.ending-be2 .divider {
            color: #4a1a1a;
        }

        .story-text.ending-be2 .rule-text {
            background: rgba(80, 20, 20, 0.2);
            border-left-color: #8a2a2a;
            color: #aa4a4a;
        }

        .story-text.ending-be2 .highlight {
            color: #aa4a4a;
        }

        /* BE3 惊扰 - 暗紫底紫红字 */
        .story-text.ending-be3 {
            background: #1a0a1a;
            color: #7a2a6a;
        }

        .story-text.ending-be3 .ending-title {
            color: #aa2a8a;
            text-shadow: 0 0 40px rgba(180, 30, 150, 0.5);
        }

        .story-text.ending-be3 .divider {
            color: #3a1a3a;
        }

        .story-text.ending-be3 .rule-text {
            background: rgba(60, 20, 50, 0.2);
            border-left-color: #8a2a7a;
            color: #9a4a8a;
        }

        .story-text.ending-be3 .highlight {
            color: #aa4a9a;
        }

        /* BE4 半途而废 - 暗灰底深灰字 */
        .story-text.ending-be4 {
            background: #141414;
            color: #5a5a5a;
        }

        .story-text.ending-be4 .ending-title {
            color: #7a7a7a;
            text-shadow: 0 0 30px rgba(100, 100, 100, 0.3);
        }

        .story-text.ending-be4 .divider {
            color: #2a2a2a;
        }

        .story-text.ending-be4 .rule-text {
            background: rgba(40, 40, 40, 0.2);
            border-left-color: #5a5a5a;
            color: #6a6a6a;
        }

        .story-text.ending-be4 .highlight {
            color: #7a7a7a;
        }

        /* 老实人 - 暗绿 */
        .story-text.ending-normal {
            background: #0a1a0a;
            color: #3a5a3a;
        }

        .story-text.ending-normal .ending-title {
            color: #4a7a4a;
            text-shadow: 0 0 30px rgba(60, 160, 60, 0.3);
        }

        .story-text.ending-normal .divider {
            color: #1a2a1a;
        }

        .story-text.ending-normal .rule-text {
            background: rgba(30, 60, 30, 0.2);
            border-left-color: #4a7a4a;
            color: #4a6a4a;
        }

        .story-text.ending-normal .highlight {
            color: #5a8a5a;
        }

        /* 龙化过高 - 暗红亮红 */
        .story-text.ending-dragon {
            background: #1a0505;
            color: #aa3a2a;
        }

        .story-text.ending-dragon .ending-title {
            color: #cc3a2a;
            text-shadow: 0 0 50px rgba(220, 50, 30, 0.6);
        }

        .story-text.ending-dragon .divider {
            color: #3a1a1a;
        }

        .story-text.ending-dragon .rule-text {
            background: rgba(80, 20, 10, 0.2);
            border-left-color: #aa3a2a;
            color: #cc5a4a;
        }

        .story-text.ending-dragon .highlight {
            color: #dd5a4a;
        }

        /* 被龙化 - 暗金 */
        .story-text.ending-corrupted {
            background: #1a1208;
            color: #aa8a3a;
        }

        .story-text.ending-corrupted .ending-title {
            color: #ccaa3a;
            text-shadow: 0 0 40px rgba(200, 170, 50, 0.5);
        }

        .story-text.ending-corrupted .divider {
            color: #3a2a1a;
        }

        .story-text.ending-corrupted .rule-text {
            background: rgba(80, 60, 20, 0.2);
            border-left-color: #aa8a3a;
            color: #bb9a4a;
        }

        .story-text.ending-corrupted .highlight {
            color: #ccaa5a;
        }

        /* 第三章 - 原色 */
        .story-text.ending-chapter3 {
            background: transparent;
            color: var(--text-primary);
        }

        .story-text.ending-chapter3 .ending-title {
            color: var(--text-gold);
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-chapter3 .divider {
            color: var(--text-muted);
        }

        .story-text.ending-chapter3 .rule-text {
            background: rgba(180, 140, 80, 0.06);
            border-left-color: var(--text-gold);
            color: #d4c8b0;
        }

        .story-text.ending-chapter3 .highlight {
            color: var(--text-gold);
        }

        #rule-notification {
            background: rgba(26, 20, 16, 0.95);
            border: 1px solid var(--text-gold);
            border-radius: 8px;
            padding: 10px 16px;
            margin: 6px 0 8px 0;
            display: none;
            animation: fadeSlide 0.5s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #rule-notification.show {
            display: block;
        }

        #rule-notification .rule-title {
            color: var(--text-gold);
            font-weight: 700;
            font-size: 0.85rem;
        }

        #rule-notification .rule-body {
            font-size: 0.82rem;
            color: var(--text-primary);
            margin-top: 3px;
            line-height: 1.6;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #options-area {
            padding: 8px 0 14px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.15);
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 50px;
        }

        .option-btn {
            background: rgba(30, 24, 18, 0.8);
            border: 1px solid #3a322a;
            border-radius: 6px;
            padding: 9px 14px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 0.88rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(60, 50, 40, 0.8);
            border-color: var(--border-gold);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(139, 122, 74, 0.08);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn .hint {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-left: 6px;
            opacity: 0.6;
        }

        .option-btn .cost {
            float: right;
            color: var(--text-muted);
            font-size: 0.65rem;
            opacity: 0.5;
        }

        .option-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .option-btn .tag {
            display: inline-block;
            font-size: 0.55rem;
            background: rgba(139, 122, 74, 0.2);
            border-radius: 3px;
            padding: 0 6px;
            margin-left: 4px;
            color: var(--text-gold);
        }

        .option-btn.confirm-btn {
            border-color: var(--text-gold);
            background: rgba(180, 140, 80, 0.15);
            text-align: center;
            font-weight: 700;
            color: var(--text-gold);
            font-size: 1rem;
            padding: 12px 14px;
        }

        .option-btn.confirm-btn:hover {
            background: rgba(180, 140, 80, 0.25);
            transform: scale(1.01);
        }

        .option-btn.ending-btn {
            border-color: #6a4a3a;
            background: rgba(100, 60, 40, 0.15);
            text-align: center;
        }

        .option-btn.ending-btn:hover {
            background: rgba(100, 60, 40, 0.25);
        }

        #rules-panel {
            background: rgba(16, 12, 10, 0.98);
            border-top: 1px solid var(--border-gold);
            flex-shrink: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            position: relative;
        }

        #rules-panel.open {
            max-height: 300px;
            overflow-y: auto;
        }

        #rules-panel::-webkit-scrollbar {
            width: 3px;
        }

        #rules-panel::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        #rules-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(139, 122, 74, 0.15);
            cursor: pointer;
            user-select: none;
        }

        #rules-panel .panel-header:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        #rules-panel .panel-header .title {
            color: var(--text-gold);
            font-size: 0.82rem;
            letter-spacing: 2px;
        }

        #rules-panel .panel-header .count {
            color: var(--text-muted);
            font-size: 0.72rem;
        }

        #rules-panel .panel-body {
            padding: 8px 18px 14px 18px;
        }

        .rule-entry {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(139, 122, 74, 0.06);
            font-size: 0.78rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .rule-entry .num {
            color: var(--text-gold);
            font-weight: 700;
            flex-shrink: 0;
            width: 20px;
        }

        .rule-entry .content {
            color: var(--text-primary);
        }

        .rule-entry .content .new-tag {
            color: #6ab06a;
            font-size: 0.55rem;
            margin-left: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #footer-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 18px 6px 18px;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.08);
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            gap: 6px;
            flex-wrap: wrap;
        }

        #footer-tools .left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        #footer-tools .left .day-info {
            color: var(--text-gold);
        }

        .toggle-rules-btn {
            background: none;
            border: 1px solid var(--border-gold);
            color: var(--text-muted);
            padding: 3px 12px;
            border-radius: 4px;
            font-family: var(--font-serif);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-rules-btn:hover {
            background: rgba(139, 122, 74, 0.1);
            color: var(--text-gold);
        }

        .toggle-rules-btn .badge {
            background: var(--red-bright);
            color: #fff;
            border-radius: 50%;
            padding: 0 5px;
            font-size: 0.55rem;
            margin-left: 3px;
        }

        @media (max-width: 640px) {
            #game-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }

            #status-bar {
                padding: 4px 10px;
                flex-direction: column;
                align-items: stretch;
                gap: 3px;
            }

            #status-bar .title {
                font-size: 1rem;
                text-align: center;
            }

            .status-group {
                justify-content: center;
                font-size: 0.65rem;
                gap: 3px 8px;
            }

            .bar-track {
                width: 45px;
            }

            #story-area {
                padding: 10px 4px 6px 4px;
            }

            .story-text {
                font-size: 0.82rem;
                line-height: 1.7;
                padding: 8px 10px;
            }

            #options-area {
                padding: 4px 0 8px 0;
            }

            .option-btn {
                padding: 7px 10px;
                font-size: 0.78rem;
            }

            #footer-tools {
                padding: 2px 10px 4px 10px;
                font-size: 0.6rem;
            }

            #rules-panel.open {
                max-height: 160px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="status-bar">
            <div class="title">🌙 龙岭观前坑</div>
            <div class="status-group">
                <!-- ============ 原有元素（保持不变） ============ -->
                <div class="status-item">
                    <span class="label">📅</span>
                    <span class="value" id="dayDisplay">第1天</span>
                </div>
                <div class="status-item">
                    <span class="label">🕐</span>
                    <span class="value" id="timeDisplay">上午</span>
                </div>
                <div class="status-item">
                    <span class="label">⚡</span>
                    <span class="stamina-dots" id="staminaDots"></span>

        // ---------- 工具函数 ----------
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function pick(arr) { return arr[rand(0, arr.length - 1)]; }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = rand(0, i);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getTimeLabel() {
            if (state.stamina === 3) return '上午';
            if (state.stamina === 2) return '下午';
            if (state.stamina === 1) return '晚上';
            return '深夜';

        function renderRulesList() {
            const container = document.getElementById('rulesList');
            if (state.rules.length === 0) {
                container.innerHTML =
                    '<div style="color:var(--text-muted);font-size:0.8rem;padding:8px 0;">尚未获得任何规则，探索世界以收集线索。</div>';
                return;
            }
            let html = '';
            state.rules.forEach((id, idx) => {
                const rule = RULES_DB[id];
                if (!rule) return;
                const isNew = idx >= state.newRuleCount;
                html += `
                    <div class="rule-entry">
                        <span class="num">#${idx + 1}</span>
                        <span class="content">${rule.text}${isNew ? '<span class="new-tag">● 新</span>' : ''}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ================================================================
        //  【核心】规则确认机制 - 非侵入式
        // ================================================================
        function addRule(id) {
            return new Promise((resolve) => {
                if (!RULES_DB[id]) { resolve(false); return; }
                if (state.rules.includes(id)) { resolve(false); return; }

                if (state._waitingConfirm) {
                    const checkInterval = setInterval(() => {
                        if (!state._waitingConfirm) {
                            clearInterval(checkInterval);
                            addRule(id).then(resolve);
                        }
                    }, 100);
                    return;
                }

                state.rules.push(id);
                const rule = RULES_DB[id];
                state._waitingConfirm = true;
                state._confirmResolve = resolve;

                const notify = document.getElementById('rule-notification');
                document.getElementById('ruleNotifyBody').textContent = rule.text;
                notify.classList.add('show');
                updateUI();

                const container = document.getElementById('options-area');
                const existingBtns = container.querySelectorAll('.option-btn:not(.confirm-btn)');
                existingBtns.forEach(btn => {
                    btn.style.pointerEvents = 'none';
                    btn.style.opacity = '0.5';
                });

                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'option-btn confirm-btn';
                confirmBtn.textContent = '📖 我知道了';
                confirmBtn.style.marginTop = '4px';
                confirmBtn.addEventListener('click', () => {
                    notify.classList.remove('show');
                    state._waitingConfirm = false;
                    state.newRuleCount = state.rules.length;
                    updateUI();

                    confirmBtn.remove();
                    existingBtns.forEach(btn => {
                        btn.style.pointerEvents = '';
                        btn.style.opacity = '';
                    });

                    const r = state._confirmResolve;
                    state._confirmResolve = null;
                    if (r) r(true);
                });
                container.appendChild(confirmBtn);

                const area = document.getElementById('story-area');
                setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
            });
        }

            updateUI();
            // 在 changeDragonization 中添加

                state._dragonWarned60 = true;

        <span style="color:var(--text-muted);font-size:0.85rem;">💡 建议寻找机会压制龙气（燃香、草药、静坐）。</span>
    `);
            }
            // 检测龙化值是否达到结局阈值（使用 setTimeout 避免打断当前操作）
            if (state.dragonization >= 90 && !state.gameOver && !state._dragonEndingQueued) {
                state._dragonEndingQueued = true;
                // 延迟 300ms 让当前操作（如 addRule 确认、购买等）先完成
                setTimeout(function () {
                    if (!state.gameOver) {
                        triggerEnding('BE1_龙化值过高');
                    }
                    state._dragonEndingQueued = false;
                }, 300);
            }
        }

        // ---------- 计算初始伪装值（进入第二章时调用） ----------
        function calculateInitialDisguise() {
            let base = 2;
            if (state.flags.hidden_hasBrand) base += 1;
            if (state.flags.hidden_answeredCode) base += 1;
            if (state.flags.awakening.visited) base += 1;
            if (state.flags.folkloreWarned) base += 1;
            if (state.flags.hasPeachWood) base += 1;
            // 上限改为4，让玩家始终有紧张感
            return clamp(base, 2, 4);
        }

        // ---------- 伪装值调整 ----------
        function changeDisguise(delta) {

            var oldValue = state.ch2.disguise;
            state.ch2.disguise = clamp(state.ch2.disguise + delta, 0, 5);

            // 显示伪装变化反馈（仅当有实际变化时）
            if (state.ch2.disguise !== oldValue) {

        // ---------- 体力调整（重写，增加危机状态检测） ----------
        // 注意：这个函数会覆盖原有的体力修改逻辑，但保留对 stamina 的操作
        // 原有 changeStamina 函数不存在，我们直接扩展 deductStamina 的逻辑
        // 但为了方便，我们新增一个专用函数
        function changeStamina(delta) {
            if (state.gameOver) return;

            var oldValue = state.stamina;
            state.stamina = clamp(state.stamina + delta, 0, state.maxStamina);

            // 体力=0时触发危机检测
            if (state.stamina === 0 && oldValue > 0 && !state.gameOver) {
                // 检查是否有干粮可以紧急恢复
                if (state.ch2.hasDryFood && !state.ch2.usedFood) {

        // ---------- 消耗体力的辅助函数（封装） ----------
        function spendStamina(amount) {
            if (state.stamina < amount) {
                showStory(`<span style="color:#d45a5a;">⚠️ 体力不足！需要 ${amount} 点体力，当前只有 ${state.stamina} 点。</span>`);
                return false;
            }
            changeStamina(-amount);
            return true;
        }
        // ---------- 体力与场景管理 ----------
        function deductStamina() {
            if (state.stamina <= 0) return false;
            state.stamina--;
            state.actionsToday++;
            updateUI();
            return true;
        }

        function finishSceneAndReturn() {
            if (state.gameOver) return;
            deductStamina();
            if (state.stamina === 0) {
                enterNight();
            } else {
                renderMainOptions();
            }
        }

            const bookmarkOk = state.flags.hidden_hasBookmark === true;

            // 条件5：至少第3天（不能第一天就去）
            const dayOk = state.day >= 3;

            if (allMet) {

        function triggerNightEventIfAny() {
            return new Promise((resolve) => {
                // 只在第一章且未进入第二章时触发
                if (state.flags.chapter2 || state.gameOver) {
                    resolve(null);
                    return;
                }

                // 各事件概率（百分比）
                const events = [
                    { id: 'knock', prob: 15, flag: 'knock', name: '半夜敲门声' },
                    { id: 'dream', prob: 20, flag: 'dream', name: '梦呓低语' },
                    { id: 'window', prob: 10, flag: 'window', name: '窗外人影' },
                ];

                // 计算总概率（已触发的事件不再参与）
                const available = events.filter(e => !state.flags.nightEvents[e.flag]);
                if (available.length === 0) {
                    resolve(null);
                    return;
                }

                // 随机决定是否触发（先决定是否触发事件，概率为45%，即15+20+10）
                const totalProb = available.reduce((sum, e) => sum + e.prob, 0);
                // 但我们希望总触发概率为45%左右，但每个事件概率固定，所以直接按权重随机选择事件
                // 生成0~100随机数，落在哪个事件区间就触发哪个
                let randVal = rand(0, 100);
                let cumulative = 0;
                let chosen = null;
                for (const e of available) {
                    cumulative += e.prob;
                    if (randVal <= cumulative) {
                        chosen = e;
                        break;
                    }
                }
                // 如果没有选到（可能randVal > 总概率），则不触发
                if (!chosen) {
                    resolve(null);
                    return;
                }

                // 标记该事件已触发（防止重复）
                state.flags.nightEvents[chosen.flag] = true;

                // 根据事件类型显示不同内容
                switch (chosen.id) {
                    case 'knock':
                        renderKnockEvent(resolve);
                        break;
                    case 'dream':
                        renderDreamEvent(resolve);
                        break;
                    case 'window':
                        renderWindowEvent(resolve);
                        break;
                    default:
                        resolve(null);
                }
            });
        }

                pressure.dayEvents.day3_triggered = true;
                renderPressureEvent_day3();

            // ---- 第4天：异样眼光 + 民俗部警告 ----
            if (day === 4 && !pressure.dayEvents.day4_triggered) {
                pressure.dayEvents.day4_triggered = true;
                renderPressureEvent_day4();
                return true;
            }

            // ---- 第5天：嫂嫂最后通牒 ----
            if (day === 5 && !pressure.dayEvents.day5_triggered) {
                pressure.dayEvents.day5_triggered = true;
                renderPressureEvent_day5();

            // ---- 检测早晨事件（暗语/灰线） ----
            if (!state.flags.chapter2 && !state.gameOver) {

                if (hasPressure) return;

        // ================================================================
        //  早晨事件调度器
        // ================================================================
        function checkAndTriggerMorningEvent() {
            if (state.gameOver || state._waitingConfirm) return false;
            if (state.flags.chapter2) return false;

            // 第2天：灰线烙印事件（只有一次）
            if (state.day === 2 && !state.flags.morningEvents.day2_grayLine_triggered) {
                state.flags.morningEvents.day2_grayLine_triggered = true;
                renderGrayLineEvent();
                return true;
            }

            // 第3~5天：暗语问答事件（每天一次）
            if (state.day >= 3 && state.day <= 5) {
                const key = `day${state.day}_code_triggered`;
                if (!state.flags.morningEvents[key]) {
                    state.flags.morningEvents[key] = true;
                    renderDarkCodeEvent();
                    return true;
                }
            }

            // 兜底：检查隐藏规则是否可解锁（可能在事件之后满足条件）
            if (!state.flags.hidden_unlocked) {
                const allMet = state.flags.hidden_hasBookmark &&
                    state.flags.hidden_hasBrand &&
                    state.flags.hidden_sleepCount >= 3 &&
                    state.flags.hidden_teaCount >= 2 &&
                    state.flags.hidden_answeredCode;
                if (allMet) {
                    // 延迟执行，避免干扰当前渲染
                    setTimeout(() => {
                        if (!state.flags.hidden_unlocked && !state.gameOver) {
                            unlockHiddenRulesAsync();
                        }
                    }, 300);
                }
            }

            return false;
        }

                    achievementText = '「薪火相传」—— 你打破了五百年的诅咒，成为真正的破局者。';
                    break;
                case 'HE1_幸存者':
                    achievementIcon = '🌅';
                    achievementText = '「幸存者」—— 你在绝境中找到了活下去的路，代价是永远被困。';
                    break;
                case 'NE2_被标记的归来':

                    achievementText = '「被标记的归来」—— 你逃离了邱龙山，却永远无法逃离它对你的影响。';
