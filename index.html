                    // ---- 内部函数：草木灰显影 ----
                    async function triggerAshesReveal() {
                        const hasBookmark = state.flags.hidden_hasBookmark;
                        const hasBrand = state.flags.hidden_hasBrand;
                        const hasSleptEnough = state.flags.hidden_sleepCount >= 3;
                        const hasTeaEnough = state.flags.hidden_teaCount >= 2;
                        const hasAnsweredCode = state.flags.hidden_answeredCode;

                        const allHiddenIds = ['hidden_1', 'hidden_2', 'hidden_3', 'hidden_4', 'hidden_5', 'hidden_6', 'hidden_7', 'hidden_8', 'hidden_9'];
                        const remaining = allHiddenIds.filter(id => !state.rules.includes(id));
                        const currentlyUnlocked = state.rules.filter(id => allHiddenIds.includes(id)).length;

                        if (remaining.length === 0) {
                            feedback = '<span class="divider">· · ·</span><span style="color:var(--text-muted);">你已经获得了所有草木灰显影规则，灰烬中再也没有新的字迹了。</span>';
                            pos.ash = true;
                            return;
                        }

                        let conditionsMet = 0;
                        if (hasBookmark) conditionsMet++;
                        if (hasBrand) conditionsMet++;
                        if (hasSleptEnough) conditionsMet++;
                        if (hasTeaEnough) conditionsMet++;
                        if (hasAnsweredCode) conditionsMet++;

                        // ============================================================
                        //  ⭐ 核心修复：计算当前条件允许解锁的最大数量
                        // ============================================================
                        let maxAllowed = 0;
                        if (conditionsMet === 5) {
                            maxAllowed = remaining.length;  // 全部解锁
                        } else {
                            // 未满足全部条件时，最多只能解锁 conditionsMet 条
                            // 但需要减去已经解锁的数量
                            maxAllowed = Math.max(0, conditionsMet - currentlyUnlocked);
                        }

                        // 如果已经没有可解锁的额度，直接提示并锁定
                        if (maxAllowed <= 0) {
                            feedback = `
            <span class="divider">· · ·</span>
            <span style="color:var(--text-muted);">你已经获得了当前线索所能揭示的全部灰烬文字。</span>
            <span style="color:var(--text-muted);font-size:0.85rem;">💡 继续寻找其他线索，解锁更多条件（当前已满足 ${conditionsMet}/5 个条件）。</span>
        `;
                            pos.ash = true;  // ⭐ 锁定草木灰堆，防止无限点击
                            return;
                        }

                        // 实际解锁数量 = min(剩余规则数, 最大允许数, 3)
                        // 注：当 conditionsMet < 5 时，单次最多解锁 3 条，防止一次性溢出
                        let unlockCount = remaining.length;
                        if (conditionsMet < 5) {
                            unlockCount = Math.min(unlockCount, maxAllowed, 3);
                        } else {
                            unlockCount = Math.min(unlockCount, maxAllowed);
                        }

                        if (unlockCount === 0) {
                            feedback = `
            <span class="divider">· · ·</span>
            <span style="color:var(--text-muted);">你在草木灰上洒了一些水，隐约看到一些字迹，但它们太模糊了，无法辨认。</span>
            <span style="color:var(--text-muted);font-size:0.85rem;">💡 也许你还需要收集更多的线索……</span>
        `;
                            return;
                        }

                        feedback = `
        <span class="divider">· · ·</span>
        <span style="color:#d4b87a;">🔥 你用水润湿了草木灰，灰烬渐渐显露出字迹……</span>
        你屏住呼吸，一字一句地辨认着灰中浮现的文字。
    `;

                        const toUnlock = remaining.slice(0, unlockCount);
                        for (const id of toUnlock) {
                            await addRule(id);
                            const rule = RULES_DB[id];
                            if (rule) {
                                feedback += `<span class="rule-text" style="color:#d4b87a;">📜 ${rule.text}</span>`;
                            }
                        }

                        const newRemaining = allHiddenIds.filter(id => !state.rules.includes(id));
                        const newUnlocked = allHiddenIds.filter(id => state.rules.includes(id)).length;

                        // ---- 全部解锁完成标记 ----
                        if (conditionsMet === 5 && newRemaining.length === 0) {
                            state.flags.hidden_unlocked = true;
                            feedback += `
            <span class="divider">· · ·</span>
            <span style="color:var(--text-gold);font-weight:700;">🎉 你集齐了全部草木灰显影规则！</span>
            灰烬中的文字完全显现，你终于看清了隐藏在游客守则之下的真相。
        `;//
                            pos.ash = true;
                        } else {
                            // 还有剩余规则，但根据当前条件已经达到上限
                            if (newRemaining.length > 0 && conditionsMet < 5 && newUnlocked >= conditionsMet) {
                                feedback += `
                <span class="divider">· · ·</span>
                <span style="color:var(--text-muted);font-size:0.85rem;">💡 灰烬中还有一些字迹尚未显现（剩余 ${newRemaining.length} 条），你需要满足更多条件才能解锁。</span>
                <span style="color:var(--text-muted);font-size:0.85rem;">当前已满足 ${conditionsMet}/5 个条件。</span>
            `;
                                pos.ash = true;  // ⭐ 锁定，等待更多条件解锁
                            } else if (newRemaining.length > 0) {
                                feedback += `
                <span class="divider">· · ·</span>
                <span style="color:var(--text-muted);font-size:0.85rem;">💡 灰烬中还有一些字迹尚未完全显现（剩余 ${newRemaining.length} 条）。</span>
            `;
                                // 如果还有剩余规则且 conditionsMet 不足 5，但还没达到上限，保留可查看状态
                                // 但注意：上面已经用 pos.ash = true 锁定了，所以不会无限循环
                                // 如果希望玩家下次还能继续解锁，需要把 pos.ash 设回 false
                                // 但只有当 conditionsMet < 5 且 newUnlocked < conditionsMet 时才允许再次查看
                                if (conditionsMet < 5 && newUnlocked < conditionsMet) {
                                    pos.ash = false;  // 还有额度，允许再次点击
                                } else {
                                    pos.ash = true;   // 已达到上限，锁定
                                }
                            }
                        }

                        updateUI();
                    }

                    // ---- 内部函数：触发隐藏老人对话 ----
                    function triggerOldMan() {
                        state.flags.oldManTalkTriggered = true;
                        setStory(`
                <span class="title-line">🌳 废弃屋外 · 老人</span>
                <span class="divider">—— —— ——</span>
                你从废弃房屋出来的时候，看到一个人坐在屋外的石头上。他看起来年纪很大了，身上的衣服洗得发白，手里没有拿东西。

                他看见你，像是早就知道你会出来一样。他说：
                <span class="rule-text" style="color:#d4b87a;">「你去了后山药庐。你看到了那些药方、那些瓶子、那些名字……你一定在想，那个人到底是个什么样的人？」</span>
                你没有回答。他继续说：
                <span class="rule-text" style="color:#d4b87a;">「那间药庐里有一张方子，是治咳嗽的。我喝过那药。当时咳了半年，以为活不过那年秋天。先生给我开了那张方子，我喝了三个月，好了。」</span>
                他站起来，拍了拍衣摆：
                <span class="rule-text" style="color:#d4b87a;">「我知道你听了很多不一样的话。但那张方子还在药庐的抽屉里。你看到了吗？」</span>
                你点头。他看了你一眼，然后转身走了。
                <span class="divider">· · ·</span>
                <span style="color:var(--text-gold);">📜 你获得了一条新的规则！</span>
            `);
                        (async () => {
                            if (!state.rules.includes('temple_defense_11')) {
                                await addRule('temple_defense_11');
                            }
                            updateUI();
                            renderOptions([{
                                label: '🚶 离开',
                                action: function () {
                                    if (state.gameOver || state._waitingConfirm) return;
                                    finishSceneAndReturn();
                                }
                            }]);
                        })();
                    }
                }
            };

            SCENES['explore_folklore'] = {
                render: async () => {
                    if (state._waitingConfirm) return;
                    // 增加访问计数
                    state.flags.folkloreVisitCount = (state.flags.folkloreVisitCount || 0) + 1;
                    const visitCount = state.flags.folkloreVisitCount;

                    // ---- 第1次：劝你下山，暗示村西有问题 + 护玄清低语 ----
                    if (visitCount === 1) {
                        state.flags.folkloreWarned = true;
                        setStory(`
                <span class="title-line">🏛️ 民俗部 · 第一次拜访</span>
                你走进民俗部，一位穿着景区制服的工作人员正在整理文件。他抬头看了你一眼，放下手中的东西：
                <span class="rule-text" style="color:#d4b87a;">「你是来参加社戏的吧？最近村里不太平，他想了想，说了句"这两天不太平"，又补了一句"你非要上去的话，最好先看看北边那座庙"。」</span>

            // ================================================================
            //  清除所有缓存（带二次确认）
            // ================================================================

            function clearAllCache() {
                // 如果游戏正在运行且有未保存的进度，先保存
                if (document.getElementById('game-content').style.display !== 'none') {
                    saveGame();
                }

                // 确认对话框
                const confirmed = confirm(
                    '⚠️ 确定要清除所有缓存吗？\n\n' +
                    '这将永久删除：\n' +
                    '• 游戏存档（当前进度）\n' +
                    '• 已解锁的结局记录\n' +
                    '• 所有规则和状态\n\n' +
                    '此操作不可撤销！'
                );

                if (!confirmed) return;

                // 第二次确认（更安全）
                const doubleConfirm = confirm(
                    '🔄 再次确认：你真的要清除所有数据吗？\n' +
                    '所有进度将永久丢失。'
                );

                if (!doubleConfirm) return;

                try {
                    // 清除所有 localStorage 数据
                    localStorage.clear();

                    // 重置游戏状态（防止残留数据导致显示异常）
                    if (typeof resetGame === 'function') {
                        resetGame();
                    }

                    // 显示成功提示
                    alert('✅ 所有缓存已清除！页面即将刷新。');

                    // 刷新页面，让一切回到初始状态
                    window.location.reload();
                } catch (e) {
                    console.error('清除缓存失败:', e);
                    alert('❌ 清除缓存失败，请手动清除浏览器数据。');
                }
            }


            // ---------- 规则面板切换 ----------
            let rulesPanelOpen = false;
            document.getElementById('rulesToggle').addEventListener('click', () => { toggleRulesPanel(); });
            document.getElementById('rulesToggleBtn').addEventListener('click', () => { toggleRulesPanel(); });
            // ================================================================
            //  主菜单切换函数
            // ================================================================

            // ---- 显示主菜单 ----
            function showMainMenu() {
                document.getElementById('main-menu').style.display = 'flex';
                document.getElementById('game-content').style.display = 'none';
                const continueBtn = document.getElementById('btn-continue');
                if (hasSave()) {
                    continueBtn.style.opacity = '1';
                    continueBtn.style.pointerEvents = 'auto';
                    continueBtn.textContent = '📂 继续游戏';
                } else {
                    continueBtn.style.opacity = '0.5';
                    continueBtn.style.pointerEvents = 'none';
                    continueBtn.textContent = '📂 没有存档';
                }
            }

            // ---- 进入游戏 ----
            function showGameContent() {
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('game-content').style.display = 'flex';
                updateUI();
            }

            // ---- 开始新游戏 ----
            function startNewGame() {
                localStorage.removeItem(SAVE_KEY);
                resetGame();
                showGameContent();
                goToScene('intro');
                saveGame();
            }

            // ---- 继续游戏 ----
            function continueGame() {
                if (!hasSave()) {
                    alert('没有找到存档，请开始新游戏。');
                    return;
                }
                const loaded = loadGame();
                if (!loaded) {
                    alert('存档损坏，请开始新游戏。');
                    return;
                }

                // 强制清除规则确认锁定
                state._waitingConfirm = false;
                state._confirmResolve = null;
                document.getElementById('rule-notification').classList.remove('show');
                const container = document.getElementById('options-area');
                const confirmBtn = container.querySelector('.confirm-btn');
                if (confirmBtn) confirmBtn.remove();
                document.querySelectorAll('.option-btn:not(.confirm-btn)').forEach(btn => {
                    btn.style.pointerEvents = '';
                    btn.style.opacity = '';
                });

                showGameContent();

                // 如果游戏已结束，显示结局
                if (state.gameOver) {
                    if (state._endingType) {
                        renderEndingContent(state._endingType);
                    } else {
                        setStory('你上次的游戏已经结束。点击下方按钮重新开始。');
                        renderOptions([{
                            label: '🔄 重新开始',
                            action: function () {
                                if (state._waitingConfirm) return;
                                startNewGame();
                            }
                        }]);
                    }
                    return;
                }

                // 刷新当前场景
                if (currentScene && SCENES[currentScene] && SCENES[currentScene].render) {
                    SCENES[currentScene].render();
                } else {
                    renderMainOptions();
                }
            }

            // ---- 返回主菜单（最高优先级，强制解除所有锁定） ----
            function returnToMenu() {
                // 1. 强制解除规则确认锁定
                if (state._waitingConfirm) {
                    state._waitingConfirm = false;
                    state._confirmResolve = null;
                    document.getElementById('rule-notification').classList.remove('show');
                    const container = document.getElementById('options-area');
                    const confirmBtn = container.querySelector('.confirm-btn');
                    if (confirmBtn) confirmBtn.remove();
                    document.querySelectorAll('.option-btn:not(.confirm-btn)').forEach(btn => {
                        btn.style.pointerEvents = '';
                        btn.style.opacity = '';
                    });
                }

                // 2. 保存当前进度
                saveGame();

                // 3. 显示主菜单
                showMainMenu();

                // 4. 清空选项区，防止残留
                document.getElementById('options-area').innerHTML = '';
            }
            function toggleRulesPanel() {
                rulesPanelOpen = !rulesPanelOpen;
                document.getElementById('rules-panel').classList.toggle('open', rulesPanelOpen);
                if (rulesPanelOpen) {
                    state.newRuleCount = state.rules.length;
                    updateUI();
                }
            }
            // ================================================================
            //  结局画廊 - 渲染与交互
            // ================================================================

            function renderEndingGallery() {
                // 关闭规则面板
                if (rulesPanelOpen) {
                    rulesPanelOpen = false;
                    document.getElementById('rules-panel').classList.remove('open');
                }

                const grid = document.getElementById('galleryGrid');
                const unlocked = getUnlockedEndings();
                const total = getTotalEndingsCount();

                // 更新计数
                document.getElementById('galleryCount').textContent = unlocked.length;
                document.getElementById('galleryTotal').textContent = total;
                document.getElementById('galleryHint').textContent = `—— 已解锁 ${unlocked.length} / ${total} ——`;

                // 清空网格
                grid.innerHTML = '';

                // 按顺序渲染所有结局
                const allTypes = Object.keys(ENDING_META);
                allTypes.forEach(type => {
                    const meta = ENDING_META[type];
                    const isUnlocked = unlocked.includes(type);
                    const card = document.createElement('div');
                    card.className = 'gallery-card' + (isUnlocked ? '' : ' locked');

                    if (isUnlocked) {
                        card.innerHTML = `
                <div class="card-icon">${meta.icon}</div>
                <div class="card-title">${meta.title}</div>
                <div class="card-subtitle">${meta.subtitle}</div>
                <div class="card-desc">${meta.shortDesc}</div>
                <div class="card-badge">已解锁</div>
            `;
                        card.addEventListener('click', function () {
                            if (state._waitingConfirm) return;
                            // 以只读模式显示结局详情
                            renderEndingContent(type, true);
                        });
                    } else {
                        card.innerHTML = `
                <div class="card-lock">🔒</div>
                <div class="card-lock-label">未解锁</div>
            `;
                    }

                    grid.appendChild(card);
                });

                // 显示画廊，隐藏主菜单
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('gallery-view').classList.add('active');

                // 强制解除确认状态，防止按钮被锁定
                if (state._waitingConfirm) {
                    state._waitingConfirm = false;
                    state._confirmResolve = null;
                    document.getElementById('rule-notification').classList.remove('show');
                }
            }

            function closeGallery() {
                document.getElementById('gallery-view').classList.remove('active');
                document.getElementById('main-menu').style.display = 'flex';
                // 更新主菜单中的计数
                const unlocked = getUnlockedEndings();
                document.getElementById('galleryHint').textContent = `—— 已解锁 ${unlocked.length} / ${getTotalEndingsCount()} ——`;
            }

            // ---- 绑定画廊按钮 ----
            document.getElementById('btn-gallery').addEventListener('click', function (e) {
                e.stopPropagation();
                renderEndingGallery();
            });

            document.getElementById('gallery-back-btn').addEventListener('click', function () {
                closeGallery();
            });

            // ---- 修改 showMainMenu 函数，确保画廊关闭 ----
            // 找到原有的 showMainMenu 函数，替换为以下版本
            function showMainMenu() {
                // 如果画廊是打开的，关闭它
                if (document.getElementById('gallery-view').classList.contains('active')) {
                    document.getElementById('gallery-view').classList.remove('active');
                }
                document.getElementById('main-menu').style.display = 'flex';
                document.getElementById('game-content').style.display = 'none';

                const continueBtn = document.getElementById('btn-continue');
                if (hasSave()) {
                    continueBtn.style.opacity = '1';
                    continueBtn.style.pointerEvents = 'auto';
                    continueBtn.textContent = '📂 继续游戏';
                } else {
                    continueBtn.style.opacity = '0.5';
                    continueBtn.style.pointerEvents = 'none';
                    continueBtn.textContent = '📂 没有存档';
                }

                // 更新结局计数
                const unlocked = getUnlockedEndings();
                document.getElementById('galleryHint').textContent = `—— 已解锁 ${unlocked.length} / ${getTotalEndingsCount()} ——`;
            }
            // ---------- 初始化 ----------
            function init() {
                // 绑定主菜单按钮
                document.getElementById('btn-new-game').addEventListener('click', startNewGame);
                document.getElementById('btn-continue').addEventListener('click', continueGame);
                document.getElementById('btn-gallery').addEventListener('click', function (e) {
                    e.stopPropagation();
                    renderEndingGallery();
                });

                // ⭐ 新增：清除缓存按钮
                document.getElementById('btn-clear-cache').addEventListener('click', function (e) {
                    e.stopPropagation();
                    clearAllCache();
                });

                // 绑定返回主菜单按钮
                const returnBtn = document.getElementById('btn-return-menu');
                returnBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    returnToMenu();
                });

                // 页面关闭时自动保存
                window.addEventListener('beforeunload', function () {
                    if (document.getElementById('game-content').style.display !== 'none') {
                        saveGame();
                    }
                });

                // 显示主菜单
                showMainMenu();
                // ---- 金色粒子跟随鼠标 ---- (可选)
                let mouseX = 0, mouseY = 0;
                document.addEventListener('mousemove', function (e) {
                    const rect = document.getElementById('main-menu').getBoundingClientRect();
                    mouseX = (e.clientX - rect.left) / rect.width - 0.5;
                    mouseY = (e.clientY - rect.top) / rect.height - 0.5;
                    document.querySelectorAll('.menu-particle').forEach((p, i) => {
                        const speed = 10 + i * 2;
                        p.style.transform = `translate(${mouseX * speed}px, ${mouseY * speed}px)`;
                    });
                });
            }
            window.onload = init;
        </script>

</body>

</html>
