<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙岭观前坑 · 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --bg-primary: #0d0a08;
            --bg-card: #1a1410;
            --bg-panel: #241e18;
            --border-gold: #8b7a4a;
            --text-primary: #e8ddd0;
            --text-muted: #a8957a;
            --text-gold: #d4b87a;
            --red-bright: #8a2a2a;
            --font-serif: 'Noto Serif SC', '华文楷体', 'KaiTi', serif;
            --font-title: 'Ma Shan Zheng', '华文楷体', cursive;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(60, 30, 20, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 20, 50, 0.3) 0%, transparent 70%);
        }

        #game-container {
            width: 100%;
            max-width: 860px;
            height: 96vh;
            max-height: 820px;
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        #status-bar {
            background: linear-gradient(180deg, #1f1812 0%, #16100c 100%);
            border-bottom: 1px solid var(--border-gold);
            padding: 8px 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4px 12px;
            flex-shrink: 0;
            z-index: 1;
            position: relative;
        }

        #status-bar .title {
            font-family: var(--font-title);
            font-size: 1.2rem;
            color: var(--text-gold);
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(180, 140, 80, 0.2);
            white-space: nowrap;
        }

        .status-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 12px;
            font-size: 0.75rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
        }

        .status-item .label {
            opacity: 0.7;
        }

        .status-item .value {
            color: var(--text-primary);
            font-weight: 700;
            min-width: 18px;
        }

        .stamina-dots {
            display: flex;
            gap: 3px;
        }

        .stamina-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            background: #2a221a;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .stamina-dot.filled {
            background: #4a7a4a;
            border-color: #6aaa6a;
            box-shadow: 0 0 10px rgba(74, 122, 74, 0.3);
            color: #b0e0b0;
        }

        .stamina-dot.spent {
            opacity: 0.2;
            background: #1a1410;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bar-track {
            width: 60px;
            height: 5px;
            background: #2a221a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #3a322a;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .bar-fill.dragon {
            background: linear-gradient(90deg, #4a7a4a, #8a5a3a, #aa4a2a);
        }

        .bar-fill.sanity {
            background: linear-gradient(90deg, #4a5a8a, #7a8aaa, #aac0e0);
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
            padding: 0 18px 0 18px;
        }

        #story-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 10px 10px 10px;
            scroll-behavior: smooth;
        }

        #story-area::-webkit-scrollbar {
            width: 4px;
        }

        #story-area::-webkit-scrollbar-track {
            background: #1a1410;
        }

        #story-area::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
            transition: background 0.5s, color 0.5s;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 0 -6px;
        }

        .story-text .highlight {
            color: var(--text-gold);
        }

        .story-text .danger {
            color: #d45a5a;
        }

        .story-text .rule-text {
            display: block;
            padding: 6px 14px;
            margin: 5px 0;
            border-left: 3px solid var(--text-gold);
            background: rgba(180, 140, 80, 0.06);
            font-size: 0.9rem;
            color: #d4c8b0;
        }

        .story-text .divider {
            display: block;
            text-align: center;
            color: var(--text-muted);
            margin: 10px 0;
            letter-spacing: 6px;
            opacity: 0.4;
        }

        .story-text .title-line {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--text-gold);
            text-align: center;
            margin: 8px 0 12px 0;
            letter-spacing: 2px;
        }

        .story-text .nursery-rhyme {
            display: block;
            padding: 10px 14px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-radius: 6px;
            font-style: italic;
            color: #d4c8b0;
            line-height: 2;
            white-space: pre-line;
        }

        .story-text .ending-title {
            font-size: 1.8rem;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
        }

        .story-text .info-box {
            display: block;
            padding: 8px 14px;
            margin: 6px 0;
            border-left: 3px solid #6a8aaa;
            background: rgba(100, 130, 170, 0.06);
            font-size: 0.9rem;
            color: #b0c8d8;
        }

        .story-text .km-progress {
            display: block;
            text-align: center;
            color: var(--text-gold);
            font-size: 0.85rem;
            margin: 4px 0;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .story-text .comedy-box {
            display: block;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(180, 140, 80, 0.12);
            border-radius: 8px;
            border: 1px solid var(--border-gold);
            color: #d4c8b0;
            line-height: 2;
        }

        .story-text .feedback {
            display: block;
            padding: 8px 12px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-left: 3px solid var(--text-gold);
            color: var(--text-gold);
            font-weight: 500;
        }

        /* ===== 结局配色 ===== */
        /* HE - 暖金色 */
        .story-text.ending-he {
            background: #d4c8a0;
            color: #3a2a1a;
        }

        .story-text.ending-he .ending-title {
            color: #5a3a1a;
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-he .divider {
            color: #8a7a5a;
        }

        .story-text.ending-he .rule-text {
            background: rgba(200, 180, 150, 0.2);
            border-left-color: #8a7a5a;
            color: #3a2a1a;
        }

        .story-text.ending-he .highlight {
            color: #5a3a1a;
        }

        /* BE2 大不敬 - 暗红底深红字 */
        .story-text.ending-be2 {
            background: #2a0a0a;
            color: #8a2a2a;
        }

        .story-text.ending-be2 .ending-title {
            color: #aa2a2a;
            text-shadow: 0 0 40px rgba(200, 30, 30, 0.5);
        }

        .story-text.ending-be2 .divider {
            color: #4a1a1a;
        }

        .story-text.ending-be2 .rule-text {
            background: rgba(80, 20, 20, 0.2);
            border-left-color: #8a2a2a;
            color: #aa4a4a;
        }

        .story-text.ending-be2 .highlight {
            color: #aa4a4a;
        }

        /* BE3 惊扰 - 暗紫底紫红字 */
        .story-text.ending-be3 {
            background: #1a0a1a;
            color: #7a2a6a;
        }

        .story-text.ending-be3 .ending-title {
            color: #aa2a8a;
            text-shadow: 0 0 40px rgba(180, 30, 150, 0.5);
        }

        .story-text.ending-be3 .divider {
            color: #3a1a3a;
        }

        .story-text.ending-be3 .rule-text {
            background: rgba(60, 20, 50, 0.2);
            border-left-color: #8a2a7a;
            color: #9a4a8a;
        }

        .story-text.ending-be3 .highlight {
            color: #aa4a9a;
        }

        /* BE4 半途而废 - 暗灰底深灰字 */
        .story-text.ending-be4 {
            background: #141414;
            color: #5a5a5a;
        }

        .story-text.ending-be4 .ending-title {
            color: #7a7a7a;
            text-shadow: 0 0 30px rgba(100, 100, 100, 0.3);
        }

        .story-text.ending-be4 .divider {
            color: #2a2a2a;
        }

        .story-text.ending-be4 .rule-text {
            background: rgba(40, 40, 40, 0.2);
            border-left-color: #5a5a5a;
            color: #6a6a6a;
        }

        .story-text.ending-be4 .highlight {
            color: #7a7a7a;
        }

        /* 老实人 - 暗绿 */
        .story-text.ending-normal {
            background: #0a1a0a;
            color: #3a5a3a;
        }

        .story-text.ending-normal .ending-title {
            color: #4a7a4a;
            text-shadow: 0 0 30px rgba(60, 160, 60, 0.3);
        }

        .story-text.ending-normal .divider {
            color: #1a2a1a;
        }

        .story-text.ending-normal .rule-text {
            background: rgba(30, 60, 30, 0.2);
            border-left-color: #4a7a4a;
            color: #4a6a4a;
        }

        .story-text.ending-normal .highlight {
            color: #5a8a5a;
        }

        /* 龙化过高 - 暗红亮红 */
        .story-text.ending-dragon {
            background: #1a0505;
            color: #aa3a2a;
        }

        .story-text.ending-dragon .ending-title {
            color: #cc3a2a;
            text-shadow: 0 0 50px rgba(220, 50, 30, 0.6);
        }

        .story-text.ending-dragon .divider {
            color: #3a1a1a;
        }

        .story-text.ending-dragon .rule-text {
            background: rgba(80, 20, 10, 0.2);
            border-left-color: #aa3a2a;
            color: #cc5a4a;
        }

        .story-text.ending-dragon .highlight {
            color: #dd5a4a;
        }

        /* 被龙化 - 暗金 */
        .story-text.ending-corrupted {
            background: #1a1208;
            color: #aa8a3a;
        }

        .story-text.ending-corrupted .ending-title {
            color: #ccaa3a;
            text-shadow: 0 0 40px rgba(200, 170, 50, 0.5);
        }

        .story-text.ending-corrupted .divider {
            color: #3a2a1a;
        }

        .story-text.ending-corrupted .rule-text {
            background: rgba(80, 60, 20, 0.2);
            border-left-color: #aa8a3a;
            color: #bb9a4a;
        }

        .story-text.ending-corrupted .highlight {
            color: #ccaa5a;
        }

        /* 第三章 - 原色 */
        .story-text.ending-chapter3 {
            background: transparent;
            color: var(--text-primary);
        }

        .story-text.ending-chapter3 .ending-title {
            color: var(--text-gold);
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-chapter3 .divider {
            color: var(--text-muted);
        }

        .story-text.ending-chapter3 .rule-text {
            background: rgba(180, 140, 80, 0.06);
            border-left-color: var(--text-gold);
            color: #d4c8b0;
        }

        .story-text.ending-chapter3 .highlight {
            color: var(--text-gold);
        }

        #rule-notification {
            background: rgba(26, 20, 16, 0.95);
            border: 1px solid var(--text-gold);
            border-radius: 8px;
            padding: 10px 16px;
            margin: 6px 0 8px 0;
            display: none;
            animation: fadeSlide 0.5s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #rule-notification.show {
            display: block;
        }

        #rule-notification .rule-title {
            color: var(--text-gold);
            font-weight: 700;
            font-size: 0.85rem;
        }

        #rule-notification .rule-body {
            font-size: 0.82rem;
            color: var(--text-primary);
            margin-top: 3px;
            line-height: 1.6;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #options-area {
            padding: 8px 0 14px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.15);
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 50px;
        }

        .option-btn {
            background: rgba(30, 24, 18, 0.8);
            border: 1px solid #3a322a;
            border-radius: 6px;
            padding: 9px 14px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 0.88rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(60, 50, 40, 0.8);
            border-color: var(--border-gold);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(139, 122, 74, 0.08);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn .hint {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-left: 6px;
            opacity: 0.6;
        }

        .option-btn .cost {
            float: right;
            color: var(--text-muted);
            font-size: 0.65rem;
            opacity: 0.5;
        }

        .option-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .option-btn .tag {
            display: inline-block;
            font-size: 0.55rem;
            background: rgba(139, 122, 74, 0.2);
            border-radius: 3px;
            padding: 0 6px;
            margin-left: 4px;
            color: var(--text-gold);
        }

        .option-btn.confirm-btn {
            border-color: var(--text-gold);
            background: rgba(180, 140, 80, 0.15);
            text-align: center;
            font-weight: 700;
            color: var(--text-gold);
            font-size: 1rem;
            padding: 12px 14px;
        }

        .option-btn.confirm-btn:hover {
            background: rgba(180, 140, 80, 0.25);
            transform: scale(1.01);
        }

        .option-btn.ending-btn {
            border-color: #6a4a3a;
            background: rgba(100, 60, 40, 0.15);
            text-align: center;
        }

        .option-btn.ending-btn:hover {
            background: rgba(100, 60, 40, 0.25);
        }

        #rules-panel {
            background: rgba(16, 12, 10, 0.98);
            border-top: 1px solid var(--border-gold);
            flex-shrink: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            position: relative;
        }

        #rules-panel.open {
            max-height: 300px;
            overflow-y: auto;
        }

        #rules-panel::-webkit-scrollbar {
            width: 3px;
        }

        #rules-panel::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        #rules-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(139, 122, 74, 0.15);
            cursor: pointer;
            user-select: none;
        }

        #rules-panel .panel-header:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        #rules-panel .panel-header .title {
            color: var(--text-gold);
            font-size: 0.82rem;
            letter-spacing: 2px;
        }

        #rules-panel .panel-header .count {
            color: var(--text-muted);
            font-size: 0.72rem;
        }

        #rules-panel .panel-body {
            padding: 8px 18px 14px 18px;
        }

        .rule-entry {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(139, 122, 74, 0.06);
            font-size: 0.78rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .rule-entry .num {
            color: var(--text-gold);
            font-weight: 700;
            flex-shrink: 0;
            width: 20px;
        }

        .rule-entry .content {
            color: var(--text-primary);
        }

        .rule-entry .content .new-tag {
            color: #6ab06a;
            font-size: 0.55rem;
            margin-left: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #footer-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 18px 6px 18px;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.08);
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            gap: 6px;
            flex-wrap: wrap;
        }

        #footer-tools .left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        #footer-tools .left .day-info {
            color: var(--text-gold);
        }

        .toggle-rules-btn {
            background: none;
            border: 1px solid var(--border-gold);
            color: var(--text-muted);
            padding: 3px 12px;
            border-radius: 4px;
            font-family: var(--font-serif);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-rules-btn:hover {
            background: rgba(139, 122, 74, 0.1);
            color: var(--text-gold);
        }

        .toggle-rules-btn .badge {
            background: var(--red-bright);
            color: #fff;
            border-radius: 50%;
            padding: 0 5px;
            font-size: 0.55rem;
            margin-left: 3px;
        }

        @media (max-width: 640px) {
            #game-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }

            #status-bar {
                padding: 4px 10px;
                flex-direction: column;
                align-items: stretch;
                gap: 3px;
            }

            #status-bar .title {
                font-size: 1rem;
                text-align: center;
            }

            .status-group {
                justify-content: center;
                font-size: 0.65rem;
                gap: 3px 8px;
            }

            .bar-track {
                width: 45px;
            }

            #story-area {
                padding: 10px 4px 6px 4px;
            }

            .story-text {
                font-size: 0.82rem;
                line-height: 1.7;
                padding: 8px 10px;
            }

            #options-area {
                padding: 4px 0 8px 0;
            }

            .option-btn {
                padding: 7px 10px;
                font-size: 0.78rem;
            }

            #footer-tools {
                padding: 2px 10px 4px 10px;
                font-size: 0.6rem;
            }

            #rules-panel.open {
                max-height: 160px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="status-bar">
            <div class="title">🌙 龙岭观前坑</div>
            <div class="status-group">
                <div class="status-item">
                    <span class="label">📅</span>
                    <span class="value" id="dayDisplay">第1天</span>
                </div>
                <div class="status-item">
                    <span class="label">🕐</span>
                    <span class="value" id="timeDisplay">上午</span>
                </div>
                <div class="status-item">
                    <span class="label">⚡</span>
                    <span class="stamina-dots" id="staminaDots"></span>
                </div>
                <div class="status-item bar-wrap">

            'night_1': { id: 'night_1', text: '【夜间谈话】嫂嫂低语："莫要在半夜照镜子，镜子里看到的不一定是自己。"' },
            'night_2': { id: 'night_2', text: '【夜间谈话】嫂嫂叹息："村里那口老井，井水泛青时，莫要靠近。"' },

            'passerby_4': { id: 'passerby_4', text: '【路人信息】一个赶集的阿婆说："村西头的房子闹鬼，晚上能听见哭声，可千万别去。"' },
            'passerby_5': { id: 'passerby_5', text: '【路人信息】一个退伍老兵说："这山里的龙王爷，是吃人的。我亲眼见过有人被拖进林子里，再也没出来。"' },
            'ch2_incense': { id: 'ch2_incense', text: '【第二章】你购买了香。香火是沟通龙神的媒介，也是游神仪式中不可或缺的供奉。' },
            'ch2_water': { id: 'ch2_water', text: '【第二章】你购买了水。山泉水蕴含龙脉之气，饮用后可以暂时压制体内的龙化。' },
            'ch2_amulet': { id: 'ch2_amulet', text: '【第二章】你购买了护身符。桃木雕刻的符牌可以抵御龙气的侵蚀，减少每步的龙化值。' },
        };

        // ---------- 工具函数 ----------
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function pick(arr) { return arr[rand(0, arr.length - 1)]; }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = rand(0, i);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ---------- UI更新 ----------
        function updateUI() {
            document.getElementById('dayDisplay').textContent = `第${state.day}天`;
            document.getElementById('dayInfo').textContent = `第${state.day}天 · ${getTimeLabel()}`;
            document.getElementById('timeDisplay').textContent = getTimeLabel();

            const dots = document.getElementById('staminaDots');
            dots.innerHTML = '';
            for (let i = 0; i < state.maxStamina; i++) {
                const dot = document.createElement('span');
                dot.className = 'stamina-dot' + (i < state.stamina ? ' filled' : ' spent');
                dot.textContent = i < state.stamina ? '●' : '○';
                dots.appendChild(dot);
            }

            const dVal = clamp(state.dragonization, 0, 100);
            const sVal = 100 - dVal;
            document.getElementById('dragonBar').style.width = dVal + '%';
            document.getElementById('dragonVal').textContent = dVal + '%';
            document.getElementById('sanityBar').style.width = sVal + '%';
            document.getElementById('sanityVal').textContent = sVal + '%';

            document.getElementById('actionCount').textContent = `已行动 ${state.actionsToday} 次`;
            document.getElementById('ruleCount').textContent = `已收集 ${state.rules.length} 条`;

            const ch2PhaseLabel = document.getElementById('ch2PhaseLabel');
            const ch2KmDisplay = document.getElementById('ch2KmDisplay');
            if (state.flags.chapter2 && !state.gameOver) {
                ch2PhaseLabel.style.display = 'inline';
                ch2KmDisplay.style.display = 'inline';
                document.getElementById('kmDisplay').textContent = state.ch2.km + 'km';
                ch2PhaseLabel.textContent = '第二章';
            } else {
                ch2PhaseLabel.style.display = 'none';
                ch2KmDisplay.style.display = 'none';
            }

            const badge = document.getElementById('newRuleBadge');
            const newCount = state.rules.length - state.newRuleCount;
            badge.textContent = newCount > 0 ? newCount : '0';
            badge.style.display = newCount > 0 ? 'inline' : 'none';

            renderRulesList();

            if (state.dragonization >= 80 && !state.gameOver) {
                triggerEnding('龙化值过高 · 被龙气侵蚀');
            }
        }

        function getTimeLabel() {
            if (state.stamina === 3) return '上午';
            if (state.stamina === 2) return '下午';
            if (state.stamina === 1) return '晚上';
            return '深夜';
        }

        function renderRulesList() {
            const container = document.getElementById('rulesList');
            if (state.rules.length === 0) {
                container.innerHTML =
                    '<div style="color:var(--text-muted);font-size:0.8rem;padding:8px 0;">尚未获得任何规则，探索世界以收集线索。</div>';
                return;
            }
            let html = '';
            state.rules.forEach((id, idx) => {
                const rule = RULES_DB[id];
                if (!rule) return;
                const isNew = idx >= state.newRuleCount;
                html += `
                    <div class="rule-entry">
                        <span class="num">#${idx + 1}</span>
                        <span class="content">${rule.text}${isNew ? '<span class="new-tag">● 新</span>' : ''}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ================================================================
        //  【核心】规则确认机制 - 非侵入式
        // ================================================================
        function addRule(id) {
            return new Promise((resolve) => {
                if (!RULES_DB[id]) { resolve(false); return; }
                if (state.rules.includes(id)) { resolve(false); return; }

                if (state._waitingConfirm) {
                    const checkInterval = setInterval(() => {
                        if (!state._waitingConfirm) {
                            clearInterval(checkInterval);
                            addRule(id).then(resolve);
                        }
                    }, 100);
                    return;
                }

                state.rules.push(id);
                const rule = RULES_DB[id];
                state._waitingConfirm = true;
                state._confirmResolve = resolve;

                const notify = document.getElementById('rule-notification');
                document.getElementById('ruleNotifyBody').textContent = rule.text;
                notify.classList.add('show');
                updateUI();

                const container = document.getElementById('options-area');
                const existingBtns = container.querySelectorAll('.option-btn:not(.confirm-btn)');
                existingBtns.forEach(btn => {
                    btn.style.pointerEvents = 'none';
                    btn.style.opacity = '0.5';
                });

                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'option-btn confirm-btn';
                confirmBtn.textContent = '📖 我知道了';
                confirmBtn.style.marginTop = '4px';
                confirmBtn.addEventListener('click', () => {
                    notify.classList.remove('show');
                    state._waitingConfirm = false;
                    state.newRuleCount = state.rules.length;
                    updateUI();

                    confirmBtn.remove();
                    existingBtns.forEach(btn => {
                        btn.style.pointerEvents = '';
                        btn.style.opacity = '';
                    });

                    const r = state._confirmResolve;
                    state._confirmResolve = null;
                    if (r) r(true);
                });
                container.appendChild(confirmBtn);

                const area = document.getElementById('story-area');
                setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
            });
        }

        // ---------- 数值修改 ----------
        function changeDragonization(delta) {
            if (state.gameOver) return;
            state.dragonization = clamp(state.dragonization + delta, 0, 100);
            updateUI();
        }

        // ---------- 体力与场景管理 ----------
        function deductStamina() {
            if (state.stamina <= 0) return false;
            state.stamina--;
            state.actionsToday++;
            updateUI();
            return true;
        }

        function finishSceneAndReturn() {
            if (state.gameOver) return;
            deductStamina();
            if (state.stamina === 0) {
                enterNight();
            } else {
                renderMainOptions();
            }
        }

        // ---------- 显示与选项 ----------
        let currentScene = 'intro';

        function showStory(text) {
            const el = document.getElementById('storyText');
            if (text) {
                el.innerHTML += text.replace(/\n/g, '<br>') + '<br>';
            }
            const area = document.getElementById('story-area');
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
        }

        function clearStory() {
            document.getElementById('storyText').innerHTML = '';
        }

        function setStory(text, endingClass) {
            clearStory();
            const el = document.getElementById('storyText');
            el.className = 'story-text';
            if (endingClass) {
                el.classList.add(endingClass);
            }
            showStory(text);
        }

        function renderOptions(options) {
            const container = document.getElementById('options-area');
            if (state._waitingConfirm) return;
            container.innerHTML = '';
            if (!options || options.length === 0) {
                container.innerHTML =
                    '<div style="color:var(--text-muted);text-align:center;font-size:0.8rem;padding:8px;">—— 没有更多行动 ——</div>';
                return;
            }
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (opt.disabled ? ' disabled' : '') + (opt.ending ? ' ending-btn' : '');
                btn.innerHTML =
                    `${opt.label}${opt.hint ? `<span class="hint">${opt.hint}</span>` : ''}${opt.cost ? `<span class="cost">${opt.cost}</span>` : ''}${opt.tag ? `<span class="tag">${opt.tag}</span>` : ''}`;
                if (!opt.disabled) {
                    btn.addEventListener('click', () => {
                        if (opt.action) opt.action();
                    });
                }
                container.appendChild(btn);
            });
        }

        // ---------- 主菜单 ----------
        function renderMainOptions() {
            if (state.gameOver) return;
            if (state.stamina === 0) {
                enterNight();
                return;
            }
            if (state.flags.chapter2) {
                renderChapter2();
                return;
            }
            const opts = [{
                label: '🏚️ 1.1.1 废弃房屋',
                hint: '探索获得规则',
                cost: '⚡1',
                action: () => { goToScene('explore_abandoned'); }
            }, {
                label: '🏛️ 1.1.2 民俗部',
                hint: '打听消息',
                cost: '⚡1',
                action: () => { goToScene('explore_folklore'); }
            }, {
                label: '🏪 1.1.3 小卖部',
                hint: '听童谣',
                cost: '⚡1',
                action: () => { goToScene('explore_shop'); }
            }, {
                label: '🃏 1.1.4 玩花切给大爷看',
                hint: '唠嗑获得规则',
                cost: '⚡1',
                action: () => { goToScene('play_cards'); }
            }, {
                label: '⛰️ 1.2 直接登山',
                hint: '前往道观',
                cost: '⚡1',
                action: () => { goToScene('climb_mountain'); }
            }];
            renderOptions(opts);
        }

        function goToScene(sceneId, extraData) {
            if (state._waitingConfirm) return;
            currentScene = sceneId;
            const scene = SCENES[sceneId];
            if (!scene) {
                console.error('场景不存在:', sceneId);
                return;
            }
            if (scene.onEnter) {
                scene.onEnter(extraData);
            }
            if (scene.render) {
                scene.render(extraData);
            }
            updateUI();
        }

        // ================================================================
        //  夜间休息（先显示场景，再获取规则）
        // ================================================================
        function enterNight() {
            if (state.gameOver || state._waitingConfirm) return;
            if (state.flags.chapter2) {
                setStory(`
                    <span class="title-line">🌙 深夜 · 山间</span>
                    你在山间找了一处避风的地方休息。远处的游神队伍已经散去，只剩下零星的火把在山路上摇曳。
                    你感到疲惫不堪，必须找个地方过夜。
                    你有两个选择：
                    • 去附近的村民家借宿，或许能听到一些有用的消息。
                    • 在野外将就一晚，虽然简陋但至少清净。

        function enterChapter2() {
            state.flags.chapter2 = true;
            state.ch2.phase = '0km';
            state.ch2.km = 0;
            state.ch2.boughtItems = [];
            state.ch2.boughtIncense = false;
            state.ch2.boughtWater = false;
            state.ch2.boughtAmulet = false;
            state.ch2.boughtCompass = false;
            state.ch2.boughtSausage = false;
            state.ch2.boughtFridge = false;
            state.ch2.boughtNothing = false;
            state.ch2.joinedYoushen = false;
            state.ch2.dragonReductionPerStep = 0;
            state.ch2.hasTriggeredComedy = false;
            state.ch2.passerbyCount = 0;
            state.ch2.comedyReady = false;
            state.ch2.comedyShown = false;
            state.ch2.lastMessage = null;
            state.stamina = state.maxStamina;
            state.actionsToday = 0;
            updateUI();
            renderChapter2();
        }

        function renderChapter2() {
            if (state.gameOver || state._waitingConfirm) return;
            if (state.stamina === 0) {
                enterNight();
                return;
            }
            switch (state.ch2.phase) {
                case '0km':
                    renderCh2_0km();
                    break;
                case 'shopping_done':
                    renderCh2_shoppingDone();
                    break;
                case '2km_youshen':
                    renderCh2_2kmYoushen();
                    break;
                case '2km_no_youshen':
                    renderCh2_2kmNoYoushen();
                    break;
                case '5km':
                    renderCh2_5km();
                    break;
                case 'left_path':
                    renderCh2_leftPath();
                    break;
                case 'right_path':
                    renderCh2_rightPath();
                    break;
                case 'chapter3':
                    renderCh2_chapter3();
                    break;
                default:
                    setStory('第二章出现错误，请重新开始。');
                    renderOptions([{ label: '🔄 重新开始', action: () => { resetGame(); } }]);
            }
        }

        // ---- 2.4 5km岔路 ----
        function renderCh2_5km() {
            if (state._waitingConfirm) return;
            const stepDragon = (3 - state.ch2.dragonReductionPerStep) * 3;
            changeDragonization(Math.max(3, stepDragon));
            if (!state.gameOver) {
                const passerbyIds = ['passerby_1', 'passerby_2', 'passerby_3', 'passerby_4', 'passerby_5'];
                const available = passerbyIds.filter(id => !state.rules.includes(id));
                const count = Math.min(rand(1, 2), available.length);
                const shuffled = shuffleArray(available);
                let addedCount = 0;
                const addNext = () => {
                    if (addedCount >= count || state.gameOver || state._waitingConfirm) {
                        state.ch2.passerbyCount += addedCount;
                        state.ch2.km = 5;
                        showStory(`<span class="km-progress">📍 你走了5公里，龙气越发浓郁（龙化 +${Math.max(3, stepDragon)}）</span>`);
                        updateUI();
                        if (!state.gameOver && !state._waitingConfirm) renderCh2_5km_continue();
                        return;
                    }
                    const id = shuffled[addedCount];
                    addRule(id).then(() => {
                        showStory(
                            `<span class="info-box">🚶 路遇行人：「${RULES_DB[id].text.replace('【路人信息】', '')}」</span>`
                        );
                        addedCount++;
                        addNext();
                    });
                };
                if (available.length > 0 && count > 0) {
                    addNext();
                    return;
                }
                state.ch2.passerbyCount += count;
                state.ch2.km = 5;
                showStory(`<span class="km-progress">📍 你走了5公里，龙气越发浓郁（龙化 +${Math.max(3, stepDragon)}）</span>`);
                updateUI();
                if (!state.gameOver && !state._waitingConfirm) renderCh2_5km_continue();
                return;
            }
            if (!state.gameOver && !state._waitingConfirm) renderCh2_5km_continue();
        }

                ${state.flags.chapter2 ? `<span style="color:var(--text-muted);font-size:0.85rem;">第二章进度: ${state.ch2.km}km · 遇到路人 ${state.ch2.passerbyCount} 次</span>` : ''}
            `, endingClass);

            if (isCh2Ending) {
                renderOptions([{
                    label: '🔄 重新开始第二章',
                    hint: '保留当前规则和龙化值',
                    ending: true,
                    action: () => { resetChapter2(); }
                }, {
                    label: '🏠 回到第一章开头（重置所有状态）',
                    hint: '保留规则和龙化值，重置所有剧情进度',
                    ending: true,
                    action: () => { resetToChapter1(); }
                }]);
            } else {
                renderOptions([{
                    label: '🔄 重新开始游戏',
                    ending: true,
                    action: () => { resetGame(); }
                }]);
            }
            updateUI();
        }

        // ================================================================
        //  重置函数
        // ================================================================

        function resetChapter2() {
            if (state.gameOver) state.gameOver = false;
            state.ch2 = {
                phase: '0km',
                boughtItems: [],
                boughtIncense: false,
                boughtWater: false,
                boughtAmulet: false,
                boughtCompass: false,
                boughtSausage: false,
                boughtFridge: false,
                boughtNothing: false,
                joinedYoushen: false,
                km: 0,
                dragonReductionPerStep: 0,
                hasTriggeredComedy: false,
                passerbyCount: 0,
                comedyReady: false,
                comedyShown: false,
                lastMessage: null,
            };
            state.flags.chapter2 = true;
            state.stamina = state.maxStamina;
            state.actionsToday = 0;
            state._waitingConfirm = false;
            state._confirmResolve = null;
            document.getElementById('rule-notification').classList.remove('show');
            updateUI();
            setStory(`
                <span class="title-line">🔄 重新开始第二章</span>
                <span class="divider">—— —— ——</span>
                你回到了山前，准备再次踏上邱龙山道。这一次，你带着之前的经验与规则，希望能走得更远。
                <span style="color:var(--text-muted);font-size:0.85rem;">你已收集 ${state.rules.length} 条规则，龙化值 ${clamp(state.dragonization, 0, 100)}%。</span>
            `);
            renderChapter2();
        }

        function resetToChapter1() {
            if (state.gameOver) state.gameOver = false;
            // 重置所有剧情状态（保留规则、龙化、桃木吊坠）
            state.day = 1;
            state.stamina = 3;
            state.actionsToday = 0;
            state.weekCount = 0;
            state.flags = {
                hasSleptInVillage: false,
                folkloreWarned: false,
                shopRhymeIndex: 0,
                chapter2: false,
                hasPeachWood: state.flags.hasPeachWood, // 保留桃木吊坠
                abandonedCompleteReady: false,
                abandonedHiddenTriggered: false,
            };
            state.ch2 = {
                phase: '0km',
                boughtItems: [],
                boughtIncense: false,
                boughtWater: false,
                boughtAmulet: false,
                boughtCompass: false,
                boughtSausage: false,
                boughtFridge: false,
                boughtNothing: false,
                joinedYoushen: false,
                km: 0,
                dragonReductionPerStep: 0,
                hasTriggeredComedy: false,
                passerbyCount: 0,
                comedyReady: false,
                comedyShown: false,
                lastMessage: null,
            };
            state._waitingConfirm = false;
            state._confirmResolve = null;
            document.getElementById('rule-notification').classList.remove('show');
            updateUI();
            setStory(`
                <span class="title-line">🏠 回到第一章开头</span>
                <span class="divider">—— —— ——</span>
                你回到了邱龙村。村口的木牌依然斑驳，空气中依然弥漫着菌菇与泥土的气息。
                但这一次，你带着更多的经验和规则，对这座村庄有了更深的理解。
                <span style="color:var(--text-muted);font-size:0.85rem;">你已收集 ${state.rules.length} 条规则，龙化值 ${clamp(state.dragonization, 0, 100)}%。</span>
                <span class="divider">· · ·</span>
                你决定再次探索村庄，收集更多线索，为再次登山做准备。
            `);
            renderMainOptions();
        }

        function resetGame() {
            state.day = 1;
            state.stamina = 3;
            state.dragonization = 0;
            state.rules = [];
            state.flags = {
                hasSleptInVillage: false,
                folkloreWarned: false,
                shopRhymeIndex: 0,
                chapter2: false,
                hasPeachWood: false,
                abandonedCompleteReady: false,
                abandonedHiddenTriggered: false,
            };
            state.actionsToday = 0;
            state.weekCount = 0;
            state.gameOver = false;
            state.newRuleCount = 0;
            state.ch2 = {
                phase: '0km',
                boughtItems: [],
                boughtIncense: false,
                boughtWater: false,
                boughtAmulet: false,
                boughtCompass: false,
                boughtSausage: false,
                boughtFridge: false,
                boughtNothing: false,
                joinedYoushen: false,
                km: 0,
                dragonReductionPerStep: 0,
                hasTriggeredComedy: false,
                passerbyCount: 0,
                comedyReady: false,
                comedyShown: false,
                lastMessage: null,
            };
            state._waitingConfirm = false;
            state._confirmResolve = null;
            document.getElementById('rule-notification').classList.remove('show');
            updateUI();
            goToScene('intro');
        }

        // ---------- 规则面板切换 ----------
        let rulesPanelOpen = false;
        document.getElementById('rulesToggle').addEventListener('click', () => { toggleRulesPanel(); });
        document.getElementById('rulesToggleBtn').addEventListener('click', () => { toggleRulesPanel(); });

        function toggleRulesPanel() {
            rulesPanelOpen = !rulesPanelOpen;
            document.getElementById('rules-panel').classList.toggle('open', rulesPanelOpen);
            if (rulesPanelOpen) {
                state.newRuleCount = state.rules.length;
                updateUI();
            }
        }

        // ---------- 初始化 ----------
        function init() {
            resetGame();
        }
        window.onload = init;
    </script>

</body>

</html>
