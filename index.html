<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙岭观前坑 · 第二章</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --bg-primary: #0d0a08;
            --bg-card: #1a1410;
            --bg-panel: #241e18;
            --border-gold: #8b7a4a;
            --text-primary: #e8ddd0;
            --text-muted: #a8957a;
            --text-gold: #d4b87a;
            --red-dark: #5a1a1a;
            --red-bright: #8a2a2a;
            --green-dim: #2a4a2a;
            --blue-dim: #1a2a4a;
            --shadow: rgba(0, 0, 0, 0.8);
            --font-serif: 'Noto Serif SC', '华文楷体', 'KaiTi', serif;
            --font-title: 'Ma Shan Zheng', '华文楷体', cursive;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(60, 30, 20, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 20, 50, 0.3) 0%, transparent 70%);
        }

        #game-container {
            width: 100%;
            max-width: 860px;
            height: 96vh;
            max-height: 820px;
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 顶部状态栏 ===== */
        #status-bar {
            background: linear-gradient(180deg, #1f1812 0%, #16100c 100%);
            border-bottom: 1px solid var(--border-gold);
            padding: 10px 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 6px 12px;
            flex-shrink: 0;
            z-index: 1;
            position: relative;
        }

        #status-bar .title {
            font-family: var(--font-title);
            font-size: 1.25rem;
            color: var(--text-gold);
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(180, 140, 80, 0.2);
            white-space: nowrap;
        }

        .status-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 14px;
            font-size: 0.8rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
        }

        .status-item .label {
            opacity: 0.7;
        }

        .status-item .value {
            color: var(--text-primary);
            font-weight: 700;
            min-width: 20px;
        }

        .status-item .value.danger {
            color: #d45a5a;
        }

        .status-item .value.warning {
            color: #d4b05a;
        }

        .status-item .value.safe {
            color: #6ab06a;
        }

        .stamina-dots {
            display: flex;
            gap: 4px;
        }

        .stamina-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            background: #2a221a;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            color: var(--text-muted);
        }

        .stamina-dot.filled {
            background: #4a7a4a;
            border-color: #6aaa6a;
            box-shadow: 0 0 10px rgba(74, 122, 74, 0.3);
            color: #b0e0b0;
        }

        .stamina-dot.spent {
            opacity: 0.25;
            background: #1a1410;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bar-track {
            width: 70px;
            height: 6px;
            background: #2a221a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #3a322a;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .bar-fill.dragon {
            background: linear-gradient(90deg, #4a7a4a, #8a5a3a, #aa4a2a);
        }

        .bar-fill.sanity {
            background: linear-gradient(90deg, #4a5a8a, #7a8aaa, #aac0e0);
        }

        /* ===== 主内容区 ===== */
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
            padding: 0 18px 0 18px;
        }

        #story-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10px 12px 10px;
            scroll-behavior: smooth;
        }

        #story-area::-webkit-scrollbar {
            width: 4px;
        }

        #story-area::-webkit-scrollbar-track {
            background: #1a1410;
        }

        #story-area::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .story-text .highlight {
            color: var(--text-gold);
        }

        .story-text .danger {
            color: #d45a5a;
        }

        .story-text .rule-text {
            display: block;
            padding: 8px 14px;
            margin: 6px 0;
            border-left: 3px solid var(--text-gold);
            background: rgba(180, 140, 80, 0.06);
            font-size: 0.9rem;
            color: #d4c8b0;
        }

        .story-text .divider {
            display: block;
            text-align: center;
            color: var(--text-muted);
            margin: 12px 0;
            letter-spacing: 6px;
            opacity: 0.4;
        }

        .story-text .title-line {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--text-gold);
            text-align: center;
            margin: 10px 0 14px 0;
            letter-spacing: 2px;
        }

        .story-text .nursery-rhyme {
            display: block;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(180, 140, 80, 0.08);
            border-radius: 6px;
            font-style: italic;
            color: #d4c8b0;
            line-height: 2;
            white-space: pre-line;
        }

        .story-text .ending-title {
            font-size: 1.8rem;
            color: #d45a5a;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
        }

        .story-text .shop-item {
            display: block;
            padding: 6px 14px;
            margin: 4px 0;
            border-left: 2px solid var(--text-gold);
            background: rgba(180, 140, 80, 0.04);
            font-size: 0.9rem;
        }

        .story-text .passerby-info {
            display: block;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(100, 80, 60, 0.12);
            border-radius: 6px;
            border-left: 3px solid #8b7a4a;
            font-style: italic;
            color: #d4c8b0;
            line-height: 1.8;
        }

        #rule-notification {
            background: rgba(26, 20, 16, 0.95);
            border: 1px solid var(--text-gold);
            border-radius: 8px;
            padding: 12px 18px;
            margin: 8px 0 10px 0;
            display: none;
            animation: fadeSlide 0.5s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #rule-notification.show {
            display: block;
        }

        #rule-notification .rule-title {
            color: var(--text-gold);
            font-weight: 700;
            font-size: 0.9rem;
        }

        #rule-notification .rule-body {
            font-size: 0.85rem;
            color: var(--text-primary);
            margin-top: 4px;
            line-height: 1.6;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 选项区域 ===== */
        #options-area {
            padding: 10px 0 16px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.15);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-btn {
            background: rgba(30, 24, 18, 0.8);
            border: 1px solid #3a322a;
            border-radius: 6px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(60, 50, 40, 0.8);
            border-color: var(--border-gold);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(139, 122, 74, 0.08);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn .hint {
            color: var(--text-muted);
            font-size: 0.7rem;
            margin-left: 8px;
            opacity: 0.6;
        }

        .option-btn .cost {
            float: right;
            color: var(--text-muted);
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .option-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ===== 规则记录面板 ===== */
        #rules-panel {
            background: rgba(16, 12, 10, 0.98);
            border-top: 1px solid var(--border-gold);
            flex-shrink: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            position: relative;
        }

        #rules-panel.open {
            max-height: 300px;
            overflow-y: auto;
        }

        #rules-panel::-webkit-scrollbar {
            width: 3px;
        }

        #rules-panel::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        #rules-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(139, 122, 74, 0.15);
            cursor: pointer;
            user-select: none;
        }

        #rules-panel .panel-header:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        #rules-panel .panel-header .title {
            color: var(--text-gold);
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        #rules-panel .panel-header .count {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        #rules-panel .panel-body {
            padding: 10px 18px 16px 18px;
        }

        .rule-entry {
            display: flex;
            gap: 10px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(139, 122, 74, 0.06);
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .rule-entry .num {
            color: var(--text-gold);
            font-weight: 700;
            flex-shrink: 0;
            width: 22px;
        }

        .rule-entry .content {
            color: var(--text-primary);
        }

        .rule-entry .content .new-tag {
            color: #6ab06a;
            font-size: 0.6rem;
            margin-left: 6px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ===== 底部工具栏 ===== */
        #footer-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 18px 8px 18px;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.08);
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            gap: 8px;
            flex-wrap: wrap;
        }

        #footer-tools .left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        #footer-tools .left .day-info {
            color: var(--text-gold);
        }

        .toggle-rules-btn {
            background: none;
            border: 1px solid var(--border-gold);
            color: var(--text-muted);
            padding: 4px 14px;
            border-radius: 4px;
            font-family: var(--font-serif);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-rules-btn:hover {
            background: rgba(139, 122, 74, 0.1);
            color: var(--text-gold);
        }

        .toggle-rules-btn .badge {
            background: var(--red-bright);
            color: #fff;
            border-radius: 50%;
            padding: 0 6px;
            font-size: 0.6rem;
            margin-left: 4px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            #game-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }

            #status-bar {
                padding: 6px 12px;
                flex-direction: column;
                align-items: stretch;
                gap: 4px;
            }

            #status-bar .title {
                font-size: 1rem;
                text-align: center;
            }

            .status-group {
                justify-content: center;
                font-size: 0.7rem;
                gap: 4px 10px;
            }

            .bar-track {
                width: 50px;
            }

            #story-area {
                padding: 14px 6px 8px 6px;
            }

            .story-text {
                font-size: 0.85rem;
                line-height: 1.8;
            }

            #options-area {
                padding: 6px 0 10px 0;
            }

            .option-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }

            #footer-tools {
                padding: 2px 12px 6px 12px;
                font-size: 0.65rem;
            }

            #rules-panel.open {
                max-height: 200px;
            }
        }

        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-8 {
            margin-top: 8px;
        }

        .mb-8 {
            margin-bottom: 8px;
        }

        .op-5 {
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <!-- ===== 状态栏 ===== -->
        <div id="status-bar">
            <div class="title">🌙 龙岭观前坑</div>
            <div class="status-group">
                <div class="status-item">
                    <span class="label">📅</span>
                    <span class="value" id="dayDisplay">第1天</span>
                </div>
                <div class="status-item">
                    <span class="label">🕐</span>
                    <span class="value" id="timeDisplay">上午</span>
                </div>
                <div class="status-item">
                    <span class="label">⚡</span>
                    <span class="stamina-dots" id="staminaDots"></span>
                </div>
                <div class="status-item bar-wrap">
                    <span class="label" style="color:#aa6a4a;">🐉</span>
                    <span class="bar-track"><span class="bar-fill dragon" id="dragonBar" style="width:0%"></span></span>
                    <span class="value" id="dragonVal">0%</span>
                </div>
                <div class="status-item bar-wrap">
                    <span class="label" style="color:#6a8aaa;">🧠</span>
                    <span class="bar-track"><span class="bar-fill sanity" id="sanityBar"
                            style="width:100%"></span></span>
                    <span class="value" id="sanityVal">100%</span>
                </div>
            </div>
        </div>

        <!-- ===== 主内容 ===== -->
        <div id="main-area">
            <div id="story-area">
                <div class="story-text" id="storyText"></div>
                <div id="rule-notification">
                    <div class="rule-title">📜 新规则记录</div>
                    <div class="rule-body" id="ruleNotifyBody"></div>
                </div>
            </div>
            <div id="options-area"></div>
        </div>

        <!-- ===== 规则记录面板 ===== -->
        <div id="rules-panel">
            <div class="panel-header" id="rulesToggle">
                <span class="title">📜 规则记录</span>
                <span class="count" id="ruleCount">已收集 0 条</span>
            </div>
            <div class="panel-body" id="rulesList"></div>
        </div>

        <!-- ===== 底部工具栏 ===== -->
        <div id="footer-tools">
            <div class="left">
                <span class="day-info" id="dayInfo">第1天 · 上午</span>
                <span id="actionCount" style="opacity:0.5;">已行动 0 次</span>
            </div>
            <button class="toggle-rules-btn" id="rulesToggleBtn">📜 规则 <span class="badge"
                    id="newRuleBadge">0</span></button>
        </div>
    </div>

    <script>
        // ================================================================
        //  🎮  龙岭观前坑 · 第二章  –  完整版（含继续选项、重玩功能）
        // ================================================================

        // ---------- 状态 ----------
        const state = {
            day: 1,
            stamina: 3,
            maxStamina: 3,
            dragonization: 0,
            rules: [],
            flags: {
                hasSleptInVillage: false,
                folkloreWarned: false,
                shopRhymeIndex: 0,
                chapter2: false,
                hasPeachWood: false,
                abandonedCompleteReady: false,
                abandonedHiddenTriggered: false,
                chapter2Started: false,
                km: 0,
                hasIncense: false,
                hasWater: false,
                hasAmulet: false,
                hasCompass: false,
                hasSausage: false,
                hasFridgeMagnet: false,
                joinedParade: false,
                hasObserved: false,
                chapter2Stage: 0,
                passerbyIndex: 0,
            },
            actionsToday: 0,
            weekCount: 0,
            gameOver: false,
            newRuleCount: 0,
            // 用于保存第二章开始时的状态，用于重新开始第二章
            chapter2StartState: null,
        };

        // ---------- 规则库 ----------
        const RULES_DB = {
            'base_1': { id: 'base_1', text: '【游客守则】寄宿村民家，早餐玉米粥腌菜；若嫂嫂端上"菌菇炒蛋"可少量食用，不可追问种类；晚餐后"银杏茶"需饮尽。' },
            'base_2': { id: 'base_2', text: '【游客守则】清晨6点前不可出门。踩坏灰线需找嫂嫂带去土地庙敬香，不可自行处理。' },
            'base_3': { id: 'base_3', text: '【游客守则】上山带嫂嫂准备的水，不喝山泉水。走登山步道，不碰路边"青褐色织物"。' },
            'base_4': { id: 'base_4', text: '【游客守则】集体行动，看好家人。符纸若自动浮现青纹，交给导游，不可带入道观。' },
            'base_5': { id: 'base_5', text: '【游客守则】参加社戏需向民俗部申请，提前斋戒，嫂嫂会准备三柱香。' },
            'base_6': { id: 'base_6', text: '【游客守则】社戏烟雾中若见"带菌柄的鳞片状阴影"，低头默念"龙佑平安"，不可惊呼。' },
            'base_7': { id: 'base_7', text: '【游客守则】进入道观保持敬畏，聆听诵经声，心诚挂符。' },
            'base_8': { id: 'base_8', text: '【游客守则】随队上香或挂符后领香火，上香后乘旅游车从北岭回村。' },
            'base_9': { id: 'base_9', text: '【游客守则】不买"茯神"或"带菌龙鳞饰品"。' },
            'base_10': { id: 'base_10', text: '【游客守则】不靠近村西聚居区。' },
            'base_11': { id: 'base_11', text: '【游客守则】夜间若听到隔壁持续笑声或怒骂声，戴耳塞入睡；若到凌晨3点后，向嫂嫂说明换房。' },

            'abandoned_1': { id: 'abandoned_1', text: '【废弃房屋】墙上有血字："别信嫂嫂的笑，超过十秒就要跑。"' },
            'abandoned_2': { id: 'abandoned_2', text: '【废弃房屋】地上散落的旧符纸写着："青纹现，速归还；龙气缠，命难全。"' },
            'abandoned_3': { id: 'abandoned_3', text: '【废弃房屋】在破旧神龛下发现一张泛黄照片，背后写着："观中弟子皆无影，重阳登高莫回头。"' },

            'hidden_2': { id: 'hidden_2', text: '【草木灰显影】清晨路上的灰线是祖宗传下来的护村法子，踩坏了要找嫂嫂去土地庙"补"，手上香灰印子是补好的记号，擦了就没用了。' },

            'hidden_4': { id: 'hidden_4', text: '【草木灰显影】社戏的烟里若看见鱼鳞带小柄的影子，别出声，低头念"平安"，它们怕动静。' },

            'card_important_2': { id: 'card_important_2', text: '【花切·重要】大爷说："雷击木是龙王爷的骨头，挂符要挂北面，南面是给先生留的。"' },
            'card_important_3': { id: 'card_important_3', text: '【花切·重要】大爷说："村里辈分最高的阿婆，她养的那只黑猫，眼睛是竖着的，和观里的一样。"' },
            'card_useless_1': { id: 'card_useless_1', text: '【花切·闲聊】大爷说："今天天气不错，适合晒菌子。"' },
            'card_useless_2': { id: 'card_useless_2', text: '【花切·闲聊】大爷说："村口那棵银杏树，听说有几百年了。"' },
            'card_useless_3': { id: 'card_useless_3', text: '【花切·闲聊】大爷说："我家孙子在城里念书，老叫我搬去住，我舍不得这山。"' },

            'night_1': { id: 'night_1', text: '【夜间谈话】嫂嫂低语："莫要在半夜照镜子，镜子里看到的不一定是自己。"' },
            'night_2': { id: 'night_2', text: '【夜间谈话】嫂嫂叹息："村里那口老井，井水泛青时，莫要靠近。"' },
            'night_3': { id: 'night_3', text: '【夜间谈话】嫂嫂叮嘱："若听到门外有人叫你名字，莫要应答，那是龙王爷在挑人。"' },
        };

        // ---------- 路人信息 ----------
        const PASSERBY_INFO = [
            `【1km · 遇见张嫂嫂】
“采访对象：村东头民宿张嫂嫂（50岁左右，笑容温和，手上戴青褐色织物手环）
采访时间：重阳前3日 午后

游客：张嫂嫂，咱们村的重阳社戏听说有几百年历史了？小时候您也看过吗？
张嫂嫂：（慢悠悠择菜，指尖泛着淡青）看过哟，打小就看。我阿娘说，社戏是给龙王爷看的，龙王爷高兴了，就不闹瘴气，咱们就能吃饱饭。你看这菜，都是龙王爷庇佑才长这么好的。（把一片带黄斑的菜叶丢在地上，黄斑形状像细小的鳞片）”`,

            `【2km · 遇见张嫂嫂】
游客：龙王爷？是传说里被道士镇压的那条龙吗？
张嫂嫂：（抬头笑，笑声持续了约12秒）是哟，玄清先生是大恩人，把恶龙镇在山底下，还给咱们传了耕种的法子。我家阿弟，小时候就去观里当童子，回来后可精神了，就是不爱说话，额头上长了个小疙瘩，像银杏果似的，先生说那是龙气护着的，是福气。（伸手摸了摸自己的额头，那里有个不明显的凸起）”`,

            `【3km · 遇见张嫂嫂】
游客：那童子入观后，还能经常回家吗？
张嫂嫂：（低头继续择菜，动作变慢）回家干啥呀，观里有先生疼，有龙王爷护着，比家里好。去年有个外乡游客，好奇跟着社戏队伍进了森林，没跟上队伍，后来就没出来了。村里人都说，是龙王爷瞧着他心诚，把他留下当“伴读”了。（语气平淡，像在说家常事）”`,

            `【4km · 遇见张嫂嫂】
游客：啊？那不是很危险吗？景区守则里说不能脱离队伍。
张嫂嫂：（突然停下动作，抬头盯着游客，笑容消失，眼神呆滞）危险？哪里危险呀。龙王爷只是想找些干净的人陪他说话。你看你，眉眼干净，身上的气也纯，龙王爷肯定喜欢。（伸手想去碰游客的脸）
游客：（后退躲开）嫂嫂您别这样……
张嫂嫂：（突然暴怒，声音嘶哑，夹杂着轻微的嘶嘶声）躲什么！先生说了，干净的阳原要献给龙王爷，龙王爷才能给我们长生！你跑不掉的！这村里的人，都是龙王爷的子民，都是先生的养料！（抄起身边的木盆朝游客砸去）”`,

            `【5km · 记录末尾批注】
（字迹潦草，带水渍）她额头上的凸起在发光，青褐色手环掉在地上，里面裹着细小的鳞片状物体，上面长着白色的小菌柄……
<span style="color:#d45a5a;font-weight:700;">不要相信任何笑超过10秒的村民……</span>`
        ];

        // ---------- 工具函数 ----------
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function pick(arr) { return arr[rand(0, arr.length - 1)]; }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = rand(0, i);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ---------- 展示路人信息 ----------
        function showPasserby(index) {
            if (index < 0 || index >= PASSERBY_INFO.length) return;
            if (index < state.flags.passerbyIndex) return;
            state.flags.passerbyIndex = index + 1;
            changeDragonization(10);
            if (!state.gameOver) {
                showStory(`
                    <span class="divider">—— 🚶 前方有一个路人 ——</span>
                    <span class="passerby-info">${PASSERBY_INFO[index]}</span>
                    <span style="color:var(--text-muted);font-size:0.85rem;">（龙化 +10）</span>
                    <span class="divider">—— —— ——</span>
                `);
            }
        }

        // ---------- 状态更新 ----------
        function updateUI() {
            document.getElementById('dayDisplay').textContent = `第${state.day}天`;
            const chapterLabel = state.flags.chapter2Started ? ' · 第二章' : '';
            document.getElementById('dayInfo').textContent = `第${state.day}天 · ${getTimeLabel()}${chapterLabel}`;
            document.getElementById('timeDisplay').textContent = getTimeLabel();

            const dots = document.getElementById('staminaDots');
            dots.innerHTML = '';
            for (let i = 0; i < state.maxStamina; i++) {
                const dot = document.createElement('span');
                dot.className = 'stamina-dot' + (i < state.stamina ? ' filled' : ' spent');
                dot.textContent = i < state.stamina ? '●' : '○';
                dots.appendChild(dot);
            }

            const dVal = clamp(state.dragonization, 0, 100);
            const sVal = 100 - dVal;
            document.getElementById('dragonBar').style.width = dVal + '%';
            document.getElementById('dragonVal').textContent = dVal + '%';
            document.getElementById('sanityBar').style.width = sVal + '%';
            document.getElementById('sanityVal').textContent = sVal + '%';

            document.getElementById('actionCount').textContent = `已行动 ${state.actionsToday} 次`;
            document.getElementById('ruleCount').textContent = `已收集 ${state.rules.length} 条`;

            const badge = document.getElementById('newRuleBadge');
            const newCount = state.rules.length - state.newRuleCount;
            badge.textContent = newCount > 0 ? newCount : '0';
            badge.style.display = newCount > 0 ? 'inline' : 'none';

            renderRulesList();

            if (state.dragonization >= 80 && !state.gameOver) {
                triggerEnding('龙化值过高 · 被龙气侵蚀');
            }
        }

        function getTimeLabel() {
            if (state.stamina === 3) return '上午';
            if (state.stamina === 2) return '下午';
            if (state.stamina === 1) return '晚上';
            return '深夜';
        }

        function renderRulesList() {
            const container = document.getElementById('rulesList');
            if (state.rules.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;padding:8px 0;">尚未获得任何规则，探索世界以收集线索。</div>';
                return;
            }
            let html = '';
            state.rules.forEach((id, idx) => {
                const rule = RULES_DB[id];
                if (!rule) return;
                const isNew = idx >= state.newRuleCount;
                html += `
                    <div class="rule-entry">
                        <span class="num">#${idx + 1}</span>
                        <span class="content">${rule.text}${isNew ? '<span class="new-tag">● 新</span>' : ''}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ---------- 数值修改 ----------
        function changeDragonization(delta) {
            if (state.gameOver) return;
            state.dragonization = clamp(state.dragonization + delta, 0, 100);
            updateUI();
        }

        function addRule(id) {
            if (!RULES_DB[id]) return false;
            if (state.rules.includes(id)) return false;
            state.rules.push(id);
            const rule = RULES_DB[id];
            const notify = document.getElementById('rule-notification');
            document.getElementById('ruleNotifyBody').textContent = rule.text;
            notify.classList.add('show');
            setTimeout(() => { notify.classList.remove('show'); }, 5000);
            updateUI();
            return true;
        }

        // ---------- 体力扣除 ----------
        function deductStamina() {
            if (state.stamina <= 0) return false;
            state.stamina--;
            state.actionsToday++;
            updateUI();
            return true;
        }

        function finishSceneAndReturn() {
            if (state.gameOver) return;
            deductStamina();
            if (state.stamina === 0) {
                enterNight();
            } else {
                if (state.flags.chapter2Started) {
                    renderChapter2Main();
                } else {
                    renderMainOptions();
                }
            }
        }

        // ---------- 夜间休息 ----------
        function enterNight() {
            if (state.gameOver) return;
            setStory(`
                <span class="title-line">🌙 深夜已至</span>
                你忙碌了一整天，此时夜色已深，村中寂静无声。你感到疲惫不堪，必须找个地方过夜。
                你有两个选择：
                • 去村民家借宿，或许能听到一些有用的消息。
                • 回到自己的车里将就一晚，虽然简陋但至少清净。
                请选择：
            `);
            renderOptions([{
                label: '🏠 去村民家过夜',
                hint: '获得1-2条规则，理智+5~10',
                action: () => {
                    restAtVillage();
                }
            }, {
                label: '🚗 在车里将就一晚',
                hint: '无事发生，龙化+3~5',
                action: () => {
                    restInCar();
                }
            }]);
        }

        function restAtVillage() {
            if (state.gameOver) return;
            state.flags.hasSleptInVillage = true;
            const nightRuleIds = ['night_1', 'night_2', 'night_3'];
            const available = nightRuleIds.filter(id => !state.rules.includes(id));
            let gained = [];
            if (available.length > 0) {
                const count = Math.min(rand(1, 2), available.length);
                const shuffled = shuffleArray(available);
                for (let i = 0; i < count; i++) {
                    if (addRule(shuffled[i])) {
                        gained.push(shuffled[i]);
                    }
                }
            }

            let eventText = '嫂嫂热情地招待了你，端来热汤和银杏茶。你一边喝，一边和她闲聊。';
            if (gained.length > 0) {
                eventText += ` 你从她的话里听出了一些端倪，记下了几条规则。`;
            } else {
                eventText += ' 她没有多说什么，只是让你早些休息。你一夜安稳。';
            }

            const reduceDragon = rand(5, 10);
            changeDragonization(-reduceDragon);
            if (!state.gameOver) {
                eventText += ` 你感到神清气爽，龙气似乎被驱散了一些（龙化 -${reduceDragon}）。`;
            }

            finishRest('村民家', eventText);
        }

        function restInCar() {
            if (state.gameOver) return;
            let eventText = '你在车里蜷缩了一晚，睡得腰酸背痛，而且总觉得窗外有什么东西在盯着你。';
            const increaseDragon = rand(3, 5);
            changeDragonization(increaseDragon);
            if (!state.gameOver) {
                eventText += ` 你感到身体有些沉重，似乎龙气在悄然滋长（龙化 +${increaseDragon}）。`;
            }
            if (Math.random() < 0.2) {
                eventText += ' 半夜你似乎听到了远处传来的诵经声，但很快又消失了。';
            }
            finishRest('车里', eventText);
        }

        function finishRest(place, eventText) {
            if (state.gameOver) return;
            state.stamina = state.maxStamina;
            state.day++;
            state.weekCount++;
            state.actionsToday = 0;

            if (state.weekCount >= 7) {
                triggerEnding('老实人结局');
                return;
            }

            updateUI();

            setStory(`
                <span class="title-line">🌅 第${state.day}天 · 清晨</span>
                你在${place}度过了一夜。${eventText}
                <span class="divider">· · ·</span>
                你整理好行装，走出住处。邱龙村的清晨笼罩在薄雾之中，新的一天开始了。
            `);
            if (state.flags.chapter2Started) {
                renderChapter2Main();
            } else {
                renderMainOptions();
            }
        }

        // ---------- 场景渲染 ----------
        let currentScene = 'intro';

        function showStory(text) {
            const el = document.getElementById('storyText');
            if (text) {
                el.innerHTML += text.replace(/\n/g, '<br>') + '<br>';
            }
            const area = document.getElementById('story-area');
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
        }

        function clearStory() {
            document.getElementById('storyText').innerHTML = '';
        }

        function setStory(text) {
            clearStory();
            showStory(text);
        }

        function renderOptions(options) {
            const container = document.getElementById('options-area');
            container.innerHTML = '';
            if (!options || options.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted);text-align:center;font-size:0.8rem;padding:8px;">—— 没有更多行动 ——</div>';
                return;
            }
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (opt.disabled ? ' disabled' : '');
                btn.innerHTML =
                    `${opt.label}${opt.hint ? `<span class="hint">${opt.hint}</span>` : ''}${opt.cost ? `<span class="cost">${opt.cost}</span>` : ''}`;
                if (!opt.disabled) {
                    btn.addEventListener('click', () => {
                        if (opt.action) opt.action();
                    });
                }
                container.appendChild(btn);
            });
        }

        // ---------- 主菜单 ----------
        function renderMainOptions() {
            if (state.gameOver) return;
            if (state.stamina === 0) {
                enterNight();
                return;
            }
            if (state.flags.chapter2) {
                state.flags.chapter2Started = true;
                startChapter2();
                return;
            }

            const opts = [{
                label: '🏚️ 1.1.1 废弃房屋',
                hint: '探索获得规则',
                cost: '⚡1',
                action: () => {
                    goToScene('explore_abandoned');
                }
            }, {
                label: '🏛️ 1.1.2 民俗部',
                hint: '打听消息',
                cost: '⚡1',
                action: () => {
                    goToScene('explore_folklore');
                }
            }, {
                label: '🏪 1.1.3 小卖部',
                hint: '听童谣',
                cost: '⚡1',
                action: () => {
                    goToScene('explore_shop');
                }
            }, {
                label: '🃏 1.1.4 玩花切给大爷看',
                hint: '唠嗑获得规则',
                cost: '⚡1',
                action: () => {
                    goToScene('play_cards');
                }
            }, {
                label: '⛰️ 1.2 直接登山',
                hint: '前往道观',
                cost: '⚡1',
                action: () => {
                    goToScene('climb_mountain');
                }
            }];
            renderOptions(opts);
        }

        // ---------- 场景跳转 ----------
        function goToScene(sceneId, extraData) {
            currentScene = sceneId;
            const scene = SCENES[sceneId];
            if (!scene) {
                console.error('场景不存在:', sceneId);
                return;
            }
            if (scene.onEnter) {
                scene.onEnter(extraData);
            }
            if (scene.render) {
                scene.render(extraData);
            }
            updateUI();
        }

        // ---------- 场景定义 ----------
        const SCENES = {};

        // ---- 开场 ----
        SCENES['intro'] = {
            onEnter: () => {
                setStory(`
                    <span class="title-line">🌙 龙岭观前坑 · 第一章</span>
                    <span class="divider">—— —— ——</span>
                    你带着一份朦胧的期待，来到了邱龙村。村口立着一块斑驳的木牌，上面写着：
                    <span class="rule-text">「欢迎来到龙岭观前坑景区 · 请遵守游客守则」</span>
                    你从公告栏上撕下了一份《游客守则》，纸张泛黄，墨迹有些晕染。
                    <span class="divider">· · ·</span>
                    <span style="color:var(--text-gold);">📜 你获得了全部基础规则：</span>
                `);
                const allBaseIds = ['base_1', 'base_2', 'base_3', 'base_4', 'base_5', 'base_6', 'base_7', 'base_8', 'base_9',
                    'base_10', 'base_11'
                ];
                allBaseIds.forEach(id => {
                    if (!state.rules.includes(id)) {
                        state.rules.push(id);
                    }
                });
                const ruleTexts = allBaseIds.map(id => RULES_DB[id].text);
                ruleTexts.forEach(t => {
                    showStory(`<span class="rule-text">${t}</span>`);
                });
                showStory(`
                    <span class="divider">—— —— ——</span>
                    你收起守则，环顾四周。村中炊烟袅袅，远处山峦叠翠，但空气中隐隐有一丝潮湿的、泥土与菌类混合的气息。
                    你感到，这里的一切似乎并不像表面那般宁静……

        // 保存第二章开始时的状态（用于重新开始第二章）
        function saveChapter2State() {
            state.chapter2StartState = {
                day: state.day,
                stamina: state.stamina,
                dragonization: state.dragonization,
                rules: state.rules.slice(), // 复制规则列表
                flags: JSON.parse(JSON.stringify(state.flags)), // 深拷贝标志
            };
        }

        // 重置到第二章开始状态
        function resetToChapter2Start() {
            if (!state.chapter2StartState) {
                // 如果没有保存状态，则完全重置（但这种情况不会发生）
                resetGame();
                return;
            }
            const s = state.chapter2StartState;
            state.day = s.day;
            state.stamina = s.stamina;
            state.dragonization = s.dragonization;
            state.rules = s.rules.slice();
            // 恢复 flags，但需要重置第二章相关的标志，保留第一章的状态
            // 我们只恢复第一章相关的标志，第二章标志重置
            state.flags = {
                hasSleptInVillage: s.flags.hasSleptInVillage || false,
                folkloreWarned: s.flags.folkloreWarned || false,
                shopRhymeIndex: s.flags.shopRhymeIndex || 0,
                chapter2: true, // 仍然处于第二章
                hasPeachWood: s.flags.hasPeachWood || false,
                abandonedCompleteReady: s.flags.abandonedCompleteReady || false,
                abandonedHiddenTriggered: s.flags.abandonedHiddenTriggered || false,
                // 第二章标志重置
                chapter2Started: true,
                km: 0,
                hasIncense: false,
                hasWater: false,
                hasAmulet: false,
                hasCompass: false,
                hasSausage: false,
                hasFridgeMagnet: false,
                joinedParade: false,
                hasObserved: false,
                chapter2Stage: 1,
                passerbyIndex: 0,
            };
            state.actionsToday = 0;
            state.weekCount = s.weekCount || 0;
            state.gameOver = false;
            state.newRuleCount = state.rules.length;
            document.getElementById('rule-notification').classList.remove('show');
            updateUI();
            // 重新开始第二章
            startChapter2();
        }

        function startChapter2() {
            state.flags.chapter2Started = true;
            state.flags.km = 0;
            state.flags.chapter2Stage = 1;
            state.flags.hasIncense = false;
            state.flags.hasWater = false;
            state.flags.hasAmulet = false;
            state.flags.hasCompass = false;
            state.flags.hasSausage = false;
            state.flags.hasFridgeMagnet = false;
            state.flags.joinedParade = false;
            state.flags.hasObserved = false;
            state.flags.passerbyIndex = 0;

            // 保存当前状态以便重新开始第二章
            saveChapter2State();

            setStory(`
                <span class="title-line">📖 第二章 · 登山之路</span>
                <span class="divider">—— —— ——</span>
                你终于踏上了前往道观的山路。清晨的薄雾在山间缭绕，空气中弥漫着湿润的泥土气息。

                <span style="color:var(--text-gold);">📍 0km 补给点</span>
                你来到了山脚下的第一个补给点。这里有一个简陋的摊位，上面摆着各种物品。

        function renderChapter2Main() {
            if (state.gameOver) return;
            if (state.stamina === 0) {
                enterNight();
                return;
            }

            const stage = state.flags.chapter2Stage;
            if (stage === 1) {
                renderChapter2Shop();
            } else if (stage === 2) {
                renderChapter2TwoKm();
            } else if (stage === 3) {
                renderChapter2FiveKm();
            } else if (stage === 4) {
                renderChapter2Forest();
            } else {
                renderChapter2Shop();

                        你感到体内的龙气越来越重，皮肤开始泛起青黑色的鳞片，额头上鼓起硬块。
                        你的理智逐渐被龙气吞噬，你开始听到山中传来的呼唤声，那是龙王爷在召唤你。
                        你再也无法抵抗，一步步走向深山，走向道观……
                        <span class="divider">· · ·</span>
                        <span style="color:#aa4a4a;">你成为了龙王爷的又一个侍从。</span>
                        <span style="color:#d4b87a;">—— 龙气弥漫，万物皆化 ——</span>
                    `,
                    isChapter2: false
                },
                'BE2 · 大不敬': {
                    title: '💀 BE2 · 大不敬',
                    desc: `
                        你因不敬龙神或道观，被狂热的信徒拖入了密林之中。
                        周围是无数双冷漠的眼睛，你听到他们在低声诵经，那声音越来越近……
                        <span class="divider">· · ·</span>
                        <span style="color:#d45a5a;font-weight:700;">你再也没有回来。</span>
                    `,
                    isChapter2: true
                },
                'BE3 · 惊扰': {
                    title: '💀 BE3 · 惊扰',
                    desc: `
                        你慌不择路地逃进了树林中，菌菇锋利的裙边划过你的脸。
                        你迎面撞上了一个满身鳞片、开膛破肚耷拉着肠子的人。
                        你惊恐地坐在地上，手摸到了湿滑粘腻的东西……
                        <span class="divider">· · ·</span>
                        <span style="color:#d45a5a;font-weight:700;">你知道你马上也会成为他们的一员了。</span>
                    `,
                    isChapter2: true
                },
                'BE4 · 半途而废': {
                    title: '🚶 BE4 · 半途而废',
                    desc: `
                        你看到了游神队伍，也许你也与之同行，但是你没有完成这次修行。
                        你感到内心缺了很多一直以来支撑你的事物。
                        当你驱车离开这里时，你知道你的一部分永远留在了山里。
                        <span class="divider">· · ·</span>
                        <span style="color:#d4b87a;">—— 遗憾是修行的一部分 ——</span>
                    `,
                    isChapter2: true
                },
                'HE2 · 逃离游神': {
                    title: '🌟 HE2 · 逃离游神',
                    desc: `
                        你认出了民俗部的暗号，在补给点店员的帮助下，你成功脱离了游神队伍。
                        你及时得到了救助，但你也知道自己已经无法离开这座村子了。
                        <span class="divider">· · ·</span>
                        <span style="color:#d4b87a;">—— 你安全了，但也永远困在了这里 ——</span>
                        <span style="color:var(--text-muted);font-size:0.85rem;">你在村民家安顿下来，成为了一名"村民"。</span>
                        <span style="color:var(--text-muted);font-size:0.85rem;">你开始帮助后来者，就像当初民俗部帮助你一样。</span>
                    `,
                    isChapter2: true
                }
            };

            const ending = endingMap[type];
            if (ending) {
                title = ending.title;
                desc = ending.desc;
                isChapter2Ending = ending.isChapter2;
            } else {
                desc = `游戏结束。`;
                isChapter2Ending = false;
            }

            setStory(`
                <span class="ending-title">${title}</span>
                <span class="divider">—— —— ——</span>
                ${desc}
                <span class="divider">· · ·</span>
                <span style="color:var(--text-muted);font-size:0.85rem;">你一共度过了 ${state.day} 天，收集了 ${state.rules.length} 条规则。</span>
                <span style="color:var(--text-muted);font-size:0.85rem;">最终龙化值: ${clamp(state.dragonization, 0, 100)}% · 理智值: ${100 - clamp(state.dragonization, 0, 100)}%</span>
            `);

            // 根据结局类型提供不同选项
            let options = [];
            if (isChapter2Ending) {
                // 第二章内结局：提供重新开始第二章和回到第一章
                options = [{
                    label: '🔄 重新开始第二章',
                    action: () => {
                        resetToChapter2Start();
                    }
                }, {
                    label: '🔙 回到第一章开头',
                    action: () => {
                        resetGame();
                    }
                }];
            } else {
                // 全局结局（老实人、龙化等）：只提供重新开始游戏
                options = [{
                    label: '🔄 重新开始游戏',
                    action: () => {
                        resetGame();
                    }
                }];
            }
            renderOptions(options);
            updateUI();
        }

        // ---- 重置到第一章开头 ----
        function resetGame() {
            state.day = 1;
            state.stamina = 3;
            state.dragonization = 0;
            state.rules = [];
            state.flags = {
                hasSleptInVillage: false,
                folkloreWarned: false,
                shopRhymeIndex: 0,
                chapter2: false,
                hasPeachWood: false,
                abandonedCompleteReady: false,
                abandonedHiddenTriggered: false,
                chapter2Started: false,
                km: 0,
                hasIncense: false,
                hasWater: false,
                hasAmulet: false,
                hasCompass: false,
                hasSausage: false,
                hasFridgeMagnet: false,
                joinedParade: false,
                hasObserved: false,
                chapter2Stage: 0,
                passerbyIndex: 0,
            };
            state.actionsToday = 0;
            state.weekCount = 0;
            state.gameOver = false;
            state.newRuleCount = 0;
            state.chapter2StartState = null;
            document.getElementById('rule-notification').classList.remove('show');
            updateUI();
            goToScene('intro');
        }

        // ---------- 规则面板切换 ----------
        let rulesPanelOpen = false;
        document.getElementById('rulesToggle').addEventListener('click', () => {
            toggleRulesPanel();
        });
        document.getElementById('rulesToggleBtn').addEventListener('click', () => {
            toggleRulesPanel();
        });

        function toggleRulesPanel() {
            rulesPanelOpen = !rulesPanelOpen;
            document.getElementById('rules-panel').classList.toggle('open', rulesPanelOpen);
            if (rulesPanelOpen) {
                state.newRuleCount = state.rules.length;
                updateUI();
            }
        }

        // ---------- 初始化 ----------
        function init() {
            resetGame();
        }

        window.onload = init;
    </script>

</body>

</html>
