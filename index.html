<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙岭观前坑 · 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --bg-primary: #0d0a08;
            --bg-card: #1a1410;
            --bg-panel: #241e18;
            --border-gold: #8b7a4a;
            --text-primary: #e8ddd0;
            --text-muted: #a8957a;
            --text-gold: #d4b87a;
            --red-bright: #8a2a2a;
            --font-serif: 'Noto Serif SC', '华文楷体', 'KaiTi', serif;
            --font-title: 'Ma Shan Zheng', '华文楷体', cursive;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(60, 30, 20, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 20, 50, 0.3) 0%, transparent 70%);
        }

        #game-container {
            width: 100%;
            max-width: 860px;
            height: 96vh;
            max-height: 820px;
            /* ⭐ 用图片替代深红色背景，加上暗色遮罩让内容清晰可读 */
            background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0.85) 50%, rgba(0, 0, 0, 0.9) 100%),
                url('image/container-bg.jpg') center center / cover no-repeat;
            background-blend-mode: overlay, normal;
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        #status-bar {
            background: linear-gradient(180deg, #1f1812 0%, #16100c 100%);
            border-bottom: 1px solid var(--border-gold);
            padding: 8px 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4px 12px;
            flex-shrink: 0;
            z-index: 1;
            position: relative;
        }

        #status-bar .title {
            font-family: var(--font-title);
            font-size: 1.2rem;
            color: var(--text-gold);
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(180, 140, 80, 0.2);
            white-space: nowrap;
        }

        .status-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 12px;
            font-size: 0.75rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
        }

        .status-item .label {
            opacity: 0.7;
        }

        .status-item .value {
            color: var(--text-primary);
            font-weight: 700;
            min-width: 18px;
        }

        .stamina-dots {
            display: flex;
            gap: 3px;
        }

        .stamina-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            background: #2a221a;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .stamina-dot.filled {
            background: #4a7a4a;
            border-color: #6aaa6a;
            box-shadow: 0 0 10px rgba(74, 122, 74, 0.3);
            color: #b0e0b0;
        }

        .stamina-dot.spent {
            opacity: 0.2;
            background: #1a1410;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bar-track {
            width: 60px;
            height: 5px;
            background: #2a221a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #3a322a;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .bar-fill.dragon {
            background: linear-gradient(90deg, #4a7a4a, #8a5a3a, #aa4a2a);
        }

        .bar-fill.sanity {
            background: linear-gradient(90deg, #4a5a8a, #7a8aaa, #aac0e0);
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
            padding: 0 18px 0 18px;
        }

        #story-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 10px 10px 10px;
            scroll-behavior: smooth;
        }

        #story-area::-webkit-scrollbar {
            width: 4px;
        }

        #story-area::-webkit-scrollbar-track {
            background: #1a1410;
        }

        #story-area::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
            transition: background 0.5s, color 0.5s;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 0 -6px;
        }

        .story-text .highlight {
            color: var(--text-gold);
        }

        .story-text .danger {
            color: #d45a5a;
        }

        .story-text .rule-text {
            display: block;
            padding: 6px 14px;
            margin: 5px 0;
            border-left: 3px solid var(--text-gold);
            background: rgba(180, 140, 80, 0.06);
            font-size: 0.9rem;
            color: #d4c8b0;
        }

        .story-text .divider {
            display: block;
            text-align: center;
            color: var(--text-muted);
            margin: 10px 0;
            letter-spacing: 6px;
            opacity: 0.4;
        }

        .story-text .title-line {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--text-gold);
            text-align: center;
            margin: 8px 0 12px 0;
            letter-spacing: 2px;
        }

        .story-text .nursery-rhyme {
            display: block;
            padding: 10px 14px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-radius: 6px;
            font-style: italic;
            color: #d4c8b0;
            line-height: 2;
            white-space: pre-line;
        }

        .story-text .ending-title {
            font-size: 1.8rem;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
        }

        .story-text .info-box {
            display: block;
            padding: 8px 14px;
            margin: 6px 0;
            border-left: 3px solid #6a8aaa;
            background: rgba(100, 130, 170, 0.06);
            font-size: 0.9rem;
            color: #b0c8d8;
        }

        .story-text .km-progress {
            display: block;
            text-align: center;
            color: var(--text-gold);
            font-size: 0.85rem;
            margin: 4px 0;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .story-text .comedy-box {
            display: block;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(180, 140, 80, 0.12);
            border-radius: 8px;
            border: 1px solid var(--border-gold);
            color: #d4c8b0;
            line-height: 2;
        }

        .story-text .feedback {
            display: block;
            padding: 8px 12px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-left: 3px solid var(--text-gold);
            color: var(--text-gold);
            font-weight: 500;
        }

        /* ===== 结局配色 ===== */
        /* HE - 暖金色 */
        .story-text.ending-he {
            background: #d4c8a0;
            color: #3a2a1a;
        }

        .story-text.ending-he .ending-title {
            color: #5a3a1a;
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-he .divider {
            color: #8a7a5a;
        }

        .story-text.ending-he .rule-text {
            background: rgba(200, 180, 150, 0.2);
            border-left-color: #8a7a5a;
            color: #3a2a1a;
        }

        .story-text.ending-he .highlight {
            color: #5a3a1a;
        }

        /* BE2 大不敬 - 暗红底深红字 */
        .story-text.ending-be2 {
            background: #2a0a0a;
            color: #8a2a2a;
        }

        .story-text.ending-be2 .ending-title {
            color: #aa2a2a;
            text-shadow: 0 0 40px rgba(200, 30, 30, 0.5);
        }

        .story-text.ending-be2 .divider {
            color: #4a1a1a;
        }

        .story-text.ending-be2 .rule-text {
            background: rgba(80, 20, 20, 0.2);
            border-left-color: #8a2a2a;
            color: #aa4a4a;
        }

        .story-text.ending-be2 .highlight {
            color: #aa4a4a;
        }

        /* BE3 惊扰 - 暗紫底紫红字 */
        .story-text.ending-be3 {
            background: #1a0a1a;
            color: #7a2a6a;
        }

        .story-text.ending-be3 .ending-title {
            color: #aa2a8a;
            text-shadow: 0 0 40px rgba(180, 30, 150, 0.5);
        }

        .story-text.ending-be3 .divider {
            color: #3a1a3a;
        }

        .story-text.ending-be3 .rule-text {
            background: rgba(60, 20, 50, 0.2);
            border-left-color: #8a2a7a;
            color: #9a4a8a;
        }

        .story-text.ending-be3 .highlight {
            color: #aa4a9a;
        }

        /* BE4 半途而废 - 暗灰底深灰字 */
        .story-text.ending-be4 {
            background: #141414;
            color: #5a5a5a;
        }

        .story-text.ending-be4 .ending-title {
            color: #7a7a7a;
            text-shadow: 0 0 30px rgba(100, 100, 100, 0.3);
        }

        .story-text.ending-be4 .divider {
            color: #2a2a2a;
        }

        .story-text.ending-be4 .rule-text {
            background: rgba(40, 40, 40, 0.2);
            border-left-color: #5a5a5a;
            color: #6a6a6a;
        }

        .story-text.ending-be4 .highlight {
            color: #7a7a7a;
        }

        /* 老实人 - 暗绿 */
        .story-text.ending-normal {
            background: #0a1a0a;
            color: #3a5a3a;
        }

        .story-text.ending-normal .ending-title {
            color: #4a7a4a;
            text-shadow: 0 0 30px rgba(60, 160, 60, 0.3);
        }

        .story-text.ending-normal .divider {
            color: #1a2a1a;
        }

        .story-text.ending-normal .rule-text {
            background: rgba(30, 60, 30, 0.2);
            border-left-color: #4a7a4a;
            color: #4a6a4a;
        }

        .story-text.ending-normal .highlight {
            color: #5a8a5a;
        }

        /* 龙化过高 - 暗红亮红 */
        .story-text.ending-dragon {
            background: #1a0505;
            color: #aa3a2a;
        }

        .story-text.ending-dragon .ending-title {
            color: #cc3a2a;
            text-shadow: 0 0 50px rgba(220, 50, 30, 0.6);
        }

        .story-text.ending-dragon .divider {
            color: #3a1a1a;
        }

        .story-text.ending-dragon .rule-text {
            background: rgba(80, 20, 10, 0.2);
            border-left-color: #aa3a2a;
            color: #cc5a4a;
        }

        .story-text.ending-dragon .highlight {
            color: #dd5a4a;
        }

        /* 被龙化 - 暗金 */
        .story-text.ending-corrupted {
            background: #1a1208;
            color: #aa8a3a;
        }

        .story-text.ending-corrupted .ending-title {
            color: #ccaa3a;
            text-shadow: 0 0 40px rgba(200, 170, 50, 0.5);
        }

        .story-text.ending-corrupted .divider {
            color: #3a2a1a;
        }

        .story-text.ending-corrupted .rule-text {
            background: rgba(80, 60, 20, 0.2);
            border-left-color: #aa8a3a;
            color: #bb9a4a;
        }

        .story-text.ending-corrupted .highlight {
            color: #ccaa5a;
        }

        /* BE8 被吞没 - 淡青底 */
        .story-text.ending-be8 {
            background: #0f1a1a;
            color: #7a9a9a;
        }

        .story-text.ending-be8 .ending-title {
            color: #8ababa;
            text-shadow: 0 0 40px rgba(100, 200, 200, 0.2);
        }

        .story-text.ending-be8 .divider {
            color: #2a4a4a;
        }

        .story-text.ending-be8 .rule-text {
            background: rgba(60, 120, 120, 0.08);
            border-left-color: #6aaaaa;
            color: #8abbc0;
        }

        .story-text.ending-be8 .highlight {
            color: #8abbc0;
        }

        /* 第三章 - 原色 */
        .story-text.ending-chapter3 {
            background: transparent;
            color: var(--text-primary);
        }

        .story-text.ending-chapter3 .ending-title {
            color: var(--text-gold);
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-chapter3 .divider {
            color: var(--text-muted);
        }

        .story-text.ending-chapter3 .rule-text {
            background: rgba(180, 140, 80, 0.06);
            border-left-color: var(--text-gold);
            color: #d4c8b0;
        }

        .story-text.ending-chapter3 .highlight {
            color: var(--text-gold);
        }

        #rule-notification {
            background: rgba(26, 20, 16, 0.95);
            border: 1px solid var(--text-gold);
            border-radius: 8px;
            padding: 10px 16px;
            margin: 6px 0 8px 0;
            display: none;
            animation: fadeSlide 0.5s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #rule-notification.show {
            display: block;
        }

        #rule-notification .rule-title {
            color: var(--text-gold);
            font-weight: 700;
            font-size: 0.85rem;
        }

        #rule-notification .rule-body {
            font-size: 0.82rem;
            color: var(--text-primary);
            margin-top: 3px;
            line-height: 1.6;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #options-area {
            padding: 8px 0 14px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.15);
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 50px;
        }

        .option-btn {
            background: rgba(30, 24, 18, 0.8);
            border: 1px solid #3a322a;
            border-radius: 6px;
            padding: 9px 14px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 0.88rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(60, 50, 40, 0.8);
            border-color: var(--border-gold);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(139, 122, 74, 0.08);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn .hint {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-left: 6px;
            opacity: 0.6;
        }

        .option-btn .cost {
            float: right;
            color: var(--text-muted);
            font-size: 0.65rem;
            opacity: 0.5;
        }

        .option-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .option-btn .tag {
            display: inline-block;
            font-size: 0.55rem;
            background: rgba(139, 122, 74, 0.2);
            border-radius: 3px;
            padding: 0 6px;
            margin-left: 4px;
            color: var(--text-gold);
        }

        .option-btn.confirm-btn {
            border-color: var(--text-gold);
            background: rgba(180, 140, 80, 0.15);
            text-align: center;
            font-weight: 700;
            color: var(--text-gold);
            font-size: 1rem;
            padding: 12px 14px;
        }

        .option-btn.confirm-btn:hover {
            background: rgba(180, 140, 80, 0.25);
            transform: scale(1.01);
        }

        .option-btn.ending-btn {
            border-color: #6a4a3a;
            background: rgba(100, 60, 40, 0.15);
            text-align: center;
        }

        .option-btn.ending-btn:hover {
            background: rgba(100, 60, 40, 0.25);
        }

        #rules-panel {
            background: rgba(16, 12, 10, 0.98);
            border-top: 1px solid var(--border-gold);
            flex-shrink: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            position: relative;
        }

        #rules-panel.open {
            max-height: 300px;
            overflow-y: auto;
        }

        #rules-panel::-webkit-scrollbar {
            width: 3px;
        }

        #rules-panel::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        #rules-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(139, 122, 74, 0.15);
            cursor: pointer;
            user-select: none;
        }

        #rules-panel .panel-header:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        #rules-panel .panel-header .title {
            color: var(--text-gold);
            font-size: 0.82rem;
            letter-spacing: 2px;
        }

        #rules-panel .panel-header .count {
            color: var(--text-muted);
            font-size: 0.72rem;
        }

        #rules-panel .panel-body {
            padding: 8px 18px 14px 18px;
        }

        .rule-entry {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(139, 122, 74, 0.06);
            font-size: 0.78rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .rule-entry .num {
            color: var(--text-gold);
            font-weight: 700;
            flex-shrink: 0;
            width: 20px;
        }

        .rule-entry .content {
            color: var(--text-primary);
        }

        .rule-entry .content .new-tag {
            color: #6ab06a;
            font-size: 0.55rem;
            margin-left: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #footer-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 18px 6px 18px;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.08);
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            gap: 6px;
            flex-wrap: wrap;
        }

        #footer-tools .left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        #footer-tools .left .day-info {
            color: var(--text-gold);
        }

        .toggle-rules-btn {
            background: none;
            border: 1px solid var(--border-gold);
            color: var(--text-muted);
            padding: 3px 12px;
            border-radius: 4px;
            font-family: var(--font-serif);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-rules-btn:hover {
            background: rgba(139, 122, 74, 0.1);
            color: var(--text-gold);
        }

        .toggle-rules-btn .badge {
            background: var(--red-bright);
            color: #fff;
            border-radius: 50%;
            padding: 0 5px;
            font-size: 0.55rem;
            margin-left: 3px;
        }

        /* ================================================================
   主菜单 - 道观秘卷 · 重制版
   ================================================================ */

        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 30px 20px;
            overflow: hidden;
            /* ⭐ 只有图片 + 暗色遮罩（去掉原来的深红渐变） */
            background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.8) 50%, rgba(0, 0, 0, 0.9) 100%),
                url('image/main1.jpg') center center / cover no-repeat;
            background-blend-mode: overlay, normal;
            transition: none;
        }

        /* ---- 龙鳞光晕（动态呼吸） ---- */
        #main-menu::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 35% 50%, rgba(180, 100, 60, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(160, 120, 80, 0.04) 0%, transparent 40%);
            animation: menuAura 10s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes menuAura {
            0% {
                transform: scale(1) rotate(-3deg);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.15) rotate(3deg);
                opacity: 1;
            }
        }

        /* ---- 龙鳞暗纹（旋转） ---- */
        #main-menu::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-conic-gradient(from 0deg at 50% 80%,
                    transparent 0deg,
                    rgba(139, 122, 74, 0.012) 2deg,
                    transparent 4deg,
                    transparent 6deg);
            pointer-events: none;
            z-index: 0;
            animation: scaleRotate 30s linear infinite;
        }

        @keyframes scaleRotate {
            0% {
                transform: scale(1) rotate(0deg);
            }

            100% {
                transform: scale(1.5) rotate(360deg);
            }
        }

        /* ---- 四角卦纹装饰（更精致） ---- */
        .menu-corner {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            color: var(--border-gold);
            font-size: 1.4rem;
            opacity: 0.15;
            font-family: var(--font-title);
            letter-spacing: 4px;
        }

        .menu-corner.tl {
            top: 20px;
            left: 28px;
        }

        .menu-corner.tr {
            top: 20px;
            right: 28px;
            transform: scaleX(-1);
        }

        .menu-corner.bl {
            bottom: 20px;
            left: 28px;
            transform: scaleY(-1);
        }

        .menu-corner.br {
            bottom: 20px;
            right: 28px;
            transform: scale(-1, -1);
        }

        /* 内圈细线（更高级） */
        .menu-corner .line {
            display: block;
            width: 30px;
            height: 1px;
            background: var(--border-gold);
            opacity: 0.3;
            margin: 4px auto;
        }

        /* ---- 漂浮粒子（升级版：金色微尘） ---- */
        /* ---- 金色细碎粒子（升级版） ---- */
        .menu-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(circle at 30% 30%,
                    rgba(220, 200, 160, 0.8),
                    rgba(180, 150, 100, 0.2));
            box-shadow: 0 0 8px rgba(200, 180, 150, 0.15),
                0 0 20px rgba(200, 180, 150, 0.04);
            animation: floatParticle linear infinite;
            will-change: transform, opacity;
        }

        /* 不同尺寸的粒子（更细碎） */
        .menu-particle.p1 {
            width: 2px;
            height: 2px;
            animation-duration: 16s;
        }

        .menu-particle.p2 {
            width: 1.5px;
            height: 1.5px;
            animation-duration: 20s;
            opacity: 0.6;
        }

        .menu-particle.p3 {
            width: 3px;
            height: 3px;
            animation-duration: 13s;
            opacity: 0.5;
        }

        .menu-particle.p4 {
            width: 1px;
            height: 1px;
            animation-duration: 24s;
            opacity: 0.7;
        }

        .menu-particle.p5 {
            width: 2.5px;
            height: 2.5px;
            animation-duration: 18s;
            opacity: 0.4;
        }

        .menu-particle.p6 {
            width: 1.8px;
            height: 1.8px;
            animation-duration: 22s;
            opacity: 0.5;
        }

        .menu-particle.p7 {
            width: 2.2px;
            height: 2.2px;
            animation-duration: 15s;
            opacity: 0.6;
        }

        .menu-particle.p8 {
            width: 1.2px;
            height: 1.2px;
            animation-duration: 26s;
            opacity: 0.7;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(0) translateX(0) scale(0);
                opacity: 0;
            }

            12% {
                opacity: 1;
                transform: translateY(-10px) translateX(4px) scale(1);
            }

            88% {
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) translateX(20px) scale(0.2);
                opacity: 0;
            }
        }

        /* 额外闪烁光晕（让粒子更有“金粉”感） */
        .menu-particle::after {
            content: '';
            position: absolute;
            top: -200%;
            left: -200%;
            width: 500%;
            height: 500%;
            background: radial-gradient(circle at 30% 30%,
                    rgba(255, 235, 200, 0.3),
                    transparent 70%);

        @keyframes sparkle {

        .menu-btn {

        /* ---- 底部龙纹脚注 ---- */
        #main-menu .menu-footer {

            left: -50%;

            -webkit-backdrop-filter: blur(4px);
            border-left: 2px solid transparent;
            transition: all 0.3s ease, border-color 0.4s ease;
        }

        .option-btn::after {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(200, 180, 150, 0.06), transparent 50%);

        /* ---- 10. 粒子“光追”拖尾 ---- */
        .menu-particle {

            }
        }

        .hidden {
            display: none !important;
        }

</head>

            // ----- 结局存储工具函数 -----

            function getUnlockedEndings() {
                try {
                    const data = localStorage.getItem(ENDING_STORAGE_KEY);
                    return data ? JSON.parse(data) : [];
                } catch { return []; }
            }

            function saveUnlockedEnding(type) {
                const list = getUnlockedEndings();
                if (!list.includes(type)) {
                    list.push(type);
                    localStorage.setItem(ENDING_STORAGE_KEY, JSON.stringify(list));
                }
            }

            function hasEnding(type) {
                return getUnlockedEndings().includes(type);
            }

            function getUnlockedEndingsCount() {
                return getUnlockedEndings().length;
            }

            function getTotalEndingsCount() {
                return Object.keys(ENDING_META).length;
            }
            // ---------- 工具函数 ----------
            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

            function pick(arr) { return arr[rand(0, arr.length - 1)]; }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = rand(0, i);
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // ---------- UI更新 ----------
            function updateUI() {
                // ================================================================
                //  原有更新逻辑（保持不变）
                // ================================================================
                document.getElementById('dayDisplay').textContent = `第${state.day}天`;
                document.getElementById('dayInfo').textContent = `第${state.day}天 · ${getTimeLabel()}`;
                document.getElementById('timeDisplay').textContent = getTimeLabel();

                dots.innerHTML = '';

                // ---- 龙化/理智条 ----
                const dVal = clamp(state.dragonization, 0, 100);

                document.getElementById('dragonVal').textContent = dVal + '%';

                // ---- 统计信息 ----

                // ---- 第二章阶段显示 ----
                const ch2PhaseLabel = document.getElementById('ch2PhaseLabel');

                    document.getElementById('kmDisplay').textContent = state.ch2.km + 'km';

                } else {

                // ---- 新规则角标 ----

                }
                if (state.flags.chapter2 && !state.gameOver) {
                    // ---- 显示三个新UI项 ----
                    ch2DisguiseDisplay.style.display = 'inline-flex';
                    ch2IncenseDisplay.style.display = 'inline-flex';
                    ch2RitualDisplay.style.display = 'inline-flex';

                } else {

                    if (ch2DisguiseDisplay) ch2DisguiseDisplay.style.display = 'none';

                //  龙化值结局检测（保持不变）
                // ================================================================
                if (state.dragonization >= 90 && !state.gameOver) {
                    triggerEnding('BE1_龙化值过高');

            }

            function getTimeLabel() {
                if (state.stamina === 3) return '上午';
                if (state.stamina === 2) return '下午';
                if (state.stamina === 1) return '晚上';
                return '深夜';
            }

            function renderRulesList() {
                const container = document.getElementById('rulesList');
                if (state.rules.length === 0) {
                    container.innerHTML =
                        '<div style="color:var(--text-muted);font-size:0.8rem;padding:8px 0;">尚未获得任何规则，探索世界以收集线索。</div>';
                    return;
                }
                let html = '';
                state.rules.forEach((id, idx) => {
                    const rule = RULES_DB[id];
                    if (!rule) return;
                    const isNew = idx >= state.newRuleCount;
                    html += `
                    <div class="rule-entry">
                        <span class="num">#${idx + 1}</span>
                        <span class="content">${rule.text}${isNew ? '<span class="new-tag">● 新</span>' : ''}</span>
                    </div>
                `;
                });
                container.innerHTML = html;
            }
            // ---- 辅助函数：记录碎片 ----
            function recordFragment(fragmentId) {
                if (!state.medicineHut.fragmentsCollected) {
                    state.medicineHut.fragmentsCollected = [];
                }
                if (!state.medicineHut.fragmentsCollected.includes(fragmentId)) {
                    state.medicineHut.fragmentsCollected.push(fragmentId);
                }
            }
            // ================================================================
            //  【核心】规则确认机制 - 非侵入式
            // ================================================================
            function addRule(id) {
                return new Promise((resolve) => {
                    if (!RULES_DB[id]) { resolve(false); return; }
                    if (state.rules.includes(id)) { resolve(false); return; }

                    if (state._waitingConfirm) {
                        const checkInterval = setInterval(() => {
                            if (!state._waitingConfirm) {
                                clearInterval(checkInterval);
                                addRule(id).then(resolve);
                            }
                        }, 100);
                        return;
                    }

                    state.rules.push(id);
                    const rule = RULES_DB[id];
                    state._waitingConfirm = true;
                    state._confirmResolve = resolve;

                    const notify = document.getElementById('rule-notification');
                    document.getElementById('ruleNotifyBody').textContent = rule.text;
                    notify.classList.add('show');
                    updateUI();

                    const container = document.getElementById('options-area');
                    const existingBtns = container.querySelectorAll('.option-btn:not(.confirm-btn)');
                    existingBtns.forEach(btn => {
                        btn.style.pointerEvents = 'none';
                        btn.style.opacity = '0.5';
                    });

                    const confirmBtn = document.createElement('button');
                    confirmBtn.className = 'option-btn confirm-btn';
                    confirmBtn.textContent = '📖 我知道了';
                    confirmBtn.style.marginTop = '4px';
                    confirmBtn.addEventListener('click', () => {
                        notify.classList.remove('show');
                        state._waitingConfirm = false;
                        state.newRuleCount = state.rules.length;
                        updateUI();

                        confirmBtn.remove();
                        existingBtns.forEach(btn => {
                            btn.style.pointerEvents = '';
                            btn.style.opacity = '';
                        });
                        saveGame(); // 添加这一行
                        const r = state._confirmResolve;
                        state._confirmResolve = null;
                        if (r) r(true);
                    });
                    container.appendChild(confirmBtn);

                    const area = document.getElementById('story-area');
                    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
                });

            }
            // ================================================================
            //  存档系统
            // ================================================================

            const SAVE_KEY = 'longling_save_v2';

            function saveGame() {
                try {
                    const data = {
                        day: state.day,
                        stamina: state.stamina,
                        maxStamina: state.maxStamina,
                        dragonization: state.dragonization,
                        rules: state.rules,
                        actionsToday: state.actionsToday,
                        weekCount: state.weekCount,
                        gameOver: state.gameOver,
                        newRuleCount: state.newRuleCount,
                        _morningEventProcessed: state._morningEventProcessed,
                        _dragonEndingQueued: state._dragonEndingQueued,
                        _waitingConfirm: state._waitingConfirm,
                        _endingType: state._endingType || null,
                        flags: JSON.parse(JSON.stringify(state.flags)),
                        ch2: JSON.parse(JSON.stringify(state.ch2)),
                        currentScene: currentScene || 'intro',
                        // 保存其他重要字段
                        medicineHut: JSON.parse(JSON.stringify(state.medicineHut)),
                        villageWestDone: state.villageWestDone,
                        medicineHutDone: state.medicineHutDone,
                        oldManTalkTriggered: state.oldManTalkTriggered,
                        hasShadowSecret: state.hasShadowSecret,
                        hasTaoistInfo: state.hasTaoistInfo,
                        hasDragonFollowerInfo: state.hasDragonFollowerInfo,
                    };
                    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
                } catch (e) {
                    console.warn('保存失败:', e);
                }
            }

            function loadGame() {
                try {
                    const raw = localStorage.getItem(SAVE_KEY);
                    if (!raw) return false;
                    const data = JSON.parse(raw);
                    // 恢复所有字段
                    Object.keys(data).forEach(key => {
                        if (key === 'flags' || key === 'ch2' || key === 'medicineHut') {
                            state[key] = JSON.parse(JSON.stringify(data[key]));
                        } else if (key === 'currentScene') {
                            currentScene = data[key];
                        } else if (key !== '_endingType') {
                            state[key] = data[key];
                        } else {
                            state._endingType = data[key];
                        }
                    });
                    return true;
                } catch (e) {
                    console.warn('读取存档失败:', e);
                    return false;
                }
            }

            function hasSave() {
                return !!localStorage.getItem(SAVE_KEY);
            }
            // ---------- 数值修改 ----------
            function changeDragonization(delta) {
                if (state.gameOver) return;
                state.dragonization = clamp(state.dragonization + delta, 0, 100);
                updateUI();
                // 在 changeDragonization 中添加
                if (state.dragonization >= 60 && state.dragonization < 65 && !state._dragonWarned60) {
                    state._dragonWarned60 = true;
                    showStory(`
        <span class="divider">· · ·</span>
        <span style="color:#d45a5a;font-weight:700;">⚠️ 你的龙化值已经达到 60%！</span>
        <span style="color:var(--text-muted);font-size:0.85rem;">你感觉到皮肤下有什么东西在蠕动……额头上隐隐传来刺痛感。</span>
        <span style="color:var(--text-muted);font-size:0.85rem;">💡 建议寻找机会压制龙气）。</span>
    `);
                }
                // 检测龙化值是否达到结局阈值（使用 setTimeout 避免打断当前操作）
                if (state.dragonization >= 90 && !state.gameOver && !state._dragonEndingQueued) {
                    state._dragonEndingQueued = true;
                    // 延迟 300ms 让当前操作（如 addRule 确认、购买等）先完成
                    setTimeout(function () {
                        if (!state.gameOver) {
                            triggerEnding('BE1_龙化值过高');
                        }
                        state._dragonEndingQueued = false;
                    }, 300);
                }
                saveGame();
            }
            // ================================================================
            //  第二章 · 辅助函数
            // ================================================================

            // ---------- 计算初始伪装值（进入第二章时调用） ----------
            function calculateInitialDisguise() {
                // ---- 基础值为 2----
                let disguise = 2;

                // ================================================================
                //  融入加分（证明“你是这里的人”）
                // ================================================================
                let integrationBonus = 0;

                // 草木灰显影解锁（综合性最强条件）
                if (state.flags.hidden_unlocked) integrationBonus += 2;

                // 独立于草木灰解锁之外的融入行为
                if (state.flags.hasPeachWood) integrationBonus += 1;
                if (state.flags.oldLadyQuest.completed) integrationBonus += 1;
                if (state.flags.abandonedVisitCount >= 3) integrationBonus += 1;

                // ================================================================
                //  暴露减分（证明“你在调查”）
                // ================================================================
                let exposurePenalty = 0;

                if (state.flags.awakening.visited) exposurePenalty += 2;
                if (state.medicineHut.visited) exposurePenalty += 1;
                if (state.flags.folkloreVisitCount >= 3) exposurePenalty += 1;
                if (state.flags.hasDragonScale) exposurePenalty += 1;

                // ================================================================
                //  计算最终值
                // ================================================================
                let final = disguise + integrationBonus - exposurePenalty;
                final = clamp(final, 1, 5);
                return final;
            }

            // ---------- 伪装值调整 ----------
            function changeDisguise(delta) {
                if (state.gameOver) return;

                var oldValue = state.ch2.disguise;
                state.ch2.disguise = clamp(state.ch2.disguise + delta, 0, 5);

                // 显示伪装变化反馈（仅当有实际变化时）
                if (state.ch2.disguise !== oldValue) {
                    var changeText = delta > 0 ? '+ ' + delta : '- ' + Math.abs(delta);
                    showStory(`<span style="color:var(--text-gold);font-size:0.85rem;">🎭 伪装 ${changeText}（当前：${state.ch2.disguise}/5）</span>`);
                }

                // 伪装归零 → 立即触发 BE2_大不敬
                if (state.ch2.disguise === 0 && !state.gameOver) {
                    // 先显示一段暴露文本
                    showStory(`
            <span class="divider">· · ·</span>
            <span style="color:#d45a5a;font-weight:700;">⚠️ 你的伪装彻底暴露了！</span>
            周围的龙化者和道士都转过头来盯着你。他们的眼神空洞而统一——那不是人的眼睛，是龙神的眼睛。
            你已经被发现了……
        `);

                    setTimeout(function () {
                        if (!state.gameOver) {
                            triggerEnding('BE2_大不敬');
                        }
                    }, 800);

                updateUI();
                saveGame();
            }

            // ---------- 香火调整 ----------
            function changeIncense(delta) {
                if (state.gameOver) return;

                var oldValue = state.ch2.incenseRemaining;
                state.ch2.incenseRemaining = clamp(state.ch2.incenseRemaining + delta, 0, 3);

                // 显示变化反馈
                if (state.ch2.incenseRemaining !== oldValue) {
                    var changeText = delta > 0 ? '+ ' + delta : '- ' + Math.abs(delta);
                    showStory(`<span style="color:var(--text-muted);font-size:0.85rem;">🕯️ 香火 ${changeText}（剩余：${state.ch2.incenseRemaining}/3根）</span>`);
                }

                // 香火归零时提示（仅首次）
                if (state.ch2.incenseRemaining === 0 && oldValue > 0 && !state.ch2._incenseWarned) {
                    state.ch2._incenseWarned = true;
                    showStory(`
            <span style="color:#aa4a4a;font-size:0.85rem;">⚠️ 你的香火已经用尽了……接下来的盘查会很危险。</span>

        `);
                }

                updateUI();
                saveGame();
            }

            // ---------- 社戏进度推进 ----------
            function advanceRitual(amount) {
                if (state.gameOver) return;
                amount = amount + 8;  // 每次推进基础值 +8%，可通过参数增加额外推进
                var oldValue = state.ch2.ritualProgress;
                // 根据类型限制最大推进值
                var maxAmount = 20;  // 单次推进不超过10%
                var actualAmount = Math.min(amount, maxAmount);
                state.ch2.ritualProgress = Math.min(state.ch2.ritualProgress + actualAmount, 100);
                // 显示进度变化
                if (state.ch2.ritualProgress !== oldValue) {
                    showStory(`<span style="color:var(--text-muted);font-size:0.85rem;">📅 社戏进度 ${oldValue}% → ${state.ch2.ritualProgress}%</span>`);
                }

                // 进度 ≥ 80% 时触发终局警告（仅一次）
                if (state.ch2.ritualProgress >= 80 && !state.ch2._ritualWarned) {
                    state.ch2._ritualWarned = true;
                    showStory(`
            <span class="divider">· · ·</span>
            <span style="color:#d45a5a;font-weight:700;">⚠️ 社戏已接近尾声……献祭即将开始！</span>
            <span style="color:var(--text-muted);font-size:0.85rem;">你必须尽快做出决定。时间不多了。</span>
        `);
                    // 触发UI闪烁或特殊提示（由updateUI处理）
                }

                // 进度 = 100% → 献祭开始，强制进入终局
                if (state.ch2.ritualProgress >= 100 && !state.gameOver) {
                    showStory(`
            <span class="divider">· · ·</span>
            <span style="color:#d45a5a;font-weight:700;">🔔 献祭仪式正式开始！</span>
            锣鼓声震天动地，香烟弥漫。你被推着向道观大门走去……
        `);
                    // 根据伪装值决定能否安全进入道观
                    setTimeout(function () {
                        if (!state.gameOver) {
                            if (state.ch2.disguise > 3) {
                                // 伪装足够，可以进入道观
                                state.ch2.phase = 'temple_gate';
                                renderTempleGate();
                            } else {
                                // 伪装不足，触发BE8
                                triggerEnding('BE8_被吞没');
                            }
                        }
                    }, 600);
                }

                updateUI();
                saveGame();
            }

            // ---------- 体力调整（重写，增加危机状态检测） ----------
            // 注意：这个函数会覆盖原有的体力修改逻辑，但保留对 stamina 的操作
            // 原有 changeStamina 函数不存在，我们直接扩展 deductStamina 的逻辑
            // 但为了方便，我们新增一个专用函数
            function changeStamina(delta) {
                if (state.gameOver) return;

                var oldValue = state.stamina;
                state.stamina = clamp(state.stamina + delta, 0, state.maxStamina);

                // 体力=0时触发检测
                if (state.stamina === 0 && oldValue > 0 && !state.gameOver) {
                    if (state.flags.chapter2) {
                        // 第二章：不显示具体恢复建议，由 handleExhaustionCh2 接管
                        // 只显示一句简短描述，避免重复
                        showStory('你感到体力不支，必须想办法恢复。');
                    }
                }
                updateUI();
                saveGame();
            }
            // ---------- 检查体力的辅助函数 ----------


            // ---------- 消耗体力的辅助函数（封装） ----------
            function spendStamina(amount) {
                if (state.stamina < amount) {
                    showStory(`<span style="color:#d45a5a;">⚠️ 体力不足！需要 ${amount} 点体力，当前只有 ${state.stamina} 点。</span>`);
                    return false;
                }
                changeStamina(-amount);
                return true;
            }
            // ---------- 体力与场景管理 ----------
            function deductStamina() {
                if (state.stamina <= 0) return false;
                state.stamina--;
                state.actionsToday++;
                updateUI();
                return true;
            }

            function finishSceneAndReturn() {
                if (state.gameOver) return;
                deductStamina();
                if (state.stamina === 0) {
                    enterNight();
                } else {
                    renderMainOptions();
                }

            }

            // ---------- 显示与选项 ----------
            let currentScene = 'intro';

            function showStory(text) {
                const el = document.getElementById('storyText');
                if (text) {
                    el.innerHTML += text.replace(/\n/g, '<br>') + '<br>';
                }
                const area = document.getElementById('story-area');
                setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
            }

            function clearStory() {
                document.getElementById('storyText').innerHTML = '';
            }

            function setStory(text, endingClass) {
                clearStory();
                const el = document.getElementById('storyText');
                el.className = 'story-text';
                if (endingClass) {
                    el.classList.add(endingClass);
                }
                showStory(text);
            }
            // ================================================================
            //  🎵 Web Audio 音效引擎（BGM + 铃铛音效）
            // ================================================================

            let audioCtx = null;
            let bgmNodes = {};
            let bgmPlaying = false;
            let sfxPlaying = false;
            let bgmWasPlaying = false;
            let bgmInterval = null;

            // ---- 初始化音频上下文（需用户手势触发） ----
            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('Web Audio API 不支持');
                        return false;
                    }
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return true;
            }

            // ---- 生成阴森中式 BGM（五声音阶 + 低频嗡鸣 + 随机敲击） ----
            // ---- 生成古琴旋律 BGM（完整旋律循环 + 钟铃） ----
            // ---- 生成笛子旋律 BGM（完整旋律循环 + 钟铃） ----
            function startBGM() {
                if (!initAudio()) return;
                if (bgmPlaying) return;

                // ---- 主音量（调大） ----
                const masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.45;   // 调大，清晰可闻
                masterGain.connect(audioCtx.destination);

                // ---- 带通滤波器（突出笛子的中高频） ----
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1200;
                filter.Q.value = 1.2;
                filter.connect(masterGain);

                // ---- 笛子主音（正弦波 + 轻微锯齿，增加明亮感） ----
                const fluteOsc = audioCtx.createOscillator();
                const fluteGain = audioCtx.createGain();
                fluteOsc.type = 'sine';          // 正弦波为主
                fluteOsc.frequency.value = 440;
                fluteGain.gain.value = 0;
                fluteOsc.connect(fluteGain);
                fluteGain.connect(filter);
                fluteOsc.start();

                // ---- 泛音振荡器（增加高频色彩） ----
                const harmonicOsc = audioCtx.createOscillator();
                const harmonicGain = audioCtx.createGain();
                harmonicOsc.type = 'sine';
                harmonicOsc.frequency.value = 880;
                harmonicGain.gain.value = 0;
                harmonicOsc.connect(harmonicGain);
                harmonicGain.connect(filter);
                harmonicOsc.start();

                // ---- 颤音 LFO（模拟笛子的气息波动） ----
                const vibratoLFO = audioCtx.createOscillator();
                const vibratoGain = audioCtx.createGain();
                vibratoLFO.type = 'sine';
                vibratoLFO.frequency.value = 5.5; // 颤音频率 5.5Hz
                vibratoGain.gain.value = 6;       // 颤音幅度（音分偏移）
                vibratoLFO.connect(vibratoGain);
                vibratoGain.connect(fluteOsc.frequency);
                vibratoLFO.start();

                // ---- 钟铃 ----
                const bellGain = audioCtx.createGain();
                bellGain.gain.value = 0.025;
                bellGain.connect(masterGain);

                function playRandomBell() {
                    if (!bgmPlaying) return;
                    try {
                        const now = audioCtx.currentTime;
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        const freq = 200 + Math.random() * 400;
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.05, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                        osc.connect(gain);
                        gain.connect(bellGain);
                        osc.start(now);
                        osc.stop(now + 0.8);
                    } catch (e) { }
                    const delay = 8000 + Math.random() * 12000;
                    bgmInterval = setTimeout(playRandomBell, delay);
                }

                const firstBellDelay = 4000 + Math.random() * 6000;
                bgmInterval = setTimeout(playRandomBell, firstBellDelay);

                bgmNodes = { masterGain, fluteOsc, fluteGain, harmonicOsc, harmonicGain, vibratoLFO, vibratoGain, filter, bellGain };
                bgmPlaying = true;

                // ---- 五声音阶 ----
                const scale = [
                    196, 220, 247, 294, 330, 392, 440, 494, 587, 659, 784, 880
                ];

                // ---- 旋律数据库 ----
                const melodies = [
                    [0, 2, 4, 5, 4, 2, 1, 0],
                    [4, 5, 7, 8, 7, 5, 4, 2],
                    [5, 4, 2, 1, 2, 4, 5, 4],
                    [2, 4, 5, 7, 5, 4, 2, 4],
                    [0, 1, 2, 4, 5, 4, 2, 1],
                    [4, 2, 1, 0, 1, 2, 4, 5],
                ];

                let currentMelodyIdx = 0;
                let noteIdx = 0;
                let isPlaying = false;
                let currentNoteDuration = 0;
                let nextNoteTimer = null;

                // ---- 播放旋律中的下一个音符 ----
                function playNextMelodyNote() {
                    if (!bgmPlaying) { isPlaying = false; return; }
                    if (isPlaying) return;
                    isPlaying = true;

                    const melody = melodies[currentMelodyIdx % melodies.length];
                    const idx = melody[noteIdx % melody.length];
                    const now = audioCtx.currentTime;

                    if (idx === -1) {
                        // 休止
                        fluteGain.gain.setTargetAtTime(0, now, 0.02);
                        harmonicGain.gain.setTargetAtTime(0, now, 0.02);
                        currentNoteDuration = 120 + Math.random() * 150;
                    } else {
                        const freq = scale[idx % scale.length];
                        const currentFreq = fluteOsc.frequency.value;

                        // 滑音（笛子可以快速滑音）
                        if (Math.abs(currentFreq - freq) > 3) {
                            fluteOsc.frequency.setTargetAtTime(freq, now, 0.06);
                        } else {
                            fluteOsc.frequency.setValueAtTime(freq, now);
                        }
                        // 泛音跟随主音
                        harmonicOsc.frequency.setValueAtTime(freq * 2, now);

                        // ---- 笛子包络（起吹、稳定、收尾） ----
                        const peak = 0.12;          // 笛子音量调大
                        const harmonicPeak = 0.035;
                        // 主音
                        fluteGain.gain.setValueAtTime(0, now);
                        fluteGain.gain.linearRampToValueAtTime(peak * 0.9, now + 0.02);
                        fluteGain.gain.linearRampToValueAtTime(peak, now + 0.06);
                        fluteGain.gain.exponentialRampToValueAtTime(peak * 0.6, now + 0.3);
                        fluteGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                        // 泛音
                        harmonicGain.gain.setValueAtTime(0, now);
                        harmonicGain.gain.linearRampToValueAtTime(harmonicPeak * 0.8, now + 0.04);
                        harmonicGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

                        currentNoteDuration = 500 + Math.random() * 300;
                    }

                    noteIdx++;

                    if (noteIdx >= melody.length) {
                        noteIdx = 0;
                        currentMelodyIdx = (currentMelodyIdx + 1) % melodies.length;
                    }

                    nextNoteTimer = setTimeout(() => {
                        isPlaying = false;
                        if (bgmPlaying) {
                            const gap = 150 + Math.random() * 350;
                            setTimeout(playNextMelodyNote, gap);
                        }
                    }, currentNoteDuration + 50);
                }

                // 启动旋律
                setTimeout(playNextMelodyNote, 500);

                // ---- 定期微调滤波器，模拟笛子音色变化 ----
                setInterval(() => {
                    if (!bgmPlaying) return;
                    const newFreq = 1000 + Math.random() * 600;
                    filter.frequency.setTargetAtTime(newFreq, audioCtx.currentTime, 0.5);
                }, 4000);
            }

            // ---- 停止 BGM（清空所有节点） ----
            function stopBGM() {
                bgmPlaying = false;
                if (bgmInterval) {
                    clearTimeout(bgmInterval);
                    bgmInterval = null;
                }
                if (bgmNodes._melodyInterval) {
                    clearInterval(bgmNodes._melodyInterval);
                    bgmNodes._melodyInterval = null;
                }
                try {
                    if (bgmNodes.masterGain) bgmNodes.masterGain.disconnect();
                    if (bgmNodes.lowOsc) bgmNodes.lowOsc.stop();
                    if (bgmNodes.melodyOsc) bgmNodes.melodyOsc.stop();
                    if (bgmNodes.highOsc) bgmNodes.highOsc.stop();
                    if (bgmNodes.lfo) bgmNodes.lfo.stop();
                } catch (e) { }
                bgmNodes = {};
            }

            // ---- 播放铃铛音效（按键音） ----
            function playSFX(callback) {
                // 如果音效正在播放，先终止
                if (sfxPlaying) {
                    try { /* 没有持续节点，只标记 */ } catch (e) { }
                    sfxPlaying = false;
                }

                // 暂停 BGM（如果正在播放）
                if (bgmPlaying) {
                    // 暂停随机敲击定时器（防止音效期间敲击干扰）
                    if (bgmInterval) {
                        clearTimeout(bgmInterval);
                        bgmInterval = null;
                    }
                    // 降低 BGM 音量而不是完全暂停（更平滑）
                    if (bgmNodes.masterGain) {
                        bgmNodes.masterGain.gain.setTargetAtTime(0.01, audioCtx.currentTime, 0.05);
                    }
                    bgmWasPlaying = true;
                } else {
                    bgmWasPlaying = false;
                }

                // 生成铃铛音效
                try {
                    if (!initAudio()) {
                        if (callback) callback();
                        return;
                    }
                    const now = audioCtx.currentTime;
                    // 主铃铛音：高频 + 快速衰减
                    const osc1 = audioCtx.createOscillator();
                    const gain1 = audioCtx.createGain();
                    osc1.type = 'sine';
                    osc1.frequency.value = 1200 + Math.random() * 300;
                    gain1.gain.setValueAtTime(1, now);
                    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc1.connect(gain1);
                    gain1.connect(audioCtx.destination);
                    osc1.start(now);
                    osc1.stop(now + 0.25);

                    // 泛音：略高，增加铃铛感
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.value = 1800 + Math.random() * 400;
                    gain2.gain.setValueAtTime(0.06, now);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start(now);
                    osc2.stop(now + 0.18);

                    // 低频泛音（更厚重）
                    const osc3 = audioCtx.createOscillator();
                    const gain3 = audioCtx.createGain();
                    osc3.type = 'sine';
                    osc3.frequency.value = 600 + Math.random() * 200;
                    gain3.gain.setValueAtTime(0.04, now);
                    gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc3.connect(gain3);
                    gain3.connect(audioCtx.destination);
                    osc3.start(now);
                    osc3.stop(now + 0.3);

                    sfxPlaying = true;

                    // 音效结束后恢复 BGM
                    const duration = 320;
                    setTimeout(() => {
                        sfxPlaying = false;
                        if (bgmWasPlaying && bgmPlaying) {
                            // 恢复 BGM 音量
                            if (bgmNodes.masterGain) {
                                bgmNodes.masterGain.gain.setTargetAtTime(0.10, audioCtx.currentTime, 0.1);
                            }
                            // 重新启动随机敲击
                            if (bgmPlaying) {
                                const delay = 3000 + Math.random() * 5000;
                                bgmInterval = setTimeout(() => {
                                    if (bgmPlaying) {
                                        // 使用已保存的 bellGain
                                        if (bgmNodes.bellGain) {
                                            try {
                                                const osc = audioCtx.createOscillator();
                                                const gain = audioCtx.createGain();
                                                const freq = 200 + Math.random() * 400;
                                                osc.type = 'sine';
                                                osc.frequency.value = freq;
                                                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                                                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                                                osc.connect(gain);
                                                gain.connect(bgmNodes.bellGain);
                                                osc.start();
                                                osc.stop(audioCtx.currentTime + 0.6);
                                            } catch (e) { }
                                        }
                                        // 重新调度
                                        const nextDelay = 6000 + Math.random() * 8000;
                                        bgmInterval = setTimeout(() => {
                                            if (bgmPlaying && bgmNodes.bellGain) {
                                                try {
                                                    const osc = audioCtx.createOscillator();
                                                    const gain = audioCtx.createGain();
                                                    const freq = 200 + Math.random() * 400;
                                                    osc.type = 'sine';
                                                    osc.frequency.value = freq;
                                                    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                                                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                                                    osc.connect(gain);
                                                    gain.connect(bgmNodes.bellGain);
                                                    osc.start();
                                                    osc.stop(audioCtx.currentTime + 0.6);
                                                } catch (e) { }
                                                // 再次调度自己
                                                const next2 = 6000 + Math.random() * 8000;
                                                bgmInterval = setTimeout(arguments.callee, next2);
                                            }
                                        }, nextDelay);
                                    }
                                }, delay);
                            }
                        }
                        if (callback) callback();
                    }, duration);
                } catch (e) {
                    console.warn('音效生成失败', e);
                    // 恢复 BGM
                    if (bgmWasPlaying && bgmPlaying && bgmNodes.masterGain) {
                        bgmNodes.masterGain.gain.setTargetAtTime(0.10, audioCtx.currentTime, 0.1);
                    }
                    if (callback) callback();
                }
            }

            // ---- 启动 BGM 的辅助函数（在开始游戏时调用） ----
            function ensureBGM() {
                if (!bgmPlaying) {
                    startBGM();
                }
            }

            // ---- 修改 startNewGame 和 continueGame 以触发 BGM ----
            // 保存原始函数
            const _origStartNewGame = startNewGame;
            const _origContinueGame = continueGame;

            // 重写 startNewGame
            startNewGame = function () {
                if (_origStartNewGame) _origStartNewGame();
                setTimeout(ensureBGM, 500);
            };

            // 重写 continueGame
            continueGame = function () {
                if (_origContinueGame) _origContinueGame();
                setTimeout(ensureBGM, 500);
            };

            // 绑定到主菜单按钮（确保用户手势触发）
            document.getElementById('btn-new-game').addEventListener('click', function () {
                setTimeout(ensureBGM, 600);
            });
            document.getElementById('btn-continue').addEventListener('click', function () {
                setTimeout(ensureBGM, 600);
            });

            // ---- 页面可见性变化时保持 BGM 运行 ----
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden && bgmPlaying) {
                    // 如果页面重新可见，检查 BGM 是否还在
                    if (bgmPlaying && bgmNodes.masterGain) {
                        // BGM 可能因页面休眠而中断，重新启动
                        // 简单处理：如果 bgmPlaying 为 true 但没有声音，可以重启
                        // 但这里不强制重启，以免打断
                    }
                }
            });

            console.log('🎵 Web Audio 音效引擎已加载！');
            function renderOptions(options) {
                const container = document.getElementById('options-area');
                if (state._waitingConfirm) return;
                container.innerHTML = '';
                if (!options || options.length === 0) {
                    container.innerHTML =
                        '<div style="color:var(--text-muted);text-align:center;font-size:0.8rem;padding:8px;">—— 没有更多行动 ——</div>';
                    return;
                }
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn' + (opt.disabled ? ' disabled' : '') + (opt.ending ? ' ending-btn' : '');
                    btn.innerHTML =
                        `${opt.label}${opt.hint ? `<span class="hint">${opt.hint}</span>` : ''}${opt.cost ? `<span class="cost">${opt.cost}</span>` : ''}${opt.tag ? `<span class="tag">${opt.tag}</span>` : ''}`;
                    if (!opt.disabled) {
                        btn.addEventListener('click', () => {
                            // ⭐ 播放铃铛音效，音效结束后执行原动作
                            playSFX(() => {
                                if (opt.action) opt.action();
                            });
                        });
                    }
                    container.appendChild(btn);
                });
            }

            // ---------- 主菜单 ----------
            function renderMainOptions() {

                // ---- 新增：早晨事件完成后的压力事件兜底检测 ----
                if (state._morningEventProcessed && !state.flags.chapter2 && !state.gameOver && !state._waitingConfirm) {
                    state._morningEventProcessed = false; // 防止重复检测
                    var hasPressure = checkAndTriggerPressureEvent();
                    if (hasPressure) {
                        return;
                    }
                }
                // 兜底：检查隐藏规则是否可解锁
                if (!state.flags.hidden_unlocked && !state._waitingConfirm && !state.gameOver && !state.flags.chapter2) {
                    const allMet = state.flags.hidden_hasBookmark &&
                        state.flags.hidden_hasBrand &&
                        state.flags.hidden_sleepCount >= 3 &&
                        state.flags.hidden_teaCount >= 2 &&
                        state.flags.hidden_answeredCode;
                    if (allMet) {
                        setTimeout(() => {
                            if (!state.flags.hidden_unlocked && !state.gameOver) {
                                unlockHiddenRulesAsync();
                            }
                        }, 200);
                        return; // 等待解锁，暂时不渲染主菜单
                    }
                }
                // ---- 新增：检查村西觉醒者支线是否解锁 ----
                if (!state.flags.awakening.unlocked && !state.flags.awakening.visited && !state.flags.chapter2 && !state.gameOver) {
                    const unlocked = checkAwakeningUnlock();
                    if (unlocked) {
                        // 显示解锁提示，但不打断当前流程
                        setStory(`
                <span class="title-line">🌾 新的探索地点已解锁</span>
                <span class="divider">· · ·</span>
                <span style="color:#d4b87a;">💡 你隐约感到，村西那个被村民禁止靠近的地方，似乎藏着不可靠近的东西……</span>
                <span style="color:var(--text-muted);font-size:0.85rem;">📌 「前往村西聚居区」已添加到探索选项中（消耗2体力）。</span>
            `);
                        // 显示一个继续按钮
                        renderOptions([{
                            label: '📌 我知道了',
                            action: () => {
                                renderMainOptions();
                            }
                        }]);
                        return;
                    }
                }
                if (state.gameOver) return;
                // ---- 新增：第6天白天结束时强制事件 ----
                if (state.day === 6 && state.stamina === 1 &&
                    !state.flags.pressure.dayEvents.day6_triggered &&
                    !state.flags.pressure.forcedAction) {
                    state.flags.pressure.dayEvents.day6_triggered = true;
                    renderPressureEvent_day6_forced();
                    return;
                }
                if (state.stamina === 0) {
                    enterNight();
                    return;
                }
                if (state.flags.chapter2) {
                    renderChapter2();
                    return;
                }
                const opts = [{
                    label: '🏚️ 去那栋没人住的房子看看',
                    hint: '也许能找到些旧物',
                    cost: '⚡1',
                    action: () => { goToScene('explore_abandoned'); }
                }, {
                    label: '🏛️ 去挂着公家牌子的地方',
                    hint: '那里的人说话总留半句',
                    cost: '⚡1',
                    action: () => { goToScene('explore_folklore'); }
                }, {
                    label: '🏪 去村口那家杂货铺',
                    hint: '老太婆总在哼怪调子',
                    cost: '⚡1',
                    action: () => { goToScene('explore_shop'); }
                }, {

                    if (available.length === 0) {
                        resolve(null);
                        return;

                    // 按权重随机选择一个事件
                    let randVal = rand(0, 100);
                    let cumulative = 0;
                    let chosen = null;
                    for (const e of available) {

            function checkAndTriggerPressureEvent() {
                if (state.gameOver || state._waitingConfirm) return false;
                if (state.flags.chapter2) return false;
                if (state.flags.pressure.forcedAction) return false;

                var day = state.day;
                var pressure = state.flags.pressure;

                // 更新压力等级
                if (day >= 6) {
                    pressure.level = 4;
                } else if (day >= 5) {
                    pressure.level = 3;
                } else if (day >= 4) {
                    pressure.level = 2;
                } else if (day >= 3) {
                    pressure.level = 1;
                } else {
                    pressure.level = 0;
                }

                // ---- 第3天：嫂嫂询问 ----
                if (day === 3 && !pressure.dayEvents.day3_triggered) {
                    pressure.dayEvents.day3_triggered = true;
                    renderPressureEvent_day3();
                    return true;
                }

                // ---- 第4天：异样眼光 + 民俗部警告 ----
                if (day === 4 && !pressure.dayEvents.day4_triggered) {
                    pressure.dayEvents.day4_triggered = true;
                    renderPressureEvent_day4();
                    return true;
                }

                // ---- 第5天：嫂嫂最后通牒 ----
                if (day === 5 && !pressure.dayEvents.day5_triggered) {
                    pressure.dayEvents.day5_triggered = true;
                    renderPressureEvent_day5();
                    return true;
                }

                // ---- 第6天：白天结束时强制事件 ----
                if (day === 6 && !pressure.dayEvents.day6_triggered) {
                    pressure.dayEvents.day6_triggered = true;
                    // 在白天结束时触发，而不是早晨
                    // 在 renderMainOptions 的 stamina === 0 时检测
                    return false;
                }

                return false;
            }

            function checkAndTriggerMorningEvent() {
                if (state.gameOver || state._waitingConfirm) return false;
                if (state.flags.chapter2) return false;

                // 第2天：灰线烙印事件（只有一次）
                if (state.day === 2 && !state.flags.morningEvents.day2_grayLine_triggered) {
                    state.flags.morningEvents.day2_grayLine_triggered = true;
                    renderGrayLineEvent();
                    return true;
                }

                // 第3~5天：暗语问答事件（每天一次）
                if (state.day >= 3 && state.day <= 5) {
                    const key = `day${state.day}_code_triggered`;
                    if (!state.flags.morningEvents[key]) {
                        state.flags.morningEvents[key] = true;
                        renderDarkCodeEvent();
                        return true;
                    }
                }

                // 兜底：检查隐藏规则是否可解锁（可能在事件之后满足条件）
                if (!state.flags.hidden_unlocked) {
                    const allMet = state.flags.hidden_hasBookmark &&
                        state.flags.hidden_hasBrand &&
                        state.flags.hidden_sleepCount >= 3 &&
                        state.flags.hidden_teaCount >= 2 &&
                        state.flags.hidden_answeredCode;
                    if (allMet) {
                        // 延迟执行，避免干扰当前渲染
                        setTimeout(() => {
                            if (!state.flags.hidden_unlocked && !state.gameOver) {
                                unlockHiddenRulesAsync();
                            }
                        }, 300);
                    }
                }

                return false;
            }

                    if (hasAllAbandonedRules) {
