<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙岭观前坑 · 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --bg-primary: #0d0a08;
            --bg-card: #1a1410;
            --bg-panel: #241e18;
            --border-gold: #8b7a4a;
            --text-primary: #e8ddd0;
            --text-muted: #a8957a;
            --text-gold: #d4b87a;
            --red-bright: #8a2a2a;
            --font-serif: 'Noto Serif SC', '华文楷体', 'KaiTi', serif;
            --font-title: 'Ma Shan Zheng', '华文楷体', cursive;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(60, 30, 20, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 20, 50, 0.3) 0%, transparent 70%);
        }

        #game-container {
            width: 100%;
            max-width: 860px;
            height: 96vh;
            max-height: 820px;
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        #status-bar {
            background: linear-gradient(180deg, #1f1812 0%, #16100c 100%);
            border-bottom: 1px solid var(--border-gold);
            padding: 8px 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4px 12px;
            flex-shrink: 0;
            z-index: 1;
            position: relative;
        }

        #status-bar .title {
            font-family: var(--font-title);
            font-size: 1.2rem;
            color: var(--text-gold);
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(180, 140, 80, 0.2);
            white-space: nowrap;
        }

        .status-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 12px;
            font-size: 0.75rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
        }

        .status-item .label {
            opacity: 0.7;
        }

        .status-item .value {
            color: var(--text-primary);
            font-weight: 700;
            min-width: 18px;
        }

        .stamina-dots {
            display: flex;
            gap: 3px;
        }

        .stamina-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            background: #2a221a;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .stamina-dot.filled {
            background: #4a7a4a;
            border-color: #6aaa6a;
            box-shadow: 0 0 10px rgba(74, 122, 74, 0.3);
            color: #b0e0b0;
        }

        .stamina-dot.spent {
            opacity: 0.2;
            background: #1a1410;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bar-track {
            width: 60px;
            height: 5px;
            background: #2a221a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #3a322a;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .bar-fill.dragon {
            background: linear-gradient(90deg, #4a7a4a, #8a5a3a, #aa4a2a);
        }

        .bar-fill.sanity {
            background: linear-gradient(90deg, #4a5a8a, #7a8aaa, #aac0e0);
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
            padding: 0 18px 0 18px;
        }

        #story-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 10px 10px 10px;
            scroll-behavior: smooth;
        }

        #story-area::-webkit-scrollbar {
            width: 4px;
        }

        #story-area::-webkit-scrollbar-track {
            background: #1a1410;
        }

        #story-area::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
            transition: background 0.5s, color 0.5s;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 0 -6px;
        }

        .story-text .highlight {
            color: var(--text-gold);
        }

        .story-text .danger {
            color: #d45a5a;
        }

        .story-text .rule-text {
            display: block;
            padding: 6px 14px;
            margin: 5px 0;
            border-left: 3px solid var(--text-gold);
            background: rgba(180, 140, 80, 0.06);
            font-size: 0.9rem;
            color: #d4c8b0;
        }

        .story-text .divider {
            display: block;
            text-align: center;
            color: var(--text-muted);
            margin: 10px 0;
            letter-spacing: 6px;
            opacity: 0.4;
        }

        .story-text .title-line {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--text-gold);
            text-align: center;
            margin: 8px 0 12px 0;
            letter-spacing: 2px;
        }

        .story-text .nursery-rhyme {
            display: block;
            padding: 10px 14px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-radius: 6px;
            font-style: italic;
            color: #d4c8b0;
            line-height: 2;
            white-space: pre-line;
        }

        .story-text .ending-title {
            font-size: 1.8rem;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
        }

        .story-text .info-box {
            display: block;
            padding: 8px 14px;
            margin: 6px 0;
            border-left: 3px solid #6a8aaa;
            background: rgba(100, 130, 170, 0.06);
            font-size: 0.9rem;
            color: #b0c8d8;
        }

        .story-text .km-progress {
            display: block;
            text-align: center;
            color: var(--text-gold);
            font-size: 0.85rem;
            margin: 4px 0;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .story-text .comedy-box {
            display: block;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(180, 140, 80, 0.12);
            border-radius: 8px;
            border: 1px solid var(--border-gold);
            color: #d4c8b0;
            line-height: 2;
        }

        .story-text .feedback {
            display: block;
            padding: 8px 12px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-left: 3px solid var(--text-gold);
            color: var(--text-gold);
            font-weight: 500;
        }

        /* ===== 结局配色 ===== */
        /* HE - 暖金色 */
        .story-text.ending-he {
            background: #d4c8a0;
            color: #3a2a1a;
        }

        .story-text.ending-he .ending-title {
            color: #5a3a1a;
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-he .divider {
            color: #8a7a5a;
        }

        .story-text.ending-he .rule-text {
            background: rgba(200, 180, 150, 0.2);
            border-left-color: #8a7a5a;
            color: #3a2a1a;
        }

        .story-text.ending-he .highlight {
            color: #5a3a1a;
        }

        /* BE2 大不敬 - 暗红底深红字 */
        .story-text.ending-be2 {
            background: #2a0a0a;
            color: #8a2a2a;
        }

        .story-text.ending-be2 .ending-title {
            color: #aa2a2a;
            text-shadow: 0 0 40px rgba(200, 30, 30, 0.5);
        }

        .story-text.ending-be2 .divider {
            color: #4a1a1a;
        }

        .story-text.ending-be2 .rule-text {
            background: rgba(80, 20, 20, 0.2);
            border-left-color: #8a2a2a;
            color: #aa4a4a;
        }

        .story-text.ending-be2 .highlight {
            color: #aa4a4a;
        }

        /* BE3 惊扰 - 暗紫底紫红字 */
        .story-text.ending-be3 {
            background: #1a0a1a;
            color: #7a2a6a;
        }

        .story-text.ending-be3 .ending-title {
            color: #aa2a8a;
            text-shadow: 0 0 40px rgba(180, 30, 150, 0.5);
        }

        .story-text.ending-be3 .divider {
            color: #3a1a3a;
        }

        .story-text.ending-be3 .rule-text {
            background: rgba(60, 20, 50, 0.2);
            border-left-color: #8a2a7a;
            color: #9a4a8a;
        }

        .story-text.ending-be3 .highlight {
            color: #aa4a9a;
        }

        /* BE4 半途而废 - 暗灰底深灰字 */
        .story-text.ending-be4 {
            background: #141414;
            color: #5a5a5a;
        }

        .story-text.ending-be4 .ending-title {
            color: #7a7a7a;
            text-shadow: 0 0 30px rgba(100, 100, 100, 0.3);
        }

        .story-text.ending-be4 .divider {
            color: #2a2a2a;
        }

        .story-text.ending-be4 .rule-text {
            background: rgba(40, 40, 40, 0.2);
            border-left-color: #5a5a5a;
            color: #6a6a6a;
        }

        .story-text.ending-be4 .highlight {
            color: #7a7a7a;
        }

        /* 老实人 - 暗绿 */
        .story-text.ending-normal {
            background: #0a1a0a;
            color: #3a5a3a;
        }

        .story-text.ending-normal .ending-title {
            color: #4a7a4a;
            text-shadow: 0 0 30px rgba(60, 160, 60, 0.3);
        }

        .story-text.ending-normal .divider {
            color: #1a2a1a;
        }

        .story-text.ending-normal .rule-text {
            background: rgba(30, 60, 30, 0.2);
            border-left-color: #4a7a4a;
            color: #4a6a4a;
        }

        .story-text.ending-normal .highlight {
            color: #5a8a5a;
        }

        /* 龙化过高 - 暗红亮红 */
        .story-text.ending-dragon {
            background: #1a0505;
            color: #aa3a2a;
        }

        .story-text.ending-dragon .ending-title {
            color: #cc3a2a;
            text-shadow: 0 0 50px rgba(220, 50, 30, 0.6);
        }

        .story-text.ending-dragon .divider {
            color: #3a1a1a;
        }

        .story-text.ending-dragon .rule-text {
            background: rgba(80, 20, 10, 0.2);
            border-left-color: #aa3a2a;
            color: #cc5a4a;
        }

        .story-text.ending-dragon .highlight {
            color: #dd5a4a;
        }

        /* 被龙化 - 暗金 */
        .story-text.ending-corrupted {
            background: #1a1208;
            color: #aa8a3a;
        }

        .story-text.ending-corrupted .ending-title {
            color: #ccaa3a;
            text-shadow: 0 0 40px rgba(200, 170, 50, 0.5);
        }

        .story-text.ending-corrupted .divider {
            color: #3a2a1a;
        }

        .story-text.ending-corrupted .rule-text {
            background: rgba(80, 60, 20, 0.2);
            border-left-color: #aa8a3a;
            color: #bb9a4a;
        }

        .story-text.ending-corrupted .highlight {
            color: #ccaa5a;
        }

        /* 第三章 - 原色 */
        .story-text.ending-chapter3 {
            background: transparent;
            color: var(--text-primary);
        }

        .story-text.ending-chapter3 .ending-title {
            color: var(--text-gold);
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-chapter3 .divider {
            color: var(--text-muted);
        }

        .story-text.ending-chapter3 .rule-text {
            background: rgba(180, 140, 80, 0.06);
            border-left-color: var(--text-gold);
            color: #d4c8b0;
        }

        .story-text.ending-chapter3 .highlight {
            color: var(--text-gold);
        }

        #rule-notification {
            background: rgba(26, 20, 16, 0.95);
            border: 1px solid var(--text-gold);
            border-radius: 8px;
            padding: 10px 16px;
            margin: 6px 0 8px 0;
            display: none;
            animation: fadeSlide 0.5s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #rule-notification.show {
            display: block;
        }

        #rule-notification .rule-title {
            color: var(--text-gold);
            font-weight: 700;
            font-size: 0.85rem;
        }

        #rule-notification .rule-body {
            font-size: 0.82rem;
            color: var(--text-primary);
            margin-top: 3px;
            line-height: 1.6;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #options-area {
            padding: 8px 0 14px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.15);
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 50px;
        }

        .option-btn {
            background: rgba(30, 24, 18, 0.8);
            border: 1px solid #3a322a;
            border-radius: 6px;
            padding: 9px 14px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 0.88rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(60, 50, 40, 0.8);
            border-color: var(--border-gold);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(139, 122, 74, 0.08);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn .hint {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-left: 6px;
            opacity: 0.6;
        }

        .option-btn .cost {
            float: right;
            color: var(--text-muted);
            font-size: 0.65rem;
            opacity: 0.5;
        }

        .option-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .option-btn .tag {
            display: inline-block;
            font-size: 0.55rem;
            background: rgba(139, 122, 74, 0.2);
            border-radius: 3px;
            padding: 0 6px;
            margin-left: 4px;
            color: var(--text-gold);
        }

        .option-btn.confirm-btn {
            border-color: var(--text-gold);
            background: rgba(180, 140, 80, 0.15);
            text-align: center;
            font-weight: 700;
            color: var(--text-gold);
            font-size: 1rem;
            padding: 12px 14px;
        }

        .option-btn.confirm-btn:hover {
            background: rgba(180, 140, 80, 0.25);
            transform: scale(1.01);
        }

        .option-btn.ending-btn {
            border-color: #6a4a3a;
            background: rgba(100, 60, 40, 0.15);
            text-align: center;
        }

        .option-btn.ending-btn:hover {
            background: rgba(100, 60, 40, 0.25);
        }

        #rules-panel {
            background: rgba(16, 12, 10, 0.98);
            border-top: 1px solid var(--border-gold);
            flex-shrink: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            position: relative;
        }

        #rules-panel.open {
            max-height: 300px;
            overflow-y: auto;
        }

        #rules-panel::-webkit-scrollbar {
            width: 3px;
        }

        #rules-panel::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        #rules-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(139, 122, 74, 0.15);
            cursor: pointer;
            user-select: none;
        }

        #rules-panel .panel-header:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        #rules-panel .panel-header .title {
            color: var(--text-gold);
            font-size: 0.82rem;
            letter-spacing: 2px;
        }

        #rules-panel .panel-header .count {
            color: var(--text-muted);
            font-size: 0.72rem;
        }

        #rules-panel .panel-body {
            padding: 8px 18px 14px 18px;
        }

        .rule-entry {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(139, 122, 74, 0.06);
            font-size: 0.78rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .rule-entry .num {
            color: var(--text-gold);
            font-weight: 700;
            flex-shrink: 0;
            width: 20px;
        }

        .rule-entry .content {
            color: var(--text-primary);
        }

        .rule-entry .content .new-tag {
            color: #6ab06a;
            font-size: 0.55rem;
            margin-left: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #footer-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 18px 6px 18px;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.08);
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            gap: 6px;
            flex-wrap: wrap;
        }

        #footer-tools .left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        #footer-tools .left .day-info {
            color: var(--text-gold);
        }

        .toggle-rules-btn {
            background: none;
            border: 1px solid var(--border-gold);
            color: var(--text-muted);
            padding: 3px 12px;
            border-radius: 4px;
            font-family: var(--font-serif);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-rules-btn:hover {
            background: rgba(139, 122, 74, 0.1);
            color: var(--text-gold);
        }

        .toggle-rules-btn .badge {
            background: var(--red-bright);
            color: #fff;
            border-radius: 50%;
            padding: 0 5px;
            font-size: 0.55rem;
            margin-left: 3px;
        }

        @media (max-width: 640px) {
            #game-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }

            #status-bar {
                padding: 4px 10px;
                flex-direction: column;
                align-items: stretch;
                gap: 3px;
            }

            #status-bar .title {
                font-size: 1rem;
                text-align: center;
            }

            .status-group {
                justify-content: center;
                font-size: 0.65rem;
                gap: 3px 8px;
            }

            .bar-track {
                width: 45px;
            }

            #story-area {
                padding: 10px 4px 6px 4px;
            }

            .story-text {
                font-size: 0.82rem;
                line-height: 1.7;
                padding: 8px 10px;
            }

            #options-area {
                padding: 4px 0 8px 0;
            }

            .option-btn {
                padding: 7px 10px;
                font-size: 0.78rem;
            }

            #footer-tools {
                padding: 2px 10px 4px 10px;
                font-size: 0.6rem;
            }

            #rules-panel.open {
                max-height: 160px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div id="status-bar">
            <div class="title">🌙 龙岭观前坑</div>
            <div class="status-group">
                <div class="status-item">
                    <span class="label">📅</span>
                    <span class="value" id="dayDisplay">第1天</span>
                </div>
                <div class="status-item">
                    <span class="label">🕐</span>
                    <span class="value" id="timeDisplay">上午</span>
                </div>
                <div class="status-item">
                    <span class="label">⚡</span>
                    <span class="stamina-dots" id="staminaDots"></span>
                </div>
                <div class="status-item bar-wrap">

        // ---------- 工具函数 ----------
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function pick(arr) { return arr[rand(0, arr.length - 1)]; }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = rand(0, i);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ================================================================
        //  【核心】规则确认机制 - 非侵入式
        // ================================================================
        function addRule(id) {
            return new Promise((resolve) => {
                if (!RULES_DB[id]) { resolve(false); return; }
                if (state.rules.includes(id)) { resolve(false); return; }

                if (state._waitingConfirm) {
                    const checkInterval = setInterval(() => {
                        if (!state._waitingConfirm) {
                            clearInterval(checkInterval);
                            addRule(id).then(resolve);
                        }
                    }, 100);
                    return;
                }

                state.rules.push(id);
                const rule = RULES_DB[id];
                state._waitingConfirm = true;
                state._confirmResolve = resolve;

                const notify = document.getElementById('rule-notification');
                document.getElementById('ruleNotifyBody').textContent = rule.text;
                notify.classList.add('show');
                updateUI();

                const container = document.getElementById('options-area');
                const existingBtns = container.querySelectorAll('.option-btn:not(.confirm-btn)');
                existingBtns.forEach(btn => {
                    btn.style.pointerEvents = 'none';
                    btn.style.opacity = '0.5';
                });

                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'option-btn confirm-btn';
                confirmBtn.textContent = '📖 我知道了';
                confirmBtn.style.marginTop = '4px';
                confirmBtn.addEventListener('click', () => {
                    notify.classList.remove('show');
                    state._waitingConfirm = false;
                    state.newRuleCount = state.rules.length;
                    updateUI();

                    confirmBtn.remove();
                    existingBtns.forEach(btn => {
                        btn.style.pointerEvents = '';
                        btn.style.opacity = '';
                    });

                    const r = state._confirmResolve;
                    state._confirmResolve = null;
                    if (r) r(true);
                });
                container.appendChild(confirmBtn);

                const area = document.getElementById('story-area');
                setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
            });
        }

        // ================================================================
        //  夜间随机事件系统（仅第一章留宿时触发）
        // ================================================================
        function triggerNightEventIfAny() {
            return new Promise((resolve) => {
                // 只在第一章且未进入第二章时触发
                if (state.flags.chapter2 || state.gameOver) {
                    resolve(null);
                    return;
                }

                // 各事件概率（百分比）
                const events = [
                    { id: 'knock', prob: 15, flag: 'knock', name: '半夜敲门声' },
                    { id: 'dream', prob: 20, flag: 'dream', name: '梦呓低语' },
                    { id: 'window', prob: 10, flag: 'window', name: '窗外人影' },
                ];

                // 计算总概率（已触发的事件不再参与）
                const available = events.filter(e => !state.flags.nightEvents[e.flag]);
                if (available.length === 0) {
                    resolve(null);
                    return;
                }

                // 随机决定是否触发（先决定是否触发事件，概率为45%，即15+20+10）
                const totalProb = available.reduce((sum, e) => sum + e.prob, 0);
                // 但我们希望总触发概率为45%左右，但每个事件概率固定，所以直接按权重随机选择事件
                // 生成0~100随机数，落在哪个事件区间就触发哪个
                let randVal = rand(0, 100);
                let cumulative = 0;
                let chosen = null;
                for (const e of available) {
                    cumulative += e.prob;
                    if (randVal <= cumulative) {
                        chosen = e;
                        break;
                    }
                }
                // 如果没有选到（可能randVal > 总概率），则不触发
                if (!chosen) {
                    resolve(null);
                    return;
                }

                // 标记该事件已触发（防止重复）
                state.flags.nightEvents[chosen.flag] = true;

                // 根据事件类型显示不同内容
                switch (chosen.id) {
                    case 'knock':
                        renderKnockEvent(resolve);
                        break;
                    case 'dream':
                        renderDreamEvent(resolve);
                        break;
                    case 'window':
                        renderWindowEvent(resolve);
                        break;
                    default:
                        resolve(null);
                }
            });
        }

        // ---- 各事件具体渲染函数 ----

            renderOptions([
                {

                    tag: '冒险',

        // ================================================================
        //  辅助：推进第二章路程
        // ================================================================
        function advanceChapter2Progress(km) {
            var currentPhase = state.ch2.phase;

            if (currentPhase === 'main_road') {
                state.ch2.mainProgress += km;
                state.ch2.km += km;
                if (state.ch2.mainProgress >= 8) {
                    state.ch2.phase = 'crossroads';
                    state.ch2.km = 8;
                }
            } else if (currentPhase === 'forest_road') {
                state.ch2.forestProgress += km;
                state.ch2.km += km;
                if (state.ch2.forestProgress >= 5) {
                    state.ch2.phase = 'crossroads';
                    state.ch2.km = 5;
                }
            } else if (currentPhase === 'altar_road') {
                state.ch2.altarProgress += km;
                state.ch2.km += km;
                if (state.ch2.altarProgress >= 4) {
                    state.ch2.phase = 'crossroads';
                    state.ch2.km = 4;
                }
            } else if (currentPhase === 'final_ascent') {
                state.ch2.km += km;
                if (state.ch2.km >= 8) {
                    state.ch2.phase = 'temple_gate';
                }
            } else if (currentPhase === 'crossroads') {
                // 在三岔路口，直接推进到最终山路
                state.ch2.phase = 'final_ascent';
                state.ch2.km += km;
            } else {
                state.ch2.km += km;
            }
        }
        // ================================================================
        //  时间压力系统 - 每日检测
        // ================================================================
        function checkAndTriggerPressureEvent() {
            if (state.gameOver || state._waitingConfirm) return false;
            if (state.flags.chapter2) return false;
            if (state.flags.pressure.forcedAction) return false;

            var day = state.day;
            var pressure = state.flags.pressure;

            // 更新压力等级
            if (day >= 6) {
                pressure.level = 4;
            } else if (day >= 5) {
                pressure.level = 3;
            } else if (day >= 4) {
                pressure.level = 2;
            } else if (day >= 3) {
                pressure.level = 1;
            } else {
                pressure.level = 0;
            }

            // ---- 第3天：嫂嫂询问 ----
            if (day === 3 && !pressure.dayEvents.day3_triggered) {
                pressure.dayEvents.day3_triggered = true;
                renderPressureEvent_day3();
                return true;
            }

            // ---- 第4天：异样眼光 + 民俗部警告 ----
            if (day === 4 && !pressure.dayEvents.day4_triggered) {
                pressure.dayEvents.day4_triggered = true;
                renderPressureEvent_day4();
                return true;
            }

            // ---- 第5天：嫂嫂最后通牒 ----
            if (day === 5 && !pressure.dayEvents.day5_triggered) {
                pressure.dayEvents.day5_triggered = true;
                renderPressureEvent_day5();
                return true;
            }

            // ---- 第6天：白天结束时强制事件 ----
            if (day === 6 && !pressure.dayEvents.day6_triggered) {
                pressure.dayEvents.day6_triggered = true;
                // 在白天结束时触发，而不是早晨
                // 在 renderMainOptions 的 stamina === 0 时检测
                return false;
            }

            return false;

            if (state.day > 6 && !state.flags.chapter2) {

    `);

            // ---- 检测早晨事件（暗语/灰线） ----
            if (!state.flags.chapter2 && !state.gameOver) {
                var hasEvent = checkAndTriggerMorningEvent();
                if (hasEvent) {
                    // 标记早晨事件已触发，等待用户交互完成后继续
                    state._morningEventProcessed = true;
                    return;
                }
            }

            // ---- 如果没有早晨事件，直接检测压力事件 ----
            if (!state.flags.chapter2 && !state.gameOver) {
                var hasPressure = checkAndTriggerPressureEvent();
                if (hasPressure) return;
            }

            renderMainOptions();

        // ================================================================
        //  早晨事件调度器
        // ================================================================
        function checkAndTriggerMorningEvent() {
            if (state.gameOver || state._waitingConfirm) return false;
            if (state.flags.chapter2) return false;

            // 第2天：灰线烙印事件（只有一次）
            if (state.day === 2 && !state.flags.morningEvents.day2_grayLine_triggered) {
                state.flags.morningEvents.day2_grayLine_triggered = true;
                renderGrayLineEvent();
                return true;
            }

            // 第3~5天：暗语问答事件（每天一次）
            if (state.day >= 3 && state.day <= 5) {
                const key = `day${state.day}_code_triggered`;
                if (!state.flags.morningEvents[key]) {
                    state.flags.morningEvents[key] = true;
                    renderDarkCodeEvent();
                    return true;
                }
            }

            // 兜底：检查隐藏规则是否可解锁（可能在事件之后满足条件）
            if (!state.flags.hidden_unlocked) {
                const allMet = state.flags.hidden_hasBookmark &&
                    state.flags.hidden_hasBrand &&
                    state.flags.hidden_sleepCount >= 3 &&
                    state.flags.hidden_teaCount >= 2 &&
                    state.flags.hidden_answeredCode;
                if (allMet) {
                    // 延迟执行，避免干扰当前渲染
                    setTimeout(() => {
                        if (!state.flags.hidden_unlocked && !state.gameOver) {
                            unlockHiddenRulesAsync();
                        }
                    }, 300);
                }
            }

            return false;
        }

        // ================================================================
        //  场景3C：祭坛小径行进
        // ================================================================
        function renderAltarRoad() {
            if (state._waitingConfirm) return;

            var progress = state.ch2.altarProgress;
            var totalDistance = 4;
            var stepDragon = 5 - state.ch2.dragonReductionPerStep - (state.ch2.hasStrawSandals ? 1 : 0);
            stepDragon = Math.max(1, stepDragon);

            if (progress >= totalDistance) {
                state.ch2.phase = 'crossroads';
                state.ch2.km = totalDistance;
                renderCrossroads();
                return;
            }

            // 香火检查：每1km消耗一根香
            var hasIncense = state.ch2.boughtIncense;
            var incenseWarning = '';
            if (progress > 0 && Math.floor(progress) !== Math.floor(progress - 0.5)) {
                // 每1km检查一次
                if (!hasIncense) {
                    changeDragonization(10);
                    incenseWarning = `
                <span class="danger">⚠️ 你的香已经燃尽了！</span>
                你感到一股冰冷的气息从四面八方涌来，像是有什么东西在黑暗中注视着你。（龙化 +10）
            `;
                }
            }

            var description = `
        <span class="title-line">🕯️ 祭坛小径 · ${progress}km</span>
        <span class="km-progress">—— 你已走了 ${progress}km ——</span>
        你点燃了香，走上了祭坛小径。这条路比想象中要宽阔，路旁每隔几米就插着一面小旗，
        旗上画着奇怪的符文。空气中的菌菇味浓得刺鼻，你觉得自己仿佛走在一条通往祭坛的甬道上。
        ${incenseWarning}
    `;

            // 香火检查提示
            if (hasIncense && progress > 0) {
                description += `
            <span style="color:var(--text-muted);font-size:0.85rem;">🕯️ 香火仍在燃烧，龙神的目光暂时被遮蔽了。</span>
        `;
            }

            // 祭坛遗址（2km处）
            if (progress >= 2 && progress < 2.5 && !state.ch2.altarEncountered.site) {
                state.ch2.altarEncountered.site = true;
                description += `
            <span class="divider">· · ·</span>
            <span style="color:#d4b87a;">🪦 你来到了一处古老的祭坛遗址。</span>
            石头垒成的祭坛上摆着几样东西：一个陶罐、一把生锈的匕首、几根未燃尽的香。
            空气中弥漫着一股淡淡的血腥味。
        `;
                renderOptions([
                    {
                        label: '🔍 检查陶罐',
                        hint: '可能发现线索',
                        cost: '⚡1',
                        action: function () {
                            if (state.gameOver || state._waitingConfirm) return;
                            if (state.stamina <= 0) { enterNight(); return; }
                            state.stamina--;
                            state.actionsToday++;
                            state.ch2.hasTempleHint = true;
                            setStory(`
                        <span class="title-line">🪦 祭坛 · 陶罐</span>
                        你打开陶罐，里面有一张折叠的旧纸，纸张已经发黄：
                        <span class="rule-text" style="color:#d4b87a;">「每年重阳，以童阳祭龙，可得长生。慎之。」</span>
                        <span class="divider">· · ·</span>
                        <span style="color:#d4b87a;">📌 你获得了重要线索！</span>
                    `);
                            if (!state.rules.includes('temple_1')) {
                                addRule('temple_1');
                            }
                            updateUI();
                            renderOptions([{
                                label: '🚶 继续前进',
                                action: function () {
                                    if (state.gameOver || state._waitingConfirm) return;
                                    showStory('你将旧纸小心收好，继续前行。');
                                    renderAltarRoad();
                                }
                            }]);
                        }
                    },
                    {
                        label: '🗡️ 拿起匕首',
                        hint: '获得道具，龙化+5',
                        cost: '⚡1',
                        action: function () {
                            if (state.gameOver || state._waitingConfirm) return;
                            if (state.stamina <= 0) { enterNight(); return; }
                            state.stamina--;
                            state.actionsToday++;
                            state.ch2.hasAltarDagger = true;
                            setStory(`
                        <span class="title-line">🗡️ 祭坛匕首</span>
                        你握住那把生锈的匕首，一阵冰凉的触感从掌心传来。
                        匕首柄上刻着一个字——「清」。
                        <span class="divider">· · ·</span>
                        <span style="color:#d4b87a;">📌 你获得了「祭坛匕首」！（对抗道具）</span>
                        <span style="color:#aa4a4a;">龙化 +5</span>
                    `);
                            changeDragonization(5);
                            updateUI();
                            renderOptions([{
                                label: '🚶 继续前进',
                                action: function () {
                                    if (state.gameOver || state._waitingConfirm) return;
                                    showStory('你将匕首收好，继续前行。');
                                    renderAltarRoad();
                                }
                            }]);
                        }
                    },
                    {
                        label: '🚶 不做停留，继续前进',
                        action: function () {
                            if (state.gameOver || state._waitingConfirm) return;
                            renderAltarRoad();
                        }
                    }
                ]);
                return;
            }

            // 石壁刻字（3km处）
            if (progress >= 3 && progress < 3.5 && !state.ch2.altarEncountered.carving) {
                state.ch2.altarEncountered.carving = true;
                description += `
            <span class="divider">· · ·</span>
            <span style="color:#d4b87a;">📜 你发现路边石壁上有一行刻字。</span>
            你凑近辨认：
            <span class="rule-text" style="color:#d4b87a;">「后来者，若见此字，速返。道观非净土，玄清非活人。」</span>
            <span class="divider">· · ·</span>
            <span style="color:#6a8aaa;">你获得了一条重要线索（理智 +5）。</span>
        `;
                changeDragonization(-5);
            }

            setStory(description);

            // 检查体力
            if (state.stamina <= 0) {
                renderOptions([{
                    label: '🌙 体力耗尽，需要休息',
                    action: function () {
                        if (state.gameOver || state._waitingConfirm) return;
                        enterNight();
                    }
                }]);
                return;
            }

            renderOptions([{
                label: '🚶 继续前进（1km）',
                hint: '龙化 +' + stepDragon + (state.ch2.boughtIncense ? '（香火护体）' : '（无香危险）'),
                cost: '⚡1',
                action: function () {
                    if (state.gameOver || state._waitingConfirm) return;
                    if (state.stamina <= 0) { enterNight(); return; }
                    state.stamina--;
                    state.actionsToday++;
                    state.ch2.altarProgress += 1;
                    state.ch2.km += 1;
                    changeDragonization(stepDragon);
                    // 消耗一根香（简化处理：每1km检查一次，有香才能继续走）
                    // 如果没香了，但之前已经走了一段，后续会有惩罚
                    updateUI();
                    renderAltarRoad();
                }
            }]);
        }

        // ================================================================
        //  场景6：三岔路口汇合
        // ================================================================
        function renderCrossroads() {
            if (state._waitingConfirm) return;

            var pathNames = {
                'main': '主干道',
                'forest': '林间密道',
                'altar': '祭坛小径'
            };
            var pathName = pathNames[state.ch2.pathChosen] || '未知路径';

            setStory(`
        <span class="title-line">🚏 三岔路口 · 汇合</span>
        <span class="divider">—— —— ——</span>
        你走完了${pathName}的全程，来到了一个三岔路口。
        三条路在此汇合，前方是通往道观的最后一段山路。
        左边有一条从未见过的岔路，通向密林深处。
        右边有一条通往悬崖的小径，似乎是一个观景台。
        <span class="divider">· · ·</span>
        <span style="color:#d4b87a;">你站在这里，做出了最终的选择——继续上山，还是探索其他路径？</span>
        <span style="color:var(--text-muted);font-size:0.85rem;">你已走了 ${state.ch2.km}km，龙化值 ${state.dragonization}%</span>
    `);

            var opts = [];

            // 继续上山（主线）
            opts.push({
                label: '⬆️ 继续上山（主路）',
                hint: '前往道观',
                tag: '主线',
                action: function () {
                    if (state.gameOver || state._waitingConfirm) return;
                    state.ch2.phase = 'final_ascent';
                    state.ch2.km = 5;
                    showStory('你深吸一口气，踏上了通往道观的最后一段山路。');
                    setTimeout(function () { if (!state.gameOver && !state._waitingConfirm) renderChapter2(); }, 400);
                }
            });

            // 探索左边岔路（隐藏洞穴）
            if (!state.ch2.hiddenCaveVisited) {
                opts.push({
                    label: '⬅️ 探索左边岔路',
                    hint: '可能发现秘密',
                    tag: '探索',
                    action: function () {
                        if (state.gameOver || state._waitingConfirm) return;
                        if (state.stamina <= 0) { enterNight(); return; }
                        state.stamina--;
                        state.actionsToday++;
                        state.ch2.hiddenCaveVisited = true;
                        state.ch2.hasDiary = true;
                        setStory(`
                    <span class="title-line">🕳️ 隐藏洞穴</span>
                    你沿着左边岔路走了几百米，发现了一个隐蔽的洞穴。
                    洞内有一具枯骨，身上穿着破烂的道袍。旁边放着一本泛黄的日记。
                    你翻开日记，最后一页写着：
                    <span class="rule-text" style="color:#d4b87a;">「玄清已死，披着人皮的龙在说话。观里那些弟子，早就被龙神吃掉了灵魂。」</span>
                    <span class="divider">· · ·</span>
                    <span style="color:#d4b87a;">📌 你获得了「道士日记」！</span>
                    <span style="color:#6a8aaa;">理智 +8，龙化 +5</span>
                `);
                        changeDragonization(-8);
                        changeDragonization(5);
                        if (!state.rules.includes('diary_1')) {
                            addRule('diary_1');
                        }
                        updateUI();
                        renderOptions([{
                            label: '🚶 离开洞穴',
                            action: function () {
                                if (state.gameOver || state._waitingConfirm) return;
                                showStory('你将日记收好，离开了洞穴，回到三岔路口。');
                                renderCrossroads();
                            }
                        }]);
                    }
                });
            }

            // 悬崖观景台
            if (!state.ch2.cliffVisited) {
                opts.push({
                    label: '➡️ 去悬崖观景台',
                    hint: '俯瞰全景',
                    tag: '探索',
                    action: function () {
                        if (state.gameOver || state._waitingConfirm) return;
                        if (state.stamina <= 0) { enterNight(); return; }
                        state.stamina--;
                        state.actionsToday++;
                        state.ch2.cliffVisited = true;
                        state.ch2.hasCliffHint = true;
                        setStory(`
                    <span class="title-line">🏞️ 悬崖观景台</span>
                    你走到悬崖边，整个邱龙村尽收眼底。
                    村庄在夜幕中灯火通明，但你仔细一看——那些灯火排列成一个巨大的圆形图案，
                    像是一个阵法，又像是一张巨大的蛛网。
                    你发现脚边的石头上刻着一行字：
                    <span class="rule-text" style="color:#d4b87a;">「阴血之阵，以人养龙。」</span>
                    <span class="divider">· · ·</span>
                    <span style="color:#d4b87a;">📌 你获得了一条重要线索！</span>
                    <span style="color:#6a8aaa;">理智 +3</span>
                `);
                        changeDragonization(-3);
                        if (!state.rules.includes('cliff_1')) {
                            addRule('cliff_1');
                        }
                        updateUI();
                        renderOptions([{
                            label: '🚶 回到三岔路口',
                            action: function () {
                                if (state.gameOver || state._waitingConfirm) return;
                                showStory('你带着沉重的心情回到了三岔路口。');
                                renderCrossroads();
                            }
                        }]);
                    }
                });
            }

            // 如果体力为0，显示休息选项
            if (state.stamina <= 0) {
                opts.push({
                    label: '🌙 体力耗尽，需要休息',
                    action: function () {
                        if (state.gameOver || state._waitingConfirm) return;
                        enterNight();
                    }
                });
            }

            renderOptions(opts);
        }

        // ================================================================
        //  场景7：最后一段山路
        // ================================================================
        function renderFinalAscent() {
            if (state._waitingConfirm) return;

            var progress = state.ch2.km - 5; // 从5km开始计算
            var total = 3; // 最后3km

            if (progress >= total) {
                state.ch2.phase = 'temple_gate';
                renderTempleGate();
                return;
            }

            var stepDragon = 3 - state.ch2.dragonReductionPerStep - (state.ch2.hasStrawSandals ? 1 : 0);
            stepDragon = Math.max(1, stepDragon);

            // 龙气感知（根据龙化值显示不同内容）
            var visionText = '';
            var d = state.dragonization;
            if (d < 30) {
                visionText = '一切正常，只是山路有点阴森。路旁的古树上绑满了红布条，在风中轻轻摇晃。';
            } else if (d < 40) {
                visionText = '你注意到树上的红布条在无风自动，像是活物一样轻轻扭动。你揉了揉眼睛，它们又静止了。';
            } else if (d < 70) {
                visionText = '你看到树后面有青色的影子一闪而过。你停下脚步，四周一片寂静，只有风吹过树叶的声音。';
            } else {
                visionText = '你看到了「他们」——那些被龙化的人，整齐地站在林间，空洞地看着你。他们一动不动，但你知道他们在等你。';
            }

            setStory(`
        <span class="title-line">⛰️ 最后一段山路（${progress}/${total}km）</span>
        <span class="km-progress">—— 道观就在前方 ——</span>
        这是通往道观的最后一段路。路两旁的古树遮天蔽日，树干上绑满了红色的布条。
        空气中弥漫着一股淡淡的檀香味，混杂着菌菇的气息。
        <span class="divider">· · ·</span>
        <span style="color:var(--text-muted);">${visionText}</span>
        <span class="divider">· · ·</span>
        <span style="color:var(--text-muted);font-size:0.85rem;">道观的轮廓已经清晰可见，你离真相只有一步之遥。</span>
    `);

            if (state.stamina <= 0) {
                renderOptions([{
                    label: '🌙 体力耗尽，需要休息',
                    action: function () {
                        if (state.gameOver || state._waitingConfirm) return;
                        enterNight();
                    }
                }]);
                return;
            }

            renderOptions([{
                label: '🚶 继续前进（1km）',
                hint: '龙化 +' + stepDragon,
                cost: '⚡1',
                action: function () {
                    if (state.gameOver || state._waitingConfirm) return;
                    if (state.stamina <= 0) { enterNight(); return; }
                    state.stamina--;
                    state.actionsToday++;
                    state.ch2.km += 1;
                    changeDragonization(stepDragon);
                    updateUI();
                    renderFinalAscent();
                }
            }]);
        }

        // ================================================================
        //  场景8：道观大门（第二章终点）
        // ================================================================
        function renderTempleGate() {
            if (state._waitingConfirm) return;

            var steleFound = state.flags.stele.found || state.ch2.hasSteleClue;
            var hasIncense = state.ch2.boughtIncense;

            setStory(`
        <span class="title-line">🏯 道观大门</span>
        <span class="divider">—— —— ——</span>
        你终于来到了道观前。这是一座古老的道观，青瓦白墙，檐角挂着铜铃。
        大门紧闭，但门缝里透出昏黄的灯光。你听到里面传来诵经声——

                你站在山腰的缆道站，看着远处的游神队伍。
                锣鼓声隐约可闻，香烟缭绕。
                也许你也应该与之同行——但你没有。
                <span class="divider">· · ·</span>
                你感到内心缺了很多一直以来支撑你的事物——
                那些信念、那些好奇、那些勇气，都在这一刻烟消云散。
                当你驱车离开这里时，你知道你的一部分永远留在了山里。
                <span class="divider">· · ·</span>
                <span style="color:#5a5a5a;font-weight:700;">你带着残缺的灵魂离开了邱龙山。</span>
                <span style="color:#6a6a6a;font-weight:700;">—— 有些路，一旦错过就不再 ——</span>
            `;
                    break;

                case 'BE5_祭品_被迫献祭':
                    title = '💀 坏结局 · 被迫献祭';
                    endingClass = 'ending-corrupted';
                    desc = `
                <span style="color:#ccaa3a;">⚠️ 你被村民簇拥着走上了山道。</span>
                他们的手像铁钳一样抓着你的胳膊。你挣扎过，但无济于事。
                道观的大门在你面前打开。诵经声如潮水般涌来。
                <span class="divider">· · ·</span>
                你看到老道士站在神像前，微笑着向你招手。
                <span class="rule-text" style="color:#ccaa3a;">「又一个干净的阳原。」</span>
                你的意识在诵经声中逐渐模糊……
                你最后听到的，是锣鼓声——社戏开始了。
                <span class="divider">· · ·</span>
                <span style="color:#bb9a4a;font-weight:700;">你成为了社戏的祭品。</span>
                <span style="color:#ccaa3a;font-weight:700;">—— 社戏永不落幕 ——</span>
            `;
                    break;

                case 'BE6_自投罗网':
                    title = '💀 坏结局 · 自投罗网';
                    endingClass = 'ending-be2';
                    desc = `
                <span style="color:#aa2a2a;">🏃 你慌不择路地逃向村西。</span>
                你记得那里有觉醒者——但你错了。
                你从未与她们建立过联系，她们不会信任一个陌生人。
                <span class="divider">· · ·</span>
                你冲进村西的聚居区，却看到一双双警惕的眼睛。
                一个额头长着树芽的女人拦住了你：
                <span class="rule-text" style="color:#aa2a2a;">「你是谁？你怎么知道这里？你是不是道观派来的？」</span>
                你还没来得及解释，身后就传来了追兵的脚步声。
                <span class="divider">· · ·</span>
                <span style="color:#8a2a2a;font-weight:700;">你在觉醒者和道观之间，被碾成了碎片。</span>
                <span style="color:#aa4a4a;font-weight:700;">—— 夹缝之中，无处可逃 ——</span>
            `;
                    break;

                case 'BE7_同化':
                    title = '💀 坏结局 · 同化';
                    endingClass = 'ending-corrupted';
                    desc = `
                <span style="color:#ccaa3a;">💀 你放弃了抵抗。</span>
                你跪在道观大殿中，听着那永无止境的诵经声。
                你感到自己的意识在一点一点地融化，像冰融于水。
                <span class="divider">· · ·</span>
                你不再记得自己是谁，不再记得为什么要来这里。
                你只知道一件事——你是龙神的侍从，你是道观的一部分。
                <span class="rule-text" style="color:#ccaa3a;">「又一个……又一个干净的阳原……」</span>
                老道士的声音从很远的地方传来，又像在耳边低语。
                <span class="divider">· · ·</span>
                <span style="color:#bb9a4a;font-weight:700;">你成为了道观的一部分。</span>
                <span style="color:#ccaa3a;font-weight:700;">—— 归于寂静 · 无我无念 ——</span>
            `;
                    break;

                default:
                    desc = '游戏结束。';
                    endingClass = 'ending-normal';
            }

            updateUI();

            // 判断是否为第二章结局：根据当前游戏进度标志
            // 被迫献祭结局（BE5）虽然发生在第二章，但它是强制终结，不应提供重置选项
            var isCh2Ending = state.flags.chapter2 === true && type !== 'BE5_祭品_被迫献祭';
            var isSpecialEnding = (type === 'TE1_薪火相传' || type === 'HE1_幸存者' || type === 'NE2_被标记的归来'); setStory(`
        <span class="ending-title">${title}</span>
        <span class="divider">—— —— ——</span>
        ${desc}
        <span class="divider">· · ·</span>
        <span style="color:var(--text-muted);font-size:0.85rem;">你一共度过了 ${state.day} 天，收集了 ${state.rules.length} 条规则。</span>
        <span style="color:var(--text-muted);font-size:0.85rem;">最终龙化值: ${clamp(state.dragonization, 0, 100)}% · 理智值: ${100 - clamp(state.dragonization, 0, 100)}%</span>
        ${state.flags.chapter2 ? `<span style="color:var(--text-muted);font-size:0.85rem;">第二章进度: ${state.ch2.km}km · 遇到路人 ${state.ch2.passerbyCount} 次</span>` : ''}
        ${state.flags.stele.found ? `<span style="color:var(--text-gold);font-size:0.85rem;">📜 已发现工匠暗碑，了解全部真相</span>` : ''}
        ${state.flags.awakening.visited ? `<span style="color:var(--text-gold);font-size:0.85rem;">🌾 已接触觉醒者 · 信任度 ${state.flags.awakening.trustLevel}/5</span>` : ''}
    `, endingClass);

            var options = [];

            if (isSpecialEnding) {
                options.push({
                    label: '🏆 查看成就',
                    hint: '你达成了一个特殊结局！',
                    ending: true,
                    action: function () {
                        if (state._waitingConfirm) return;
                        showAchievement(type);
                    }
                });
            }

            if (isCh2Ending) {
                options.push({
                    label: '🔄 重新开始第二章',
                    hint: '保留当前规则和龙化值',
                    ending: true,
                    action: function () {
                        if (state._waitingConfirm) return;
                        resetChapter2();
                    }
                });
                options.push({
                    label: '🏠 回到第一章开头（重置所有状态）',
                    hint: '保留规则和龙化值，重置所有剧情进度',
                    ending: true,
                    action: function () {
                        if (state._waitingConfirm) return;
                        resetToChapter1();
                    }
                });
            }

            // 【所有结局通用】回顾规则
            options.push({
                label: '📜 回顾已收集的规则',
                ending: true,
                action: function () {
                    if (state._waitingConfirm) return;
                    if (!rulesPanelOpen) {
                        toggleRulesPanel();
                    }
                    setStory(`
                <span class="title-line">📜 规则回顾</span>
                <span class="divider">—— —— ——</span>
                你一共收集了 ${state.rules.length} 条规则。
                这些规则编织成了你在邱龙村的全部经历。
                <span class="divider">· · ·</span>
                <span style="color:var(--text-muted);font-size:0.85rem;">点击下方按钮返回结局。</span>
            `);
                    renderOptions([{
                        label: '🔙 返回结局',
                        ending: true,
                        action: function () {
                            if (state._waitingConfirm) return;
                            renderEndingContent(type);
                        }
                    }]);
                }
            });

            // 【所有结局通用】完全重新开始
            options.push({
                label: '🔄 完全重新开始游戏',
                hint: '清除所有进度，从头开始',
                ending: true,
                action: function () {
                    if (state._waitingConfirm) return;
                    resetGame();
                }
            });

            renderOptions(options);
            updateUI();
        }

        // ================================================================
        //  触发结局（设置 gameOver 状态 + 调用渲染）
        // ================================================================
        function triggerEnding(type) {
            if (state.gameOver) {
                renderEndingContent(type);
                return;
            }
            state.gameOver = true;
            renderEndingContent(type);
        }

        // ================================================================
        //  成就显示（特殊结局专用）
        // ================================================================
        function showAchievement(type) {
            if (state._waitingConfirm) return;

            var achievementText = '';
            var achievementIcon = '';

            switch (type) {
                case 'TE1_薪火相传':
                    achievementIcon = '🔥';
                    achievementText = '「薪火相传」—— 你打破了五百年的诅咒，成为真正的破局者。';
                    break;
                case 'HE1_幸存者':
                    achievementIcon = '🌅';
                    achievementText = '「幸存者」—— 你在绝境中找到了活下去的路，代价是永远被困。';
                    break;
                case 'NE2_被标记的归来':
                    achievementIcon = '🏁';
                    achievementText = '「被标记的归来」—— 你逃离了邱龙山，却永远无法逃离它对你的影响。';
                    break;
                default:
                    achievementIcon = '🏆';
                    achievementText = '你完成了一个特殊结局！';
            }

            setStory(`
        <span class="title-line">${achievementIcon} 成就解锁</span>
        <span class="divider">—— —— ——</span>
        <span style="color:var(--text-gold);font-size:1.2rem;">${achievementText}</span>
        <span class="divider">· · ·</span>
        <span style="color:var(--text-muted);font-size:0.85rem;">这个成就是你选择的证明——每一个结局都反映了你的价值观和选择。</span>
    `);

            renderOptions([{
                label: '🔙 返回结局',
                ending: true,
                action: function () {
                    if (state._waitingConfirm) return;
                    renderEndingContent(type);
                }
            }]);
        }

        // ================================================================
        //  重置函数
        // ================================================================

        function resetChapter2() {
            if (state.gameOver) state.gameOver = false;
            state.ch2 = {
                phase: 'market',    // 改为 'market' 作为初始场景
                boughtItems: [],
                boughtIncense: false,
                boughtWater: false,
                boughtAmulet: false,
                boughtCompass: false,
                boughtSausage: false,
                boughtFridge: false,
                boughtNothing: false,
                joinedYoushen: false,
                km: 0,
                dragonReductionPerStep: 0,
                hasTriggeredComedy: false,
                passerbyCount: 0,
                comedyReady: false,
                comedyShown: false,
                lastMessage: null,
                hasAwakeningVisited: false,
                hasAwakeningCharm: false,
                awakeningTrust: 0,
                // 新增字段
                pathChosen: null,
                mainProgress: 0,
                forestProgress: 0,
                altarProgress: 0,
                hasStrawSandals: false,
                hasDryFood: false,
                hasAltarDagger: false,
                hasSteleFragment: false,
                hasDiary: false,
                hasCliffHint: false,
                hasTempleHint: false,

                    hermit: false,

                },

                },
                altarEncountered: {
                    site: false,
                    carving: false,
                },
                crossroadsVisited: false,
                hiddenCaveVisited: false,
                cliffVisited: false,
                templeGateOpened: false,
            };
            state.flags.chapter2 = true;
            state.stamina = state.maxStamina;
            state.actionsToday = 0;
            state._waitingConfirm = false;
            state._confirmResolve = null;
            document.getElementById('rule-notification').classList.remove('show');
            updateUI();
            setStory(`
                <span class="title-line">🔄 重新开始第二章</span>
                <span class="divider">—— —— ——</span>
                你回到了山前，准备再次踏上邱龙山道。这一次，你带着之前的经验与规则，希望能走得更远。
                <span style="color:var(--text-muted);font-size:0.85rem;">你已收集 ${state.rules.length} 条规则，龙化值 ${clamp(state.dragonization, 0, 100)}%。</span>
            `);
            renderChapter2();
        }

        function resetToChapter1() {
            if (state.gameOver) state.gameOver = false;
            // 重置所有剧情状态（保留规则、龙化、桃木吊坠）
            state.day = 1;
            state.stamina = 3;
            state.actionsToday = 0;
            state.weekCount = 0;
            state.flags = {
                hasSleptInVillage: false,
                folkloreWarned: false,
                shopRhymeIndex: 0,
                chapter2: false,
                hasPeachWood: false,  // resetToChapter1 中保留 state.flags.hasPeachWood
                abandonedCompleteReady: false,
                abandonedHiddenTriggered: false,
                abandonedVisitCount: 0,
                hidden_hasBookmark: false,
                hidden_hasBrand: false,
                hidden_sleepCount: 0,
                hidden_teaCount: 0,
                hidden_answeredCode: false,
                hidden_unlocked: false,

                    day2_grayLine_triggered: false,

                    hasClue: false,

                oldLadyQuest: {

                    hasAmulet: false,
                },
                pressure: {

                        day6_triggered: false,
                    },
                    lastWarnDay: 0,
                    forcedAction: false,
                    hasTempleWarning: false,

            };
            state.ch2 = {
                phase: 'market',    // 改为 'market' 作为初始场景
                boughtItems: [],
                boughtIncense: false,
                boughtWater: false,
                boughtAmulet: false,
                boughtCompass: false,
                boughtSausage: false,
                boughtFridge: false,
                boughtNothing: false,
                joinedYoushen: false,
                km: 0,
                dragonReductionPerStep: 0,
                hasTriggeredComedy: false,
                passerbyCount: 0,
                comedyReady: false,
                comedyShown: false,
                lastMessage: null,
                hasAwakeningVisited: false,
                hasAwakeningCharm: false,
                awakeningTrust: 0,
                // 新增字段
                pathChosen: null,
                mainProgress: 0,
                forestProgress: 0,
                altarProgress: 0,
                hasStrawSandals: false,
                hasDryFood: false,
                hasAltarDagger: false,
                hasSteleFragment: false,
                hasDiary: false,
                hasCliffHint: false,
                hasTempleHint: false,

                },
                forestEncountered: {

                    campfire: false,

                    carving: false,
                },
                crossroadsVisited: false,
                hiddenCaveVisited: false,
                cliffVisited: false,
                templeGateOpened: false,
            };
            state._waitingConfirm = false;
            state._confirmResolve = null;
            document.getElementById('rule-notification').classList.remove('show');
            updateUI();
            setStory(`
                <span class="title-line">🏠 回到第一章开头</span>
                <span class="divider">—— —— ——</span>
                你回到了邱龙村。村口的木牌依然斑驳，空气中依然弥漫着菌菇与泥土的气息。
                但这一次，你带着更多的经验和规则，对这座村庄有了更深的理解。
                <span style="color:var(--text-muted);font-size:0.85rem;">你已收集 ${state.rules.length} 条规则，龙化值 ${clamp(state.dragonization, 0, 100)}%。</span>
                <span class="divider">· · ·</span>
                你决定再次探索村庄，收集更多线索，为再次登山做准备。
            `);
            renderMainOptions();
        }

        function resetGame() {
            state.day = 1;
            state.stamina = 3;
            state.dragonization = 0;
            state.rules = [];
            state.flags = {
                hasSleptInVillage: false,
                folkloreWarned: false,

                hasYinBloodPotion: false,

                },
                awakening: {

                    visited: false,
                    trustLevel: 0,

                },

                    piecesFound: 0,
                    hasClue: false,

                },

                        day6_triggered: false,
                    },

                    forcedAction: false,
                    hasTempleWarning: false,
                },
            };
            state.actionsToday = 0;
            state.weekCount = 0;
            state.gameOver = false;
            state.newRuleCount = 0;
            state.ch2 = {
                phase: 'market',    // 改为 'market' 作为初始场景
                boughtItems: [],
                boughtIncense: false,
                boughtWater: false,
                boughtAmulet: false,
                boughtCompass: false,
                boughtSausage: false,
                boughtFridge: false,
                boughtNothing: false,
                joinedYoushen: false,
                km: 0,
                dragonReductionPerStep: 0,
                hasTriggeredComedy: false,
                passerbyCount: 0,
                comedyReady: false,
                comedyShown: false,
                lastMessage: null,
                hasAwakeningVisited: false,
                hasAwakeningCharm: false,

                // 新增字段
                pathChosen: null,
                mainProgress: 0,
                forestProgress: 0,
                altarProgress: 0,
                hasStrawSandals: false,
                hasDryFood: false,
                hasAltarDagger: false,
                hasSteleFragment: false,
                hasDiary: false,
                hasCliffHint: false,
                hasTempleHint: false,
                mainEncountered: {
                    hermit: false,
                    teaStall: false,
                },
                forestEncountered: {
                    shrine: false,
                    campfire: false,
                    creature: false,
                },
                altarEncountered: {
                    site: false,
                    carving: false,
                },
                crossroadsVisited: false,
                hiddenCaveVisited: false,
                cliffVisited: false,
                templeGateOpened: false,
            };
            state._waitingConfirm = false;
            state._confirmResolve = null;
            document.getElementById('rule-notification').classList.remove('show');
            updateUI();
            goToScene('intro');
        }

        // ---------- 规则面板切换 ----------
        let rulesPanelOpen = false;
        document.getElementById('rulesToggle').addEventListener('click', () => { toggleRulesPanel(); });
        document.getElementById('rulesToggleBtn').addEventListener('click', () => { toggleRulesPanel(); });

        function toggleRulesPanel() {
            rulesPanelOpen = !rulesPanelOpen;
            document.getElementById('rules-panel').classList.toggle('open', rulesPanelOpen);
            if (rulesPanelOpen) {
                state.newRuleCount = state.rules.length;
                updateUI();
            }
        }

        // ---------- 初始化 ----------
        function init() {
            resetGame();
        }
        window.onload = init;
    </script>
