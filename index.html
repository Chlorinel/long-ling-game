<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙岭观前坑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --bg-primary: #0d0a08;
            --bg-card: #1a1410;
            --bg-panel: #241e18;
            --border-gold: #8b7a4a;
            --text-primary: #e8ddd0;
            --text-muted: #a8957a;
            --text-gold: #d4b87a;
            --red-bright: #8a2a2a;
            --font-serif: 'Noto Serif SC', '华文楷体', 'KaiTi', serif;
            --font-title: 'Ma Shan Zheng', '华文楷体', cursive;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(60, 30, 20, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 50%, rgba(30, 20, 50, 0.3) 0%, transparent 70%);
        }

        #game-container {
            width: 100%;
            max-width: 860px;
            height: 96vh;
            max-height: 820px;
            /* ⭐ 用图片替代深红色背景，加上暗色遮罩让内容清晰可读 */
            background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0.85) 50%, rgba(0, 0, 0, 0.9) 100%),
                url('image/container-bg.jpg') center center / cover no-repeat;
            background-blend-mode: overlay, normal;
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        #status-bar {
            background: linear-gradient(180deg, #1f1812 0%, #16100c 100%);
            border-bottom: 1px solid var(--border-gold);
            padding: 8px 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4px 12px;
            flex-shrink: 0;
            z-index: 1;
            position: relative;
        }

        #status-bar .title {
            font-family: var(--font-title);
            font-size: 1.2rem;
            color: var(--text-gold);
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(180, 140, 80, 0.2);
            white-space: nowrap;
        }

        .status-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 12px;
            font-size: 0.75rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
        }

        .status-item .label {
            opacity: 0.7;
        }

        .status-item .value {
            color: var(--text-primary);
            font-weight: 700;
            min-width: 18px;
        }

        .stamina-dots {
            display: flex;
            gap: 3px;
        }

        .stamina-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            background: #2a221a;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .stamina-dot.filled {
            background: #4a7a4a;
            border-color: #6aaa6a;
            box-shadow: 0 0 10px rgba(74, 122, 74, 0.3);
            color: #b0e0b0;
        }

        .stamina-dot.spent {
            opacity: 0.2;
            background: #1a1410;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bar-track {
            width: 60px;
            height: 5px;
            background: #2a221a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #3a322a;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .bar-fill.dragon {
            background: linear-gradient(90deg, #4a7a4a, #8a5a3a, #aa4a2a);
        }

        .bar-fill.sanity {
            background: linear-gradient(90deg, #4a5a8a, #7a8aaa, #aac0e0);
        }

        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
            padding: 0 18px 0 18px;
        }

        #story-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 10px 10px 10px;
            scroll-behavior: smooth;
        }

        #story-area::-webkit-scrollbar {
            width: 4px;
        }

        #story-area::-webkit-scrollbar-track {
            background: #1a1410;
        }

        #story-area::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
            transition: background 0.5s, color 0.5s;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 0 -6px;
        }

        .story-text .highlight {
            color: var(--text-gold);
        }

        .story-text .danger {
            color: #d45a5a;
        }

        .story-text .rule-text {
            display: block;
            padding: 6px 14px;
            margin: 5px 0;
            border-left: 3px solid var(--text-gold);
            background: rgba(180, 140, 80, 0.06);
            font-size: 0.9rem;
            color: #d4c8b0;
        }

        .story-text .divider {
            display: block;
            text-align: center;
            color: var(--text-muted);
            margin: 10px 0;
            letter-spacing: 6px;
            opacity: 0.4;
        }

        .story-text .title-line {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--text-gold);
            text-align: center;
            margin: 8px 0 12px 0;
            letter-spacing: 2px;
        }

        .story-text .nursery-rhyme {
            display: block;
            padding: 10px 14px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-radius: 6px;
            font-style: italic;
            color: #d4c8b0;
            line-height: 2;
            white-space: pre-line;
        }

        .story-text .ending-title {
            font-size: 1.8rem;
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
        }

        .story-text .info-box {
            display: block;
            padding: 8px 14px;
            margin: 6px 0;
            border-left: 3px solid #6a8aaa;
            background: rgba(100, 130, 170, 0.06);
            font-size: 0.9rem;
            color: #b0c8d8;
        }

        .story-text .km-progress {
            display: block;
            text-align: center;
            color: var(--text-gold);
            font-size: 0.85rem;
            margin: 4px 0;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .story-text .comedy-box {
            display: block;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(180, 140, 80, 0.12);
            border-radius: 8px;
            border: 1px solid var(--border-gold);
            color: #d4c8b0;
            line-height: 2;
        }

        .story-text .feedback {
            display: block;
            padding: 8px 12px;
            margin: 6px 0;
            background: rgba(180, 140, 80, 0.08);
            border-left: 3px solid var(--text-gold);
            color: var(--text-gold);
            font-weight: 500;
        }

        /* ===== 结局配色 ===== */
        /* HE - 暖金色 */
        .story-text.ending-he {
            background: #d4c8a0;
            color: #3a2a1a;
        }

        .story-text.ending-he .ending-title {
            color: #5a3a1a;
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-he .divider {
            color: #8a7a5a;
        }

        .story-text.ending-he .rule-text {
            background: rgba(200, 180, 150, 0.2);
            border-left-color: #8a7a5a;
            color: #3a2a1a;
        }

        .story-text.ending-he .highlight {
            color: #5a3a1a;
        }

        /* BE2 大不敬 - 暗红底深红字 */
        .story-text.ending-be2 {
            background: #2a0a0a;
            color: #8a2a2a;
        }

        .story-text.ending-be2 .ending-title {
            color: #aa2a2a;
            text-shadow: 0 0 40px rgba(200, 30, 30, 0.5);
        }

        .story-text.ending-be2 .divider {
            color: #4a1a1a;
        }

        .story-text.ending-be2 .rule-text {
            background: rgba(80, 20, 20, 0.2);
            border-left-color: #8a2a2a;
            color: #aa4a4a;
        }

        .story-text.ending-be2 .highlight {
            color: #aa4a4a;
        }

        /* BE3 惊扰 - 暗紫底紫红字 */
        .story-text.ending-be3 {
            background: #1a0a1a;
            color: #7a2a6a;
        }

        .story-text.ending-be3 .ending-title {
            color: #aa2a8a;
            text-shadow: 0 0 40px rgba(180, 30, 150, 0.5);
        }

        .story-text.ending-be3 .divider {
            color: #3a1a3a;
        }

        .story-text.ending-be3 .rule-text {
            background: rgba(60, 20, 50, 0.2);
            border-left-color: #8a2a7a;
            color: #9a4a8a;
        }

        .story-text.ending-be3 .highlight {
            color: #aa4a9a;
        }

        /* BE4 半途而废 - 暗灰底深灰字 */
        .story-text.ending-be4 {
            background: #141414;
            color: #5a5a5a;
        }

        .story-text.ending-be4 .ending-title {
            color: #7a7a7a;
            text-shadow: 0 0 30px rgba(100, 100, 100, 0.3);
        }

        .story-text.ending-be4 .divider {
            color: #2a2a2a;
        }

        .story-text.ending-be4 .rule-text {
            background: rgba(40, 40, 40, 0.2);
            border-left-color: #5a5a5a;
            color: #6a6a6a;
        }

        .story-text.ending-be4 .highlight {
            color: #7a7a7a;
        }

        /* 老实人 - 暗绿 */
        .story-text.ending-normal {
            background: #0a1a0a;
            color: #3a5a3a;
        }

        .story-text.ending-normal .ending-title {
            color: #4a7a4a;
            text-shadow: 0 0 30px rgba(60, 160, 60, 0.3);
        }

        .story-text.ending-normal .divider {
            color: #1a2a1a;
        }

        .story-text.ending-normal .rule-text {
            background: rgba(30, 60, 30, 0.2);
            border-left-color: #4a7a4a;
            color: #4a6a4a;
        }

        .story-text.ending-normal .highlight {
            color: #5a8a5a;
        }

        /* 龙化过高 - 暗红亮红 */
        .story-text.ending-dragon {
            background: #1a0505;
            color: #aa3a2a;
        }

        .story-text.ending-dragon .ending-title {
            color: #cc3a2a;
            text-shadow: 0 0 50px rgba(220, 50, 30, 0.6);
        }

        .story-text.ending-dragon .divider {
            color: #3a1a1a;
        }

        .story-text.ending-dragon .rule-text {
            background: rgba(80, 20, 10, 0.2);
            border-left-color: #aa3a2a;
            color: #cc5a4a;
        }

        .story-text.ending-dragon .highlight {
            color: #dd5a4a;
        }

        /* 被龙化 - 暗金 */
        .story-text.ending-corrupted {
            background: #1a1208;
            color: #aa8a3a;
        }

        .story-text.ending-corrupted .ending-title {
            color: #ccaa3a;
            text-shadow: 0 0 40px rgba(200, 170, 50, 0.5);
        }

        .story-text.ending-corrupted .divider {
            color: #3a2a1a;
        }

        .story-text.ending-corrupted .rule-text {
            background: rgba(80, 60, 20, 0.2);
            border-left-color: #aa8a3a;
            color: #bb9a4a;
        }

        .story-text.ending-corrupted .highlight {
            color: #ccaa5a;
        }

        /* BE8 被吞没 - 淡青底 */
        .story-text.ending-be8 {
            background: #0f1a1a;
            color: #7a9a9a;
        }

        .story-text.ending-be8 .ending-title {
            color: #8ababa;
            text-shadow: 0 0 40px rgba(100, 200, 200, 0.2);
        }

        .story-text.ending-be8 .divider {
            color: #2a4a4a;
        }

        .story-text.ending-be8 .rule-text {
            background: rgba(60, 120, 120, 0.08);
            border-left-color: #6aaaaa;
            color: #8abbc0;
        }

        .story-text.ending-be8 .highlight {
            color: #8abbc0;
        }

        /* 第三章 - 原色 */
        .story-text.ending-chapter3 {
            background: transparent;
            color: var(--text-primary);
        }

        .story-text.ending-chapter3 .ending-title {
            color: var(--text-gold);
            text-shadow: 0 0 30px rgba(180, 140, 80, 0.3);
        }

        .story-text.ending-chapter3 .divider {
            color: var(--text-muted);
        }

        .story-text.ending-chapter3 .rule-text {
            background: rgba(180, 140, 80, 0.06);
            border-left-color: var(--text-gold);
            color: #d4c8b0;
        }

        .story-text.ending-chapter3 .highlight {
            color: var(--text-gold);
        }

        #rule-notification {
            background: rgba(26, 20, 16, 0.95);
            border: 1px solid var(--text-gold);
            border-radius: 8px;
            padding: 10px 16px;
            margin: 6px 0 8px 0;
            display: none;
            animation: fadeSlide 0.5s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #rule-notification.show {
            display: block;
        }

        #rule-notification .rule-title {
            color: var(--text-gold);
            font-weight: 700;
            font-size: 0.85rem;
        }

        #rule-notification .rule-body {
            font-size: 0.82rem;
            color: var(--text-primary);
            margin-top: 3px;
            line-height: 1.6;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #options-area {
            padding: 8px 0 14px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.15);
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 50px;
        }

        .option-btn {
            background: rgba(30, 24, 18, 0.8);
            border: 1px solid #3a322a;
            border-radius: 6px;
            padding: 9px 14px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 0.88rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            background: rgba(60, 50, 40, 0.8);
            border-color: var(--border-gold);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(139, 122, 74, 0.08);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn .hint {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-left: 6px;
            opacity: 0.6;
        }

        .option-btn .cost {
            float: right;
            color: var(--text-muted);
            font-size: 0.65rem;
            opacity: 0.5;
        }

        .option-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .option-btn .tag {
            display: inline-block;
            font-size: 0.55rem;
            background: rgba(139, 122, 74, 0.2);
            border-radius: 3px;
            padding: 0 6px;
            margin-left: 4px;
            color: var(--text-gold);
        }

        .option-btn.confirm-btn {
            border-color: var(--text-gold);
            background: rgba(180, 140, 80, 0.15);
            text-align: center;
            font-weight: 700;
            color: var(--text-gold);
            font-size: 1rem;
            padding: 12px 14px;
        }

        .option-btn.confirm-btn:hover {
            background: rgba(180, 140, 80, 0.25);
            transform: scale(1.01);
        }

        .option-btn.ending-btn {
            border-color: #6a4a3a;
            background: rgba(100, 60, 40, 0.15);
            text-align: center;
        }

        .option-btn.ending-btn:hover {
            background: rgba(100, 60, 40, 0.25);
        }

        #rules-panel {
            background: rgba(16, 12, 10, 0.98);
            border-top: 1px solid var(--border-gold);
            flex-shrink: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            position: relative;
        }

        #rules-panel.open {
            max-height: 300px;
            overflow-y: auto;
        }

        #rules-panel::-webkit-scrollbar {
            width: 3px;
        }

        #rules-panel::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        #rules-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(139, 122, 74, 0.15);
            cursor: pointer;
            user-select: none;
        }

        #rules-panel .panel-header:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        #rules-panel .panel-header .title {
            color: var(--text-gold);
            font-size: 0.82rem;
            letter-spacing: 2px;
        }

        #rules-panel .panel-header .count {
            color: var(--text-muted);
            font-size: 0.72rem;
        }

        #rules-panel .panel-body {
            padding: 8px 18px 14px 18px;
        }

        .rule-entry {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(139, 122, 74, 0.06);
            font-size: 0.78rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .rule-entry .num {
            color: var(--text-gold);
            font-weight: 700;
            flex-shrink: 0;
            width: 20px;
        }

        .rule-entry .content {
            color: var(--text-primary);
        }

        .rule-entry .content .new-tag {
            color: #6ab06a;
            font-size: 0.55rem;
            margin-left: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #footer-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 18px 6px 18px;
            flex-shrink: 0;
            border-top: 1px solid rgba(139, 122, 74, 0.08);
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
            gap: 6px;
            flex-wrap: wrap;
        }

        #footer-tools .left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        #footer-tools .left .day-info {
            color: var(--text-gold);
        }

        .toggle-rules-btn {
            background: none;
            border: 1px solid var(--border-gold);
            color: var(--text-muted);
            padding: 3px 12px;
            border-radius: 4px;
            font-family: var(--font-serif);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-rules-btn:hover {
            background: rgba(139, 122, 74, 0.1);
            color: var(--text-gold);
        }

        .toggle-rules-btn .badge {
            background: var(--red-bright);
            color: #fff;
            border-radius: 50%;
            padding: 0 5px;
            font-size: 0.55rem;
            margin-left: 3px;
        }

        /* ================================================================
   主菜单 - 道观秘卷 · 重制版
   ================================================================ */

        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 30px 20px;
            overflow: hidden;
            /* ⭐ 只有图片 + 暗色遮罩（去掉原来的深红渐变） */
            background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.8) 50%, rgba(0, 0, 0, 0.9) 100%),
                url('image/main1.jpg') center center / cover no-repeat;
            background-blend-mode: overlay, normal;
            transition: none;
        }

        /* ---- 龙鳞光晕（动态呼吸） ---- */
        #main-menu::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 35% 50%, rgba(180, 100, 60, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(160, 120, 80, 0.04) 0%, transparent 40%);
            animation: menuAura 10s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes menuAura {
            0% {
                transform: scale(1) rotate(-3deg);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.15) rotate(3deg);
                opacity: 1;
            }
        }

        /* ---- 龙鳞暗纹（旋转） ---- */
        #main-menu::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-conic-gradient(from 0deg at 50% 80%,
                    transparent 0deg,
                    rgba(139, 122, 74, 0.012) 2deg,
                    transparent 4deg,
                    transparent 6deg);
            pointer-events: none;
            z-index: 0;
            animation: scaleRotate 30s linear infinite;
        }

        @keyframes scaleRotate {
            0% {
                transform: scale(1) rotate(0deg);
            }

            100% {
                transform: scale(1.5) rotate(360deg);
            }
        }

        /* ---- 四角卦纹装饰（更精致） ---- */
        .menu-corner {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            color: var(--border-gold);
            font-size: 1.4rem;
            opacity: 0.15;
            font-family: var(--font-title);
            letter-spacing: 4px;
        }

        .menu-corner.tl {
            top: 20px;
            left: 28px;
        }

        .menu-corner.tr {
            top: 20px;
            right: 28px;
            transform: scaleX(-1);
        }

        .menu-corner.bl {
            bottom: 20px;
            left: 28px;
            transform: scaleY(-1);
        }

        .menu-corner.br {
            bottom: 20px;
            right: 28px;
            transform: scale(-1, -1);
        }

        /* 内圈细线（更高级） */
        .menu-corner .line {
            display: block;
            width: 30px;
            height: 1px;
            background: var(--border-gold);
            opacity: 0.3;
            margin: 4px auto;
        }

        /* ---- 漂浮粒子（升级版：金色微尘） ---- */
        /* ---- 金色细碎粒子（升级版） ---- */
        .menu-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(circle at 30% 30%,
                    rgba(220, 200, 160, 0.8),
                    rgba(180, 150, 100, 0.2));
            box-shadow: 0 0 8px rgba(200, 180, 150, 0.15),
                0 0 20px rgba(200, 180, 150, 0.04);
            animation: floatParticle linear infinite;
            will-change: transform, opacity;
        }

        /* 不同尺寸的粒子（更细碎） */
        .menu-particle.p1 {
            width: 2px;
            height: 2px;
            animation-duration: 16s;
        }

        .menu-particle.p2 {
            width: 1.5px;
            height: 1.5px;
            animation-duration: 20s;
            opacity: 0.6;
        }

        .menu-particle.p3 {
            width: 3px;
            height: 3px;
            animation-duration: 13s;
            opacity: 0.5;
        }

        .menu-particle.p4 {
            width: 1px;
            height: 1px;
            animation-duration: 24s;
            opacity: 0.7;
        }

        .menu-particle.p5 {
            width: 2.5px;
            height: 2.5px;
            animation-duration: 18s;
            opacity: 0.4;
        }

        .menu-particle.p6 {
            width: 1.8px;
            height: 1.8px;
            animation-duration: 22s;
            opacity: 0.5;
        }

        .menu-particle.p7 {
            width: 2.2px;
            height: 2.2px;
            animation-duration: 15s;
            opacity: 0.6;
        }

        .menu-particle.p8 {
            width: 1.2px;
            height: 1.2px;
            animation-duration: 26s;
            opacity: 0.7;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(0) translateX(0) scale(0);
                opacity: 0;
            }

            12% {
                opacity: 1;
                transform: translateY(-10px) translateX(4px) scale(1);
            }

            88% {
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) translateX(20px) scale(0.2);
                opacity: 0;
            }
        }

        /* 额外闪烁光晕（让粒子更有“金粉”感） */
        .menu-particle::after {
            content: '';
            position: absolute;
            top: -200%;
            left: -200%;
            width: 500%;
            height: 500%;
            background: radial-gradient(circle at 30% 30%,
                    rgba(255, 235, 200, 0.3),
                    transparent 70%);

        }

        @keyframes sparkle {
            0% {
                opacity: 0.2;
                transform: scale(0.5);
            }

            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* ---- 顶部徽记 ---- */
        #main-menu .menu-icon-top {

        #main-menu .menu-divider {

        /* ---- 按钮容器 ---- */

        /* ---- 按钮样式（古木令牌 + 悬停点亮） ---- */
        .menu-btn {

        /* 悬停效果：左边界点亮 + 上浮 + 光晕 */

            border-color: rgba(180, 140, 80, 0.4);

        /* 按钮图标和文字 */

        /* 清除缓存按钮特殊样式（保留红边提示，但更协调） */
        #btn-clear-cache {
            border-left-color: rgba(180, 80, 80, 0.2);

        #btn-clear-cache:hover {

        .menu-btn.disabled {

        /* ---- 底部龙纹脚注 ---- */
        #main-menu .menu-footer {

        #main-menu .menu-footer .dot {

        #main-menu .menu-footer .dragon-icon {

        /* ---- 响应式适配 ---- */

            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 215, 150, 0.08);
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 220, 160, 0.06), transparent 60%);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 0;
        }

        .menu-btn:hover::before {
            opacity: 1;
        }

        .menu-btn:hover {
            border-image: linear-gradient(135deg, rgba(200, 170, 100, 0.8), rgba(180, 140, 80, 0.1)) 1;
            box-shadow:
                0 12px 48px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(180, 140, 80, 0.08),
                inset 0 1px 0 rgba(255, 215, 150, 0.15);
            transform: translateY(-4px) translateX(6px) scale(1.01);
        }

        /* ---- 4. 故事文本“烛光”照明 ---- */
        #story-area {
            mask-image: radial-gradient(ellipse at 50% 30%, black 60%, transparent 90%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 60%, transparent 90%);
        }

        .story-text {
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9), 0 0 30px rgba(180, 140, 80, 0.02);
            background: radial-gradient(ellipse at 50% 20%, rgba(180, 140, 80, 0.04), transparent 70%);
            border-radius: 12px;
            padding: 16px 20px;
        }

        /* ---- 5. 体力圆点“宝石光效” ---- */
        .stamina-dot.filled {
            background: radial-gradient(circle at 35% 35%, #8ad88a, #3a7a3a);
            box-shadow: 0 0 12px rgba(74, 200, 74, 0.4), inset 0 -2px 4px rgba(0, 0, 0, 0.3);
            border-color: #8ada8a;
        }

        /* ---- 6. 进度条“霓虹管”效果 ---- */
        .bar-track {
            background: rgba(20, 16, 12, 0.8);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(80, 70, 50, 0.3);
        }

        .bar-fill.dragon {
            background: linear-gradient(90deg, #2a5a2a, #aa5a2a, #cc3a1a);
            box-shadow: 0 0 16px rgba(200, 80, 30, 0.3), inset 0 2px 4px rgba(255, 200, 150, 0.2);
        }

        .bar-fill.sanity {
            background: linear-gradient(90deg, #2a4a7a, #6a8aaa, #aac0e0);
            box-shadow: 0 0 16px rgba(60, 120, 200, 0.25), inset 0 2px 4px rgba(200, 230, 255, 0.2);
        }

        /* ---- 7. 选项按钮“光追”点击涟漪 ---- */
        .option-btn {
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-left: 2px solid transparent;
            transition: all 0.3s ease, border-color 0.4s ease;
        }

        .option-btn::after {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(200, 180, 150, 0.06), transparent 50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .option-btn:hover::after {
            opacity: 1;
        }

        .option-btn:hover {
            border-left-color: var(--text-gold);
            box-shadow: 0 0 30px rgba(180, 140, 80, 0.06), inset 0 0 40px rgba(180, 140, 80, 0.02);
            transform: translateX(6px) scale(1.01);
        }

        /* ---- 8. 规则面板“景深”模糊 ---- */
        #rules-panel {
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            background: rgba(10, 6, 4, 0.85);
            border-top: 1px solid rgba(180, 140, 80, 0.15);
        }

        /* ---- 9. 主菜单动态光晕（加强版） ---- */
        #main-menu::before {
            background:
                radial-gradient(ellipse at 30% 40%, rgba(200, 120, 60, 0.10), transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(160, 120, 80, 0.06), transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(180, 80, 40, 0.04), transparent 30%);
            animation: menuAura 8s ease-in-out infinite alternate;
        }

        @keyframes menuAura {
            0% {
                transform: scale(1) rotate(-2deg) translateX(-10px);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.2) rotate(2deg) translateX(10px);
                opacity: 1;
            }
        }

        /* ---- 10. 粒子“光追”拖尾 ---- */
        .menu-particle {
            background: radial-gradient(circle at 30% 30%, rgba(255, 235, 200, 0.9), rgba(200, 180, 150, 0.1));
            box-shadow: 0 0 20px rgba(200, 180, 150, 0.2), 0 0 60px rgba(200, 180, 150, 0.04);
            filter: blur(0.5px);
        }

        /* ---- 11. 分割线“光刃”效果 ---- */
        #main-menu .menu-divider .line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 180, 150, 0.4), rgba(200, 180, 150, 0.8), rgba(200, 180, 150, 0.4), transparent);
            box-shadow: 0 0 12px rgba(180, 140, 80, 0.1);
        }

        /* ---- 12. 响应式微调 ---- */
        @media (max-width: 640px) {
            #game-container {
                box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.8);
            }

            .story-text {
                background: radial-gradient(ellipse at 50% 20%, rgba(180, 140, 80, 0.02), transparent 70%);
            }
        }

        /* ===== 第三章 · 交互式道观地图 ===== */
        #ch3-map-container {
            background: rgba(10, 6, 4, 0.85);
            border: 1px solid rgba(139, 122, 74, 0.2);
            border-radius: 12px;
            padding: 16px 20px 20px 20px;
            margin: 8px 0 12px 0;
            position: relative;
            backdrop-filter: blur(8px);
        }

        #ch3-map-container .map-title {
            font-family: var(--font-title);
            color: var(--text-gold);
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        #ch3-map-container .map-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            max-width: 480px;
            margin: 0 auto;
        }

        #ch3-map-container .map-cell {
            padding: 10px 6px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid rgba(139, 122, 74, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(26, 20, 16, 0.5);
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        #ch3-map-container .map-cell .cell-icon {
            font-size: 1.4rem;
        }

        #ch3-map-container .map-cell .cell-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        #ch3-map-container .map-cell .cell-status {
            font-size: 0.5rem;
            letter-spacing: 1px;
        }

        #ch3-map-container .map-cell:hover:not(.locked) {
            border-color: var(--text-gold);
            background: rgba(60, 50, 40, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        #ch3-map-container .map-cell.explored {
            border-color: #4a7a4a;
            background: rgba(74, 122, 74, 0.15);
        }

        #ch3-map-container .map-cell.explored .cell-status {
            color: #6ab06a;
        }

        #ch3-map-container .map-cell.current {
            border-color: var(--text-gold);
            background: rgba(180, 140, 80, 0.15);
            box-shadow: 0 0 30px rgba(180, 140, 80, 0.08);
        }

        #ch3-map-container .map-cell.locked {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        #ch3-map-container .map-cell .cell-badge {
            font-size: 0.4rem;
            background: rgba(180, 140, 80, 0.2);
            border-radius: 8px;
            padding: 0 6px;
            color: var(--text-gold);
            margin-top: 1px;
        }

        /* ---- 地图连接线（装饰） ---- */
        #ch3-map-container .map-connections {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
            height: 10px;
            display: flex;
            justify-content: space-between;
            padding: 0 18px;
        }

        #ch3-map-container .map-connections .conn {
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent, rgba(139, 122, 74, 0.15), transparent);
        }

        /* ---- 探索进度条 ---- */
        #ch3-map-container .map-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        #ch3-map-container .map-progress .bar {
            width: 120px;
            height: 3px;
            background: #2a221a;
            border-radius: 4px;
            overflow: hidden;
        }

        #ch3-map-container .map-progress .bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #4a7a4a, #d4b87a);
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        /* ================================================================
   守卷人剪影（主菜单）
   ================================================================ */
        #keeper-silhouette {
            position: absolute;
            bottom: 100px;
            right: 60px;
            z-index: 2;
            cursor: pointer;
            transition: transform 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        #keeper-silhouette:hover {
            transform: translateY(-6px) scale(1.04);
        }

        .keeper-figure {
            width: 80px;
            height: 120px;
            background: radial-gradient(ellipse at 30% 40%, rgba(200, 180, 150, 0.15), rgba(120, 100, 80, 0.05));
            border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
            position: relative;
            box-shadow: 0 0 40px rgba(180, 140, 80, 0.08), inset 0 -20px 30px rgba(0, 0, 0, 0.3);
            animation: keeperBreath 4s ease-in-out infinite;
            border: 1px solid rgba(139, 122, 74, 0.15);
        }

        /* 头部（剪影） */
        .keeper-figure::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 34px;
            height: 34px;
            background: radial-gradient(circle at 40% 30%, rgba(200, 180, 150, 0.12), rgba(100, 80, 60, 0.08));
            border-radius: 50%;
            border: 1px solid rgba(139, 122, 74, 0.1);
        }

        /* 身体（道袍轮廓） */
        .keeper-figure::after {
            content: '';
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 70px;
            background: radial-gradient(ellipse at 50% 30%, rgba(200, 180, 150, 0.08), transparent 70%);
            border-radius: 20% 20% 40% 40% / 30% 30% 50% 50%;
            border: 1px solid rgba(139, 122, 74, 0.06);
        }

        /* 呼吸动画 */
        @keyframes keeperBreath {

            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }

            50% {
                opacity: 0.9;
                transform: scale(1.03);
            }
        }

        /* 守卷人状态文字 */
        .keeper-status {
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            opacity: 0.5;
            transition: opacity 0.5s;
            text-align: center;
            font-family: var(--font-serif);
        }

        #keeper-silhouette:hover .keeper-status {
            opacity: 0.9;
            color: var(--text-gold);
        }

        /* 光晕提示（第四章解锁时） */
        #keeper-silhouette.glow::after {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 140, 80, 0.15), transparent 70%);
            animation: keeperGlow 2s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes keeperGlow {
            0% {
                opacity: 0.3;
                transform: scale(0.9);
            }

            100% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }

        /* ================================================================
   守卷人模态框
   ================================================================ */
        #keeper-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: modalFadeIn 0.5s ease;
        }

        #keeper-modal.active {
            display: flex;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .keeper-modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .keeper-modal-box {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            max-height: 80vh;
            background: linear-gradient(180deg, #1f1812, #0d0a08);
            border: 1px solid var(--border-gold);
            border-radius: 16px;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(180, 140, 80, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .keeper-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            border-bottom: 1px solid rgba(139, 122, 74, 0.15);
            flex-shrink: 0;
            background: rgba(10, 6, 4, 0.5);
        }

        .keeper-modal-title {
            font-family: var(--font-title);
            font-size: 1.1rem;
            color: var(--text-gold);
            letter-spacing: 3px;
        }

        .keeper-modal-title span {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-family: var(--font-serif);
        }

        .keeper-modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .keeper-modal-close:hover {
            color: var(--text-gold);
            background: rgba(139, 122, 74, 0.1);
        }

        .keeper-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            scroll-behavior: smooth;
            font-size: 0.95rem;
            line-height: 1.9;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .keeper-modal-body::-webkit-scrollbar {
            width: 4px;
        }

        .keeper-modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .keeper-modal-body::-webkit-scrollbar-thumb {
            background: var(--border-gold);
            border-radius: 4px;
        }

        /* 内嵌画廊（在守卷人对话中） */
        #keeper-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 12px;
            padding: 4px 0;
        }

        .keeper-gallery-card {
            background: rgba(26, 20, 16, 0.6);
            border: 1px solid rgba(139, 122, 74, 0.12);
            border-radius: 8px;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .keeper-gallery-card:hover:not(.locked) {
            border-color: var(--text-gold);
            background: rgba(60, 50, 40, 0.5);
            transform: translateY(-2px);
        }

        .keeper-gallery-card.locked {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        .keeper-gallery-card .card-icon {
            font-size: 1.6rem;
        }

        .keeper-gallery-card .card-title {
            font-size: 0.8rem;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .keeper-gallery-card .card-subtitle {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        .keeper-gallery-card .card-lock {
            font-size: 1.2rem;
            opacity: 0.5;
        }

        .keeper-gallery-card .card-badge {
            font-size: 0.45rem;
            background: rgba(139, 122, 74, 0.2);
            color: var(--text-gold);
            padding: 1px 6px;
            border-radius: 8px;
            margin-top: 2px;
        }

        /* 守卷人专属徽章（完美结局置顶） */
        .keeper-gallery-card.perfect {
            border-color: var(--text-gold);
            box-shadow: 0 0 20px rgba(180, 140, 80, 0.15);
        }

        .keeper-modal-footer {
            padding: 12px 22px 16px 22px;
            border-top: 1px solid rgba(139, 122, 74, 0.08);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .keeper-modal-footer .keeper-option {
            background: rgba(30, 24, 18, 0.7);
            border: 1px solid rgba(139, 122, 74, 0.15);
            border-radius: 6px;
            padding: 8px 14px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .keeper-modal-footer .keeper-option:hover {
            background: rgba(60, 50, 40, 0.7);
            border-color: var(--text-gold);
            transform: translateX(4px);
        }

        .keeper-modal-footer .keeper-option .hint {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-left: 6px;
            opacity: 0.6;
        }

        .keeper-modal-footer .keeper-option .tag {
            display: inline-block;
            font-size: 0.5rem;
            background: rgba(139, 122, 74, 0.2);
            border-radius: 3px;
            padding: 0 6px;
            margin-left: 4px;
            color: var(--text-gold);
        }

        /* 响应式 */
        @media (max-width: 640px) {
            #keeper-silhouette {
                bottom: 70px;
                right: 20px;
                transform: scale(0.8);
            }

            #keeper-silhouette:hover {
                transform: scale(0.85) translateY(-4px);
            }

            .keeper-figure {
                width: 60px;
                height: 90px;
            }

            .keeper-modal-box {
                max-height: 90vh;
                border-radius: 12px;
                margin: 10px;
            }

            .keeper-modal-body {
                padding: 14px 16px;
                font-size: 0.85rem;
            }

            #keeper-gallery {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }

        /* 守卷人选项按钮完整样式 */
        .keeper-option {
            background: rgba(30, 24, 18, 0.8) !important;
            border: 1px solid rgba(139, 122, 74, 0.3) !important;
            border-radius: 6px !important;
            padding: 10px 18px !important;
            color: var(--text-primary) !important;
            font-family: var(--font-serif) !important;
            font-size: 0.9rem !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            display: inline-block !important;
            text-align: center !important;
            width: 100% !important;
            letter-spacing: 2px !important;
        }

        .keeper-option:hover {
            background: rgba(60, 50, 40, 0.8) !important;
            border-color: var(--text-gold) !important;
            transform: translateX(4px) !important;
            box-shadow: 0 0 20px rgba(180, 140, 80, 0.08) !important;
            color: var(--text-gold) !important;
        }

        .keeper-option .hint {
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-left: 6px;
            opacity: 0.6;
        }

        .keeper-option .tag {
            display: inline-block;
            font-size: 0.5rem;
            background: rgba(139, 122, 74, 0.2);
            border-radius: 3px;
            padding: 0 6px;
            margin-left: 4px;
            color: var(--text-gold);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="game-container">

        <!-- ========== 主菜单 ========== -->
        <div id="main-menu">

            <!-- ---- 金色细碎粒子（16个） ---- -->
            <div class="menu-particle p1" style="left:5%; top:75%; animation-delay:0s;"></div>

            <div class="menu-particle p6" style="left:8%; top:25%; animation-delay:9s;"></div>
            <div class="menu-particle p7" style="left:45%; top:15%; animation-delay:6.5s;"></div>
            <div class="menu-particle p8" style="left:75%; top:12%; animation-delay:5.5s;"></div>

            <!-- ---- 四角符纹 ---- -->
            <span class="menu-corner tl">◈<span class="line"></span></span>

            function closeChapterSelect() {
                document.getElementById('chapter-select-modal').style.display = 'none';

            function startFromChapter(chapter) {
                switch (chapter) {
                    case 'chapter1':
                        // 完全重置，从头开始
                        resetGame();
                        showGameContent();
                        goToScene('intro');
                        saveGame();
                        break;

                    case 'chapter2':
                        // 基于第一章完成存档，进入第二章
                        const ch1Data = loadChapterComplete('ch1_complete');
                        if (!ch1Data) {
                            alert('没有找到第一章的存档，请先完成第一章。');
                            return;
                        }
                        // 恢复第一章完成时的状态
                        restoreFromChapterData(ch1Data);
                        // 直接进入第二章
                        showGameContent();
                        enterChapter2();
                        break;

                    case 'chapter3':
                        // 基于第二章完成存档，进入第三章
                        const ch2Data = loadChapterComplete('ch2_complete');
                        if (!ch2Data) {
                            alert('没有找到第二章的存档，请先完成第二章。');
                            return;
                        }
                        // 恢复第二章完成时的状态
                        restoreFromChapterData(ch2Data);
                        // 直接进入第三章
                        showGameContent();
                        initChapter3();
                        break;

                    default:
                        break;
                }
            }

            function restoreFromChapterData(data) {
                if (!data) return;

                // 恢复核心数据
                state.day = data.day || 1;
                state.stamina = data.stamina || 3;
                state.maxStamina = data.maxStamina || 3;
                state.dragonization = data.dragonization || 0;
                state.rules = data.rules || [];
                state.weekCount = data.weekCount || 0;
                state.gameOver = false;
                state._dragonEndingQueued = false;
                state._waitingConfirm = false;
                state._confirmResolve = null;

                // 恢复 flags
                if (data.flags) {
                    state.flags = JSON.parse(JSON.stringify(data.flags));
                    // 确保 ch2 标志正确
                    state.flags.chapter2 = true;
                }

                // 恢复 medicineHut
                if (data.medicineHut) {
                    state.medicineHut = JSON.parse(JSON.stringify(data.medicineHut));
                }

                // 恢复其他标记
                if (data.villageWestDone !== undefined) state.villageWestDone = data.villageWestDone;
                if (data.medicineHutDone !== undefined) state.medicineHutDone = data.medicineHutDone;
                if (data.oldManTalkTriggered !== undefined) state.oldManTalkTriggered = data.oldManTalkTriggered;
                if (data.hasShadowSecret !== undefined) state.hasShadowSecret = data.hasShadowSecret;
                if (data.hasTaoistInfo !== undefined) state.hasTaoistInfo = data.hasTaoistInfo;
                if (data.hasDragonFollowerInfo !== undefined) state.hasDragonFollowerInfo = data.hasDragonFollowerInfo;

                // 恢复 ch2
                if (data.ch2) {
                    state.ch2 = JSON.parse(JSON.stringify(data.ch2));
                    // 确保某些关键字段存在
                    if (!state.ch2.energy) state.ch2.energy = 10;
                    if (!state.ch2.maxEnergy) state.ch2.maxEnergy = 10;
                    if (!state.ch2.position) state.ch2.position = 'tail';
                    if (!state.ch2.visitedHighestPosition) state.ch2.visitedHighestPosition = 'tail';
                }

                // 标记已进入第二章
                state.flags.chapter2 = true;
                state._lastChapter = 'chapter2';

                // 更新UI
                updateUI();
                saveGame();
            }

            function saveChapterComplete(chapter) {
                try {
                    // 保存当前游戏状态的副本（排除动态临时数据）
                    const data = {
                        // 核心数据
                        day: state.day,
                        stamina: state.stamina,
                        maxStamina: state.maxStamina,
                        dragonization: state.dragonization,
                        rules: state.rules.slice(),  // 复制数组
                        weekCount: state.weekCount,
                        flags: JSON.parse(JSON.stringify(state.flags)),
                        medicineHut: JSON.parse(JSON.stringify(state.medicineHut)),
                        villageWestDone: state.villageWestDone,
                        medicineHutDone: state.medicineHutDone,
                        oldManTalkTriggered: state.oldManTalkTriggered,
                        hasShadowSecret: state.hasShadowSecret,
                        hasTaoistInfo: state.hasTaoistInfo,
                        hasDragonFollowerInfo: state.hasDragonFollowerInfo,
                        ch2: JSON.parse(JSON.stringify(state.ch2)),
                        // 时间戳
                        savedAt: new Date().toISOString(),
                    };

                    if (chapter === 'ch1_complete') {
                        localStorage.setItem(CHAPTER_SAVE_KEYS.ch1_complete, JSON.stringify(data));
                    } else if (chapter === 'ch2_complete') {
                        localStorage.setItem(CHAPTER_SAVE_KEYS.ch2_complete, JSON.stringify(data));
                    }

                    // 更新跨周目存档中的解锁状态
                    const cross = getCrossSave();
                    if (chapter === 'ch1_complete') {
                        cross.unlockedChapters.chapter2 = true;
                    } else if (chapter === 'ch2_complete') {
                        cross.unlockedChapters.chapter3 = true;
                    }
                    saveCrossSave(cross);

                    return true;
                } catch (e) {
                    console.warn('保存章节存档失败:', e);
                    return false;
                }
            }

            function loadChapterComplete(chapter) {
                try {
                    const key = chapter === 'ch1_complete' ? CHAPTER_SAVE_KEYS.ch1_complete : CHAPTER_SAVE_KEYS.ch2_complete;

                    if (!raw) return null;
                    return JSON.parse(raw);
                } catch (e) {
                    console.warn('读取章节存档失败:', e);
                    return null;
                }
            }

            function updateKeeperMemory(cross, normalState) {
                if (!cross || !normalState) return;
                const s = normalState;
                const memory = cross.keeperMemory;

                if (s.flags && s.flags.awakening && s.flags.awakening.visited) {
                    memory.behavioralTraits.prefersWest = Math.min(memory.behavioralTraits.prefersWest + 1, 10);
                }
                if (s.oldManTalkTriggered) {
                    memory.behavioralTraits.stopsAtStone = Math.min(memory.behavioralTraits.stopsAtStone + 1, 10);
                }
                let talkCount = 0;
                if (s.flags && s.flags.cardVisitCount) talkCount += s.flags.cardVisitCount;
                if (s.flags && s.flags.folkloreVisitCount) talkCount += s.flags.folkloreVisitCount;
                if (s.flags && s.flags.shopVisitCount) talkCount += s.flags.shopVisitCount;
                if (talkCount >= 5) {
                    memory.behavioralTraits.talksToEveryone = Math.min(memory.behavioralTraits.talksToEveryone + 1, 10);
                }
                if (s.ch2 && s.ch2.energyExhausted) {
                    memory.behavioralTraits.rushesThrough = Math.min(memory.behavioralTraits.rushesThrough + 1, 10);
                }
                if (s.rules && s.rules.length >= 20) {
                    memory.behavioralTraits.readsEverything = Math.min(memory.behavioralTraits.readsEverything + 1, 10);
                }
            }
            function getKeeperPhase(crossSave) {
                if (!crossSave) return 'stranger';
                const { playthroughCount, endingsUnlocked, stanceDepth, progressCount, trueEndingUnlocked } = crossSave;
                const pro = stanceDepth.proTemple || 0;
                const anti = stanceDepth.antiTemple || 0;

                if (trueEndingUnlocked) return 'gone';
                if (progressCount >= 9 && endingsUnlocked.length >= 8) return 'delivering';
                if (pro >= 4 && anti >= 4) return 'open';
                if (pro >= 3 && anti >= 3) return 'examining';
                if (pro >= 2 || anti >= 2) return 'guiding';
                if (endingsUnlocked.length >= 1) return 'observing';
                if (playthroughCount >= 2) return 'noticing';
                return 'stranger';
            }

                // 行为模式：是否匆忙通过（第二章中精力消耗过快）
                if (s.ch2 && s.ch2.energyExhausted) {
                    memory.behavioralTraits.rushesThrough = Math.min(memory.behavioralTraits.rushesThrough + 1, 10);
                }

                // 行为模式：是否阅读了大量规则
                if (s.rules && s.rules.length >= 20) {
                    memory.behavioralTraits.readsEverything = Math.min(memory.behavioralTraits.readsEverything + 1, 10);
                }
            }
            function checkChapter4Unlock(crossSave) {
                if (!crossSave) return false;
                const { stanceDepth, playthroughCount, endingsUnlocked } = crossSave;
                const pro = stanceDepth.proTemple || 0;
                const anti = stanceDepth.antiTemple || 0;
                // 条件：双线深度均 ≥4，且差距 ≤2，至少2周目，至少8个结局
                if (pro >= 4 && anti >= 4 && Math.abs(pro - anti) <= 2 && playthroughCount >= 2 && endingsUnlocked.length >= 8) {
                    return true;
                }
                return false;
            }
            function calculateCurrentRunDepth(normalState) {
                if (!normalState) return null;
                const s = normalState;

                // ---- 护道士线 (proTemple) ----
                let proScore = 0;
                const hiddenRules = ['hidden_1', 'hidden_2', 'hidden_3', 'hidden_4', 'hidden_5', 'hidden_6', 'hidden_7', 'hidden_8', 'hidden_9'];
                const hiddenCount = s.rules ? s.rules.filter(r => hiddenRules.includes(r)).length : 0;
                if (hiddenCount >= 5) proScore++;

                const itemsTaken = s.medicineHut && s.medicineHut.itemsTaken ? s.medicineHut.itemsTaken.length : 0;
                if (itemsTaken >= 3) proScore++;

                if (s.flags && s.flags.hasPeachWood) proScore++;

                if (s.ch2 && s.ch2._he2Triggered) proScore++;

                if (s.ch3 && s.ch3.npc && s.ch3.npc.xuanqing && s.ch3.npc.xuanqing.dialogRound >= 4) proScore++;

                // ---- 反道士线 (antiTemple) ----
                let antiScore = 0;
                if (s.flags && s.flags.awakening && s.flags.awakening.trustLevel >= 3) antiScore++;

                if (s.flags && s.flags.stele && s.flags.stele.piecesFound >= 6) antiScore++;

                if (s.flags && s.flags.stele && s.flags.stele._rescueSuccess) antiScore++;

                if (s.ch2 && s.ch2._he1Triggered) antiScore++;

                if (s.flags && s.flags._be2Triggered) antiScore++; // 需要确保 BE2 触发时设置此标记

                return {
                    proTemple: proScore,
                    antiTemple: antiScore,
                };
            }
            // ================================================================
            //  存档合并逻辑（同步跨周目存档）
            // ================================================================
            function updateProgressEntries(normalState) {
                if (!normalState) return null;
                const s = normalState; // 使用局部变量
                const entries = {};

                // entry_1_rules: 收集游客守则全篇 (base_1 ~ base_11)
                const baseRules = ['base_1', 'base_2', 'base_3', 'base_4', 'base_5', 'base_6', 'base_7', 'base_8', 'base_9', 'base_10', 'base_11'];
                const hasAllBase = baseRules.every(id => s.rules && s.rules.includes(id));
                entries.entry_1_rules = hasAllBase;

                // entry_2_ash: 草木灰显影 (hidden_1 ~ hidden_9 全部解锁)
                const hiddenRules = ['hidden_1', 'hidden_2', 'hidden_3', 'hidden_4', 'hidden_5', 'hidden_6', 'hidden_7', 'hidden_8', 'hidden_9'];
                const hasAllHidden = hiddenRules.every(id => s.rules && s.rules.includes(id));
                entries.entry_2_ash = hasAllHidden;

                // entry_3_relics: 药庐的遗物 (至少取走3件)
                const itemsTaken = s.medicineHut && s.medicineHut.itemsTaken ? s.medicineHut.itemsTaken.length : 0;
                entries.entry_3_relics = itemsTaken >= 3;

                // entry_4_awakened: 觉醒者全篇 (信任度达到3)
                entries.entry_4_awakened = s.flags && s.flags.awakening && s.flags.awakening.trustLevel >= 3;

                // entry_5_steles: 暗碑全文 (发现全部6条)
                entries.entry_5_steles = s.flags && s.flags.stele && s.flags.stele.piecesFound >= 6;

                // entry_6_pure_yang: 纯阳体解救成功
                entries.entry_6_pure_yang = s.flags && s.flags.stele && s.flags.stele._rescueSuccess;

                // entry_7_xuanqing: 玄清自述 (dialogRound >= 4)
                entries.entry_7_xuanqing = s.ch3 && s.ch3.npc && s.ch3.npc.xuanqing && s.ch3.npc.xuanqing.dialogRound >= 4;

                // entry_8_third_path: 第三条路 (药庐中发现letter)
                const hasLetter = s.medicineHut && s.medicineHut.itemsTaken && s.medicineHut.itemsTaken.includes('letter');
                entries.entry_8_third_path = hasLetter;

                // entry_9_dual_mirror: 双面之镜 (同时完成护道士和反道士的关键条件)
                // 条件：proScore >= 3 且 antiScore >= 3
                const depth = calculateCurrentRunDepth(s);
                entries.entry_9_dual_mirror = (depth && depth.proTemple >= 3 && depth.antiTemple >= 3);

                return entries;
            }
            function syncCrossSave() {
                // 1. 读取跨周目存档
                const cross = getCrossSave();
                // ⭐ 确保 unlockedChapters 存在（兜底）
                if (!cross.unlockedChapters) {
                    cross.unlockedChapters = {
                        chapter1: true,
                        chapter2: false,
                        chapter3: false,
                        chapter4: false,
                    };
                }
                // 2. 更新周目计数（只在开始新游戏时增加，这里不重复增加）
                // 周目计数已经在 startNewGame 中增加

                // 3. 更新结局记录（从 state.endingsThisRun 合并到 cross.endingsUnlocked）
                if (state.endingsThisRun && state.endingsThisRun.length > 0) {
                    state.endingsThisRun.forEach(endingId => {
                        if (!cross.endingsUnlocked.includes(endingId)) {
                            cross.endingsUnlocked.push(endingId);
                            cross.endingCount = cross.endingsUnlocked.length;
                            cross.endingUnlockOrder.push(endingId);
                            // 记录首周目和次周目结局
                            if (cross.playthroughCount === 1 && !cross.firstPlaythroughEnding) {
                                cross.firstPlaythroughEnding = endingId;
                            } else if (cross.playthroughCount === 2 && !cross.secondPlaythroughEnding) {
                                cross.secondPlaythroughEnding = endingId;
                            }
                        }
                    });
                    // 清空本周目结局记录，防止重复合并
                    state.endingsThisRun = [];
                }

                // 4. 更新双线深度（取最大值）
                const depth = calculateCurrentRunDepth(state);
                if (depth) {
                    cross.stanceDepth.proTemple = Math.max(cross.stanceDepth.proTemple, depth.proTemple);
                    cross.stanceDepth.antiTemple = Math.max(cross.stanceDepth.antiTemple, depth.antiTemple);
                }

                // 5. 更新9条认知进度
                const progress = updateProgressEntries(state);
                if (progress) {
                    for (let key in progress) {
                        if (progress[key]) {
                            cross.progressEntries[key] = true;
                        }
                    }
                    // 重新计算进度计数
                    let count = 0;
                    for (let key in cross.progressEntries) {
                        if (cross.progressEntries[key]) count++;
                    }
                    cross.progressCount = count;
                }

                // 6. 检查第四章解锁条件
                cross.chapter4Unlocked = checkChapter4Unlock(cross);

                // 7. 更新守卷人阶段
                cross.keeperPhase = getKeeperPhase(cross);

                // 8. 更新守卷人记忆（暂时留空，后续实现）
                updateKeeperMemory(cross, state); // 暂不实现
                // ⭐ 新增：检测并更新章节解锁状态
                // 检查是否有第一章完成存档
                if (hasChapterComplete('ch1_complete')) {
                    cross.unlockedChapters.chapter2 = true;
                }
                // 检查是否有第二章完成存档
                if (hasChapterComplete('ch2_complete')) {
                    cross.unlockedChapters.chapter3 = true;
                }

                // 检查第四章解锁条件
                cross.chapter4Unlocked = checkChapter4Unlock(cross);
                if (cross.chapter4Unlocked) {
                    cross.unlockedChapters.chapter4 = true;
                }
                // 9. 保存
                saveCrossSave(cross);
            }

            function getCrossSave() {

                        const parsed = JSON.parse(data);
                        // 确保所有字段存在，如果缺失则用默认值填充

                return getDefaultCrossSave();

            // ---------- 工具函数 ----------
            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

            function pick(arr) { return arr[rand(0, arr.length - 1)]; }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = rand(0, i);
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // ================================================================

            // ================================================================
            function addRule(id) {
                return new Promise((resolve) => {
                    if (!RULES_DB[id]) { resolve(false); return; }
                    if (state.rules.includes(id)) { resolve(false); return; }

                    if (state._waitingConfirm) {
                        const checkInterval = setInterval(() => {
                            if (!state._waitingConfirm) {
                                clearInterval(checkInterval);
                                addRule(id).then(resolve);
                            }
                        }, 100);
                        return;
                    }

                    state.rules.push(id);
                    const rule = RULES_DB[id];
                    state._waitingConfirm = true;

                try {

                    Object.keys(data).forEach(key => {
                        if (key === 'flags' || key === 'ch2' || key === 'medicineHut') {
                            state[key] = JSON.parse(JSON.stringify(data[key]));

                        } else if (key !== '_endingType') {

                    return true;

            // ---------- 计算初始伪装值（进入第二章时调用） ----------
            function calculateInitialDisguise() {
                // ---- 基础值为 2----
                let disguise = 2;

                // ================================================================
                //  融入加分（证明“你是这里的人”）
                // ================================================================
                let integrationBonus = 0;

                // 草木灰显影解锁（综合性最强条件）
                if (state.flags.hidden_unlocked) integrationBonus += 2;

                // 独立于草木灰解锁之外的融入行为
                if (state.flags.hasPeachWood) integrationBonus += 1;
                if (state.flags.oldLadyQuest.completed) integrationBonus += 1;
                if (state.flags.abandonedVisitCount >= 3) integrationBonus += 1;

                // ================================================================
                //  暴露减分（证明“你在调查”）
                // ================================================================
                let exposurePenalty = 0;

                if (state.flags.awakening.visited) exposurePenalty += 2;
                if (state.medicineHut.visited) exposurePenalty += 1;
                if (state.flags.folkloreVisitCount >= 3) exposurePenalty += 1;
                if (state.flags.hasDragonScale) exposurePenalty += 1;

                // ================================================================
                //  计算最终值
                // ================================================================
                let final = disguise + integrationBonus - exposurePenalty;
                final = clamp(final, 1, 5);
                return final;
            }
